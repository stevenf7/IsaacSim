########################################################################################################################
# Packaging
########################################################################################################################

[repo_package]
# Hide default repo_package under internal command to be used by `repo_package_app`
command = "_package"

# Revert the override to the default command
[repo_package_app]
command = "package"
entry_point = "omni.repo.package:setup_repo_tool"
enabled = true

########################################################################################################################
# Edit sysconfig
########################################################################################################################

[edit_sysconfig]
