        "omni.graph",
        "omni.isaac.IsaacSensorSchema",
        "omni.isaac.RangeSensorSchema",
        # don't mock 'omni.kit' (needed for 'omni.kit.loop-isaac'),
        "omni.kit.app",
        "omni.kit.commands",
        "omni.kit.menu",
        "omni.kit.property",
        "omni.kit.test",
        "omni.kit.usd",
        "omni.kit.utils",
        "omni.kit.window",
        "omni.physics",
        "omni.physx",
        "omni.physxclashdetectioncore",
        "omni.replicator",
        "omni.stats",
        "omni.syntheticdata",
        "omni.timeline",
        "omni.ui",
        "omni.usd",
        "pxr",
        "Semantics",
        "usdrt",
        "warp",
    ]

    rst_prolog = '''
    .. |br| raw:: html

        <br>

    .. |physx_docs| replace:: `PhysX docs <https://nvidia-omniverse.github.io/PhysX/physx>`__

    '''
"""

sphinx_exclude_patterns = [
  "**/omni.isaac.app",
  "**/omni.isaac.assets_check",
  "**/omni.isaac.core_archive",
  "**/omni.isaac.ml_archive",
  "**/omni.pip.compute",
  "**/omni.pip.cloud",
  "**/omni.isaac.repl",
  "**/omni.isaac.tests",
  "**/omni.usd.schema.isaac",         #TODO?
  "**/omni.isaac.window.about",
  "**/omni.isaac.unit_converter",
  "include",
  "tools",
  "tests",
  "**/README.md",
  "TESTING.md",
  "**/CHANGELOG.md",
  "CHANGELOG.md",
  "**/*LICENSE.md",
  "_deps_acl",
  "source/deprecated_extensions",
  "schemas",
  ".cache",
  ".local",
  ".vscode",
  ".nvidia-omniverse",
  "_build",
]

doxygen_input = [
  "source/extensions/isaacsim.ros2.bridge/include/Ros2Bridge.h",
  "source/extensions/isaacsim.ros2.bridge/include/Ros2Factory.h",
  "source/extensions/isaacsim.ros2.bridge/include/Ros2Macros.h",
  "source/extensions/isaacsim.ros2.bridge/include/Ros2Node.h",
  "source/extensions/isaacsim.ros2.bridge/include/Ros2QoS.h",
]
doxygen_predefined = ["CARB_PLUGIN_INTERFACE="]

api_output_directory = "api"
use_fast_doxygen_conversion = true

[repo_docs.editions.production]
bucket_dir = "py/isaacsim/"
bucket_name = "omniverse-docs-production"
formats_to_publish = ["html"]
protocol = "s3"
region = "us-west-1"
s3_exclude_patterns = []

# #####################################################################
# # schema
# #############################
[repo_usd]
generate_plugin_buildfiles = false
plugin_buildfile_format = "premake"
usd_python_root = "${root}/_build/target-deps/python"
usd_root = "${root}/_build/target-deps/nv_usd/%{cfg.buildcfg}"

[repo_usd.plugin.robotSchema]
schema_file = "${root}/source/extensions/isaacsim.robot.schema/robot_schema/RobotSchema.usda"
generate_dir = "${root}/source/extensions/isaacsim.robot.schema/robot_schema"
plugin_dir = "${root}/source/extensions/isaacsim.robot.schema/robot_schema"
install_root =  "${root}/source/extensions/isaacsim.robot.schema/robot_schema"
build_dir =  "${root}/source/extensions/isaacsim.robot.schema/robot_schema"

library_prefix = "RobotSchema"
generate_module_deps_cpp_file = false
is_codeless = true
usd_lib_dependencies = [
  "arch",
  "tf",
  "vt",
  "sdf",
  "usd",
  "usdPhysics",
  "usdGeom",
]

