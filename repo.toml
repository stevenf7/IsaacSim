########################################################################################################################
# Code formatting
########################################################################################################################

[repo_format]

cpp.maintain_legal_blurbs = false
python.maintain_legal_blurbs = false


cpp.files.exclude = [
  "templates/**",
  "tools/container/**",
]

python.files.include = [
  "**",
  ".cursor/**",
]

python.files.exclude = [
  "_build/*",
  "_compiler/*",
  "_repo/*",
  ".eggs/*",
  ".git/*",
  ".local/*",
  ".nvidia-omniverse/*",
  ".venv/*",
  ".vscode/*",
  "schemas/*",
  "templates/**",
  "tools/autopull/**",
  "tools/ci/**",
  "tools/container/**",
  "tools/lib/**",
  "tools/packman/*",
  "tools/repoman/**",
]

license_preamble = '''
SPDX-FileCopyrightText: Copyright (c) {years} NVIDIA CORPORATION & AFFILIATES. All rights reserved.
SPDX-License-Identifier: Apache-2.0
'''

# license_text will always be after the spdx_license_text or copyright line, separated by a single newline
license_text = '''
Licensed under the Apache License, Version 2.0 (the "License");
you may not use this file except in compliance with the License.
You may obtain a copy of the License at

http://www.apache.org/licenses/LICENSE-2.0

Unless required by applicable law or agreed to in writing, software
distributed under the License is distributed on an "AS IS" BASIS,
WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
See the License for the specific language governing permissions and
limitations under the License.
'''


########################################################################################################################
# Extension documentation building (see: repo extension_docs --help)
########################################################################################################################

[repo_extension_docs]
build_extension_paths = [
  "${root}/_build/${platform}/${config}/exts",
  "${root}/_build/${platform}/${config}/extsDeprecated",
  "${root}/_build/${platform}/${config}/extsbuild",
# AUTOREMOVE: BEGIN
  "${root}/_build/${platform}/${config}/extsInternal",
# AUTOREMOVE: END
]
source_extension_paths = [
  "${root}/source/extensions",
  "${root}/source/deprecated",
# AUTOREMOVE: BEGIN
  "${root}/source/internal_extensions",
# AUTOREMOVE: END
]

sections = [
  "reference",
  "title",
  "deprecation",
  "version",
  "description",
  "preview",
  "enable-extension",
  "toctree",
  { "usage" = "usage.rst" },
  { "api" = "api.rst" },
  { "actions" = "../config/actions_api.md" },
  "ogn",
  "settings",
  "python-api",
]

# These extensions are excluded as they do not contain any documentation
excluded_extensions = [
    # archives
    "omni.isaac.core_archive",
    "omni.isaac.ml_archive",
    "omni.pip.cloud",
    "omni.pip.compute",
    # extsbuild,
    "omni.graph.tools",
    "omni.kit.test",
    "omni.syntheticdata",
    "omni.usd.core",
    "usdrt.scenegraph",
# AUTOREMOVE: BEGIN
    # internal extensions
    "isaacsim.app.compatibility_check",
    "isaacsim.xr.input_devices",
# AUTOREMOVE: END
]

# Extensions from extsbuild that needed to be included in docs
extsbuild_exts_includes = [
]

########################################################################################################################
# Omnigraph Documentation Building
########################################################################################################################

[repo_ogn]

build_path = "${root}/_build/${platform}/release/exts"
home_path = "${root}/source/extensions"
ogn_exts_includes = [
  "isaacsim.replicator.experimental.domain_randomization",
  "isaacsim.replicator.examples",
  "isaacsim.replicator.writers",
  "isaacsim.asset.gen.conveyor",
  "isaacsim.ros2.bridge",
  "isaacsim.sensors.physics.nodes",
  "isaacsim.sensors.physx",
  "isaacsim.sensors.rtx",
  "isaacsim.core.nodes",
  "isaacsim.examples.interactive_nodes",
  "isaacsim.robot.wheeled_robots.nodes",
  "isaacsim.robot.experimental.wheeled_robots",
  # "isaacsim.util.debug_draw",

]


[repo_lint.flake8]
# most people coming to repo_lint will expect flake8 on by default as the bare minimun
enabled = true
config = "${root}/.flake8"

files.include = [
  "**/*.py"
]
files.exclude = [
  ".vscode/*",
  "_build/*",
  "_compiler/*",
  "_repo/*",
  ".git/*",
  ".eggs/*",
  ".pytest_cache/*",
  ".venv/*",
  ".vscode/*",
  "*/_vendor/*",
  "tools/repoman/*",
  "tools/packman/*",
  "tools/container/*"
]

########################################################################################################################
# Tool to pull kit kernel and extensions before running
########################################################################################################################

[repo_kit_pull_extensions]
precache_exts_enabled = false


[[repo_kit_pull_extensions.environment]]
name = "integ"
app_version_regex = ""
"tokens.registry_url" = "https://ovextensionsprod.blob.core.windows.net"
"tokens.registry_shared_name" = "shared"
"tokens.registry_name" = "kit/prod"


########################################################################################################################
# Examples List Generator
########################################################################################################################

[repo_examples_list]
# Path to the examples directory (relative to workspace root or absolute)
examples_dir = "${root}/source/standalone_examples"
# Output RST file path (relative to workspace root or absolute)
output_file = "${root}/docs/api/source/standalone_examples_list.rst"


########################################################################################################################
# Generate vscode settings
########################################################################################################################

[repo_generate_vscode_settings]

output_paths = ["${root}/", "${root}/_build/${platform}/${config}"]
template_paths = [
  "${root}/.vscode/settings.template.json",
  "${root}/source/scripts/vscode/${platform}/settings.json",
]

# paths specific to python autocomplete, not added to pythonpath/env
python_analysis_extra_mapping = [
  "$root/_build/$platform/$config/exts/*",
  "$root/_build/$platform/$config/extsDeprecated/*",
  "$root/_build/$platform/$config/extscache/*",
  "$root/_build/$platform/$config/kit/exts/*",
  "$root/_build/$platform/$config/kit/extscore/*",
]

########################################################################################################################
# Edit sysconfig
########################################################################################################################

[repo_edit_sysconfig]
"platform:linux-x86_64".sysconfig_path = "${root}/_build/${platform}/${config}/kit/python/lib/python3.12/_sysconfigdata__linux_x86_64-linux-gnu.py"
"platform:linux-aarch64".sysconfig_path = "${root}/_build/${platform}/${config}/kit/python/lib/python3.12/_sysconfigdata__linux_aarch64-linux-gnu.py"

########################################################################################################################
# API Check tool
########################################################################################################################

[repo_checkapi]
enabled = true

[repo_checkapi.python]

exts.folders = [
    "${root}/_build/${platform}/${config}/exts",
    "${root}/_build/${platform}/${config}/extsInternal",
    "${root}/_build/${platform}/${config}/extsDeprecated",

]

exts.extra_folders = [
]

# Check and fail on CI when API changed. That encourages to update and commit the python_api.md files.
fail_on_changed_api = true