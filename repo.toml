  [
    "${root}/repo${shell_ext}",
    "generate_vscode_settings",
    "-c",
    "${config}",
  ],
  [
    "${root}/repo${shell_ext}",
    "edit_sysconfig",
    "-c",
    "${config}",
  ],
  [
    "${root}/schemas/generate-schema${shell_ext}",
    "-c",
