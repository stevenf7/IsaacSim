########################################################################################################################
# Packaging
########################################################################################################################

[repo_package]
archive_format = "7z"
windows_max_path_length = 200
ziponly = false
# store_links_zip = true # preserve symlinks

[repo_package.packages.isaac-sim]
omniverse_flow_version_scheme = true
package_per_config = true
root = "_build/$${platform}/$${config}"
manylinux_platform = "2_35"

[repo_package.packages.isaac-sim-standalone]
append_config = true
omniverse_flow_version_scheme = true
package_per_config = true
replace_authors_in_kit_extensions = true
root = "_build/$${platform}/$${config}"
strip_package_infos = true
windows_max_path_length = 220
manylinux_platform = "2_35"

# Capture the intermediate gcno files
[repo_package.packages.isaac-sim-standalone-coverage]
append_config = true
omniverse_flow_version_scheme = true
package_per_config = true
replace_authors_in_kit_extensions = true
root = "_build"
strip_package_infos = true
windows_max_path_length = 220
manylinux_platform = "2_35"


# to generate docs package for isaac sim
[repo_package.packages.docs]
omniverse_flow_version_scheme = true
ziponly = true

[repo_package.packages.isaac-sim-assets-1]
archive_format = "zip"
omniverse_flow_version_scheme = true
strip_package_infos = true

[repo_package.packages.isaac-sim-assets-2]
archive_format = "zip"
omniverse_flow_version_scheme = true
strip_package_infos = true

[repo_package.packages.isaac-sim-assets-3]
archive_format = "zip"
omniverse_flow_version_scheme = true
strip_package_infos = true

[repo_package.packages.isaac-sim-assets-4]
archive_format = "zip"
omniverse_flow_version_scheme = true
strip_package_infos = true

[repo_package.packages.isaac-sim-assets-5]
archive_format = "zip"
omniverse_flow_version_scheme = true
strip_package_infos = true

########################################################################################################################
# Package publishing to packman
########################################################################################################################

[repo_publish]
enabled = true
packages = ["isaac-sim*"]

########################################################################################################################
# Test Runner
########################################################################################################################
[repo_test]

"token:in_ci==false".env_vars = [
  [
    "LD_PRELOAD",
    "${root}/_build/${platform}/${config}/kit/libcarb.so",
  ],
  [
    "RMW_IMPLEMENTATION",
    "rmw_fastrtps_cpp",
  ],
  [
    "LD_LIBRARY_PATH",
    "${root}/_build/${platform}/${config}/exts/isaacsim.ros2.core/humble/lib",
  ],
]


"token:in_ci==true".env_vars = [
  [
    "RMW_IMPLEMENTATION",
    "rmw_fastrtps_cpp",
  ],
]



test_root = "$root/_build/$platform/$config"

# AUTOREMOVE: BEGIN
# Since we use parallel:matrix we want to disable auto parallelization in our repo_test execution
disable_auto_parallelization = true
# AUTOREMOVE: END

# When running from package, look for package using that path/pattern:
archive_pattern = "${root}/_build/packages/isaac-sim*.7z"

# archive_post_unpack_cmd = ["${test_root}/pull_kit_sdk${shell_ext}", "--registry=internal"]
archive_post_unpack_cmd = []

[repo_test.suites.alltests]

generate_report_cmd = [
  "${test_root}/kit/kit${exe_ext}",
  "--empty",
  "--enable",
  "omni.kit.test",
  "--/app/enableStdoutOutput=0",
  "--/exts/omni.kit.test/testExtOutputPath='${test_root}/_testoutput'",
  "--/exts/omni.kit.test/testExtGenerateReport=1",
]
stdout_fail_patterns.exclude = [
]

[repo_test.suites.startuptests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
stdout_fail_patterns.include = ["*[error]*", "*[fatal]*", "*[fail]*"]


generate_report_cmd = [
  "./repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "startuptests",
]

"platform:windows-x86_64".generate_report_cmd = [
  "repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "startuptests",
]

#-----------------------------------------------------------------------------------------------------------------------
# Test Suite: 	Startup Tests
# Description: 	Just run and exit big app configuration for both smoke testing and compiling shaders.
#-----------------------------------------------------------------------------------------------------------------------

[[repo_test.suites.startuptests.group]]
# Run Kit App Full.
"platform:linux-x86_64".args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root",
  "${test_root}/portable_root",
  "--portable",
  "--/log/flushStandardStreamOutput=1",                    # Prevents mixed up piped stdout
  "--reset-user",
  "--/exts/omni.kit.test/testExtOutputPath='${test_root}/_testoutput'",
  "--/exts/omni.kit.test/pyCoverageEnabled=True",
  "--/app/extensions/fsWatcherEnabled=0",
]
"platform:linux-aarch64".args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root",
  "${test_root}/portable_root",
  "--portable",
  "--/log/flushStandardStreamOutput=1",                    # Prevents mixed up piped stdout
  "--reset-user",
  "--/exts/omni.kit.test/testExtOutputPath='${test_root}/_testoutput'",
]
"platform:windows-x86_64".args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root",
  "${test_root}/portable_root",
  "--portable",
  "--/log/flushStandardStreamOutput=1",                    # Prevents mixed up piped stdout
  "--reset-user",
  "--/exts/omni.kit.test/testExtOutputPath='${test_root}/_testoutput'",
]
exclude = []
include = ["tests-startup*${shell_ext}"]
timeout = 500

[repo_test.suites.postinstalltests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1

generate_report_cmd = [
  "./repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "postinstalltests",
]

"platform:windows-x86_64".generate_report_cmd = [
  "repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "postinstalltests",
]

[[repo_test.suites.postinstalltests.group]]
include = ["post_install${shell_ext}"]
timeout = 1500

[repo_test.suites.warmuptests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1

generate_report_cmd = [
  "./repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "warmuptests",
]

"platform:windows-x86_64".generate_report_cmd = [
  "repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "warmuptests",
]

[[repo_test.suites.warmuptests.group]]
include = ["warmup${shell_ext}"]
timeout = 1500

[repo_test.suites.pythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"

python_source_path = "${root}/source"

generate_report_cmd = [
  "./repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "pythontests",
]

"platform:windows-x86_64".generate_report_cmd = [
  "repo${shell_ext}",
  "ci",
  "standalone_report",
  "--",
  "${test_root}/_testoutput",
  "pythontests",
]

[[repo_test.suites.pythontests.group]]
"platform:linux-x86_64".args = [
  "--portable-root",
  "${test_root}/portable_root",
  "--reset-user",
  "--/exts/omni.kit.test/testExtOutputPath='${test_root}/_testoutput'",
  "--/exts/omni.kit.test/pyCoverageEnabled=True",
]
"platform:linux-aarch64".args = [
  "--portable-root",
