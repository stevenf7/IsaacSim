########################################################################################################################
# Repo tool base settings
########################################################################################################################

[repo]
logging = "warn"
extra_tool_paths = [
	"${root}/_build/$platform/release/kit/dev"
]


########################################################################################################################
# Override VERSION File
########################################################################################################################

[repo.folders]
version_file = "${root}/VERSION"


########################################################################################################################
# Build tool setup
########################################################################################################################

[repo_build]

# List of packman projects to pull (in order)
fetch.packman_host_files_to_pull = [
    "${root}/deps/host-deps.packman.xml",
]

fetch.packman_target_files_to_pull = [
    "${root}/deps/kit-sdk.packman.xml",
    "${root}/deps/rtx-plugins.packman.xml",
    "${root}/deps/omni-physics.packman.xml",
    "${root}/deps/target-deps.packman.xml",
    "${root}/deps/isaac-sim.packman.xml",
    "${root}/deps/omni-usd-resolver.packman.xml",
]

fetch.pip.files_to_pull = [
    "${root}/deps/pip.toml",
    "${root}/deps/pip_ml.toml"
]

stage_files.extra_mapping.kit_sdk_debug = "${root}/_build/$platform/debug/kit"
stage_files.extra_mapping.kit_sdk_release = "${root}/_build/$platform/release/kit"

vscode.python = "${root}/_build/$platform/release/kit/python"

vscode.python_env.PYTHONPATH= [
  "$$$${PYTHONPATH}",
  # The following paths are not available outside of source builds, remove from python env
  # "${env:PYTHONPATH}",
  # "$root/_build/pip-packages",
  # "$repo_deps/repo_man",
  # "$repo_deps/repo_build",
  # "$repo_deps/repo_fileutils",
  # "$repo_deps/repo_format",
  # "$repo_deps/repo_package",
  # "$root/tools/repoman",
  "$root/_build/$platform/$config/exts/*",
  "$root/_build/$platform/$config/extscache/*",
  "$root/_build/$platform/$config/kit/exts/*",
  "$root/_build/$platform/$config/kit/extscore/*",
  "$root/_build/$platform/$config/kit/extsPhysics/*",
  "$root/_build/$platform/$config/kit/extensions/extensions-bundled",
  "$root/_build/$platform/$config/kit/plugins/bindings-python/",
  "$root/_build/$platform/$config/kit/extscore/omni.kit.pip_archive/pip_prebundle",
  "$root/_build/$platform/$config/exts/omni.isaac.core_archive/pip_prebundle",
  "$root/_build/$platform/$config/exts/omni.isaac.ml_archive/pip_prebundle",
  "$root/_build/$platform/$config/extscache/omni.kit.pip_torch-1_11_0-0.1.3+103.5.wx64.cp37/torch-1-11-0/", # windows
  "$root/_build/$platform/$config/extscache/omni.kit.pip_torch-1_11_0-0.1.3+103.5.lx64.cp37/torch-1-11-0/", # linux
]

vscode.python_env.PATH= [
  "$$$${PATH}", 
  "$root/_build/$platform/$config",
  "$root/_build/$platform/$config/exts/omni.usd.schema.isaac/bin",
  "$root/_build/$platform/$config/exts/omni.isaac.motion_planning/bin",
  "$root/_build/$platform/$config/kit",
  "$root/_build/$platform/$config/kit/exts/*/bin",
  "$root/_build/$platform/$config/kit/extscore/*/bin",
  "$root/_build/$platform/$config/kit/extsPhysics/*/bin",
  "$root/_build/$platform/$config/kit/libs/iray",
  "$root/_build/$platform/$config/kit/plugins",
  "$root/_build/$platform/$config/kit/plugins/bindings-python",
  "$root/_build/$platform/$config/kit/plugins/carb_gfx",
  "$root/_build/$platform/$config/kit/plugins/rtx",
  "$root/_build/$platform/$config/kit/extensions/extensions-bundled/bin",

]

vscode.write_python_paths_in_settings_json = true
vscode.generate_python_env_file = false

msbuild.sln_file = "isaac-sim.sln"
msbuild.vs_version = "vs2017"

stage_files.error_if_missing = true

licensing.enabled = true
licensing.packages = ["${root}/deps/rtx-target-deps.packman.xml", "${root}/deps/target-deps.packman.xml", "${root}/deps/isaac-sim.packman.xml"]
licensing.fail_on_missing = true

post_build.commands = [
    ["${root}/repo${shell_ext}", "precache_exts", "-c", "${config}", "${precache_flag_0}"] ,
    # ["${root}/tools/build_docs${shell_ext}", "--config", "${config}", "--warn-as-error=0"], # disabled to reduce local build times
    ["${root}/repo${shell_ext}", "user_vscode", "-c", "${config}"]
]

[[repo_build.argument]]
name = "-u"
help = "Update extensions: remove generated part from kit files and clean cache path before running exts precaching. (Pass -u flag to repo precache_exts tool)."
extra_tokens = {"precache_flag_0" = "-u" }
kwargs.required = false
########################################################################################################################
# Extensions precacher
########################################################################################################################

[repo_precache_exts]
enabled = true

# Extra args to pass to kit
kit_extra_args = []

# Folder to store cache extensions into
cache_path = "${root}/_build/${platform}/${config}/extscache"

ext_folders = [
  "${root}/_build/$platform/$config/exts"
]

# Apps to run and precache
apps = [
    "${root}/_build/$platform/$config/apps/omni.isaac.sim.extscache.kit"
]

# Registries to use
registries = [
    { name = "kit/default", url = "omniverse://kit-extensions.ov.nvidia.com/exts/kit/default" },
]


########################################################################################################################
# Documentation building
########################################################################################################################

[repo_docs]

enabled = true

# the name of you project.  should be a single word. used to name files.
project = "isaac_sim"

# a slightly more descriptive name for your project. user visible. keep it short.
long_name = "Isaac Sim"

# first year in your projects copyright.
copyright_start = 2018

# Use python from kit sdk
python_path =  "${root}/_build/${platform}/${config}/python${shell_ext}"

# Move api docs to build directory
# docs_dst = "${root}/_build/${platform}/${config}/docs"

# Add all extensions to docs sys.path
python_paths = [
  "${root}/_build/${platform}/${config}/exts/omni.isaac.core_archive/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/omni.isaac.ml_archive/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/omni.isaac.lula/pip_prebundle"]
library_paths = []

sphinx_conf_py_extra = """
    add_module_names = False
    html_logo = "docs/media/main_ov_logo_square.png"
    html_favicon = "docs/media/favicon.ico"
    html_static_path = [
        "docs/media/isaac-style.css",
        "docs/media/NVIDIA-LogoBlack.svg",
    ]
    html_css_files = [ "isaac-style.css" ]
    autodoc_mock_imports = ["pxr.PhysxSchema", "pxr.PhysicsSchemaTools",  "omni.physx", "omni.physics", "omni.replicator.core"]

"""

sphinx_exclude_patterns = [
    "**/omni.isaac.app",
    "**/omni.isaac.app.selector",
    "**/omni.isaac.app.setup",
    "**/omni.isaac.assets_check",
    "**/omni.isaac.asset_browser",
    "**/omni.isaac.internal_tools",
    "**/omni.isaac.core_archive",
    "**/omni.isaac.ml_archive",
    "**/omni.isaac.robot_engine_bridge",     #TODO
    "**/omni.isaac.gxf_bridge",     #TODO
    "**/omni.isaac.examples",     #TODO?
    "**/omni.isaac.repl",
    "**/omni.isaac.splash",
    "**/omni.isaac.tests",
    "**/omni.isaac.utils_manager",
    "**/omni.kit.property.isaac",
    "**/omni.usd.schema.isaac",     #TODO?
    "**/omni.isaac.window.about",
    "**/omni.isaac.motion_planning",
    "**/omni.isaac.statistics_logging",
    "**/omni.isaac.version",
    "**/omni.isaac.unit_converter",
    "include",
    "tools",
    "tests",
    "**/README.md",
    "TESTING.md",
    "**/CHANGELOG.md",
    "CHANGELOG.md",
    "**/*LICENSE.md",
    ".cache",
    "_deps_acl",
    "source/deprecated_extensions"
]

########################################################################################################################
# Build Number 
########################################################################################################################

[repo_build_number]
enabled = true


########################################################################################################################
# Packaging 
########################################################################################################################

[repo_package]
windows_max_path_length=200

[repo_package.packages.isaac-sim]
root = "_build/$${platform}/$${config}"
omniverse_flow_version_scheme = true
ziponly = false
package_per_config = true
"platform:linux-x86_64".archive_format = "7z" # Use 7z on linux

[repo_package.packages.isaac-sim-standalone]
root = "_build/$${platform}/$${config}"
omniverse_flow_version_scheme = true
ziponly = false
"platform:linux-x86_64".archive_format = "7z" # Use 7z on linux
"platform:windows-x86_64".archive_format = "7z"
package_per_config = true
append_config = true
replace_authors_in_kit_extensions = true
strip_package_infos = true
windows_max_path_length = 220 #TODO: changed from default of 180 to make builds pass

[repo_package.packages.isaac-sim-internal]
root = "_build/$${platform}/$${config}"
omniverse_flow_version_scheme = true
ziponly = false
package_per_config = true
"platform:linux-x86_64".archive_format = "7z" # Use 7z on linux

# to generate test runner package for isaac sim
[repo_package.packages.test_runner]
omniverse_flow_version_scheme = true
ziponly = true

# to generate launcher images package
[repo_package.packages.isaac-sim-pipeline-images-beta]
omniverse_flow_version_scheme = true
archive_format = "zip"
strip_package_infos = true

[repo_package.packages.isaac-sim-pipeline-images-rc]
omniverse_flow_version_scheme = true
archive_format = "zip"
strip_package_infos = true

# to generate docs package for isaac sim
[repo_package.packages.docs]
omniverse_flow_version_scheme = true
ziponly = true


########################################################################################################################
# Package publishing to packman
########################################################################################################################

[repo_publish]
enabled = true
packages = ["isaac-sim*"]

########################################################################################################################
# Publish and deploy to Omniverse Launcher
########################################################################################################################

[publish_launcher]
git_url = "https://oauth2:${env:ISAAC_SIM_PIPELINE_TOKEN}@gitlab-master.nvidia.com/omniverse/isaac_sim-release-pipeline.git"
# FOR DEVELOPMENT #
template_path = "${root}/tools/repoman/launcher-pipeline-template/beta"
# # FOR PRODUCTION #
# template_path = "${root}/tools/repoman/launcher-pipeline-template/rc"
branch_prefix = "integ"

########################################################################################################################
# Test Runner
########################################################################################################################
[repo_test]

test_root = "$root/_build/$platform/$config"

# When running from package, look for package using that path/pattern:
archive_pattern = "${root}/_build/packages/isaac-sim-*.7z"

[repo_test.suites.startuptests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
# publish_artifacts = ["${test_root}/_build/**/*.log", "${test_root}/**/*.dmp"]

# fnmatch module is used, matching is case insensitive. Refer to: https://docs.python.org/3/library/fnmatch.html
# notice: to escape [ and ] symbols wrap them in [].
stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]
stdout_fail_patterns.exclude = [
	"*Leaking graphics objects*",  # Exclude grahics leaks until fixed
	"*leaking memory. Missing call to destroyResourceBindingSignature*",
	"*extension object is still alive*", # Ignore any leaks for startup tests to not block pipeline
	"*Failed to obtain username for current process, using cache directory without username as suffix*",  # This should be a warning but is classed as an error but seems to be an issue on the colossus machines only. https://nvidia.slack.com/archives/CGNV10TFX/p1617377550298400
  "*USD stage detach not called, holding a loose ptr to a stage!*" # caused by fast exit
]


#----------------------------------------------------------------------------------------------------------------------- 
# Test Suite: 	Startup Tests
# Description: 	Just run and exit big app configuration for both smoke testing and compiling shaders.
#-----------------------------------------------------------------------------------------------------------------------

[[repo_test.suites.startuptests.group]]
# Run Kit App Full. 
include = ["tests-startup*${shell_ext}"]

args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root ${test_root}/portable_root",
	"--portable",
	"--/log/flushStandardStreamOutput=1", # Prevents mixed up piped stdout
  "--reset-user"
]
timeout = 1200

[repo_test.suites.selectortests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]
stdout_fail_patterns.exclude = [
	"*Leaking graphics objects*",  # Exclude grahics leaks until fixed
	"*leaking memory. Missing call to destroyResourceBindingSignature*",
	"*extension object is still alive*", # Ignore any leaks for startup tests to not block pipeline
	"*Failed to obtain username for current process, using cache directory without username as suffix*",  # This should be a warning but is classed as an error but seems to be an issue on the colossus machines only. https://nvidia.slack.com/archives/CGNV10TFX/p1617377550298400
]
[[repo_test.suites.selectortests.group]]
include = ["tests-selector*${shell_ext}"]
args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root ${test_root}/portable_root",
	"--portable",
	"--/log/flushStandardStreamOutput=1", # Prevents mixed up piped stdout
  "--reset-user"
]
timeout = 1200

[repo_test.suites.postinstalltests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1

[[repo_test.suites.postinstalltests.group]]
include = ["omni.isaac.sim.post.install${shell_ext}"]
timeout = 1200

[repo_test.suites.pythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.pythontests.group]]
  include = ["tests-python*${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 480
stdout_fail_patterns.exclude = [
	"*Remote server does not support WebSockets*", 
  "*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]

[repo_test.suites.internalpythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.internalpythontests.group]]
  include = ["tests-python-omni.isaac.internal_tools*${shell_ext}", "tests-internalnativepython*${shell_ext}",]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 900

stdout_fail_patterns.exclude = [
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]


[repo_test.suites.nativepythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.nativepythontests.group]]
  include = ["tests-nativepython*${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 900

[repo_test.suites.jupytertests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.jupytertests.group]]
  include = ["tests-jupyter*${shell_ext}"]
  exclude =[]
  args = []
  tc_report_enabled = false
  timeout = 480

[repo_test.suites.dockertests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1

[[repo_test.suites.dockertests.group]]
include = ["tests-docker*${shell_ext}"]
# args = [
#   "${test_root}",
#   "--/app/settings/persistent=0",
#   "--/app/settings/loadUserConfig=0",
#   "--/app/content/emptyStageOnStart=1",
#   "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
# 	"--/log/flushStandardStreamOutput=1", # Prevents mixed up piped stdout
# ]
timeout = 1200

# Catch2 Unit Tests
[repo_test.suites.unittests]
kind = "catch2"
default = true
executables = [
	"${test_root}/tests/tests-unit-omni.isaac.range_sensor${exe_ext}",
]

########################################################################################################################
# Bump version
########################################################################################################################

[bump_version]
git_url = "https://oauth2:${env:ISAAC_SIM_PIPELINE_TOKEN}@gitlab-master.nvidia.com/Isaac/omni_isaac_sim.git"
# FOR DEVELOPMENT #
branch_name = "develop"
# # FOR PRODUCTION #
# branch_name = "release/2022.2"


########################################################################################################################
# Extensions publisher
########################################################################################################################

[repo_publish_exts]
enabled = true
# only publish release versions
kit_path = "${root}/_build/$platform/release/kit/kit${exe_ext}"

publish_root = "${root}/_build/$platform/release"

ext_folders = [
  "${publish_root}/exts"
]

# Extensions to publish, include and exclude among those discovered by kit. Wildcards are supported.
exts.include = [
    "omni.isaac.core",
    "omni.isaac.core_archive",
    "omni.isaac.core_nodes",
    "omni.isaac.dynamic_control",
    "omni.isaac.ml_archive",
    "omni.isaac.version",
    "omni.isaac.motion_generation",
    "omni.isaac.motion_planning",
    "omni.isaac.lula",
    "omni.isaac.onshape",
    "omni.isaac.diff_usd",
    "omni.isaac.debug_draw",
    "omni.isaac.merge_mesh",
    "omni.isaac.occupancy_map",
    "omni.isaac.physics_inspector",
    "omni.isaac.articulation_inspector",
    "omni.isaac.physics_utilities",
    "omni.isaac.range_sensor",
    "omni.isaac.isaac_sensor",
    "omni.isaac.surface_gripper",
    "omni.isaac.synthetic_recorder",
    "omni.isaac.synthetic_utils",
    "omni.isaac.ui",
    "omni.isaac.urdf",
    "omni.isaac.utils",
    "omni.kit.loop-isaac",
    "omni.usd.schema.isaac",
    "omni.isaac.wheeled_robots",
    "omni.isaac.proximity_sensor",
    "omni.isaac.unit_converter",
    "omni.isaac.repl",
    #"omni.isaac.examples",
]
exts.exclude = []

# Registries to publish to.
registries = [
    { name = "kit/default", url = "omniverse://kit-extensions.ov.nvidia.com/exts/kit/default" },
]

# verify before publishing
publish_verification = true

# When running from package, look for package using that path/pattern:
archive_pattern = "${root}/_build/packages/isaac-sim-*.7z"

# ETM (extension test matrix) settings
enroll_in_etm = false
etm_emails = ["hmazhar@nvidia.com"]


########################################################################################################################
# Code formatting
########################################################################################################################

[repo_format]

cpp_file_exclude_patterns = [
    "source/ros_workspace/src/cortex_control/**",
    "source/ros_workspace/src/cortex_control_franka/**",
    "source/extensions/omni.isaac.ros_bridge/isaac_ros_messages/**",
    "source/extensions/omni.isaac.ros2_bridge/isaac_ros2_messages/**",
    "source/extensions/omni.isaac.ros2_bridge-humble/isaac_ros2_messages/**"
]

py_exclude = """
(
  /(
      \\.eggs
    | \\.git
    | \\.cache
    | \\.venv
    | _build
    | _repo
    | _compiler
    | _vendor
    | tools/packman
  )/
)
"""

########################################################################################################################
# Omnigraph Documentation Building
########################################################################################################################

[repo_ogn]

home_path = "${root}/source/extensions/"
ogn_exts_includes = [
    "omni.isaac.core_nodes",
    "omni.isaac.wheeled_robots",
    "omni.isaac.ros_bridge",
    "omni.isaac.ros2_bridge",
]