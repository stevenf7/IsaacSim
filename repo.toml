########################################################################################################################
# Test Runner
########################################################################################################################
[repo_test]

test_root = "$root/_build/$platform/$config"

# When running from package, look for package using that path/pattern:
archive_pattern = "${root}/_build/packages/isaac-sim-*.7z"

[repo_test.suites.startuptests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
# publish_artifacts = ["${test_root}/_build/**/*.log", "${test_root}/**/*.dmp"]

# fnmatch module is used, matching is case insensitive. Refer to: https://docs.python.org/3/library/fnmatch.html
# notice: to escape [ and ] symbols wrap them in [].
stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]
stdout_fail_patterns.exclude = [
	"*Leaking graphics objects*",  # Exclude grahics leaks until fixed
	"*leaking memory. Missing call to destroyResourceBindingSignature*",
	"*extension object is still alive*", # Ignore any leaks for startup tests to not block pipeline
	"*Failed to obtain username for current process, using cache directory without username as suffix*",  # This should be a warning but is classed as an error but seems to be an issue on the colossus machines only. https://nvidia.slack.com/archives/CGNV10TFX/p1617377550298400
  "*USD stage detach not called, holding a loose ptr to a stage!*" # caused by fast exit
]


#-----------------------------------------------------------------------------------------------------------------------
# Test Suite: 	Startup Tests
# Description: 	Just run and exit big app configuration for both smoke testing and compiling shaders.
#-----------------------------------------------------------------------------------------------------------------------

[[repo_test.suites.startuptests.group]]
# Run Kit App Full.
include = ["tests-startup*${shell_ext}"]
exclude = []
args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root ${test_root}/portable_root",
	"--portable",
	"--/log/flushStandardStreamOutput=1", # Prevents mixed up piped stdout
  "--reset-user"
]
timeout = 500

[repo_test.suites.selectortests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]
stdout_fail_patterns.exclude = [
	"*Leaking graphics objects*",  # Exclude grahics leaks until fixed
	"*leaking memory. Missing call to destroyResourceBindingSignature*",
	"*extension object is still alive*", # Ignore any leaks for startup tests to not block pipeline
	"*Failed to obtain username for current process, using cache directory without username as suffix*",  # This should be a warning but is classed as an error but seems to be an issue on the colossus machines only. https://nvidia.slack.com/archives/CGNV10TFX/p1617377550298400
]
[[repo_test.suites.selectortests.group]]
include = ["tests-selector*${shell_ext}"]
args = [
  "--/app/settings/persistent=0",
  "--/app/settings/loadUserConfig=0",
  "--/app/content/emptyStageOnStart=1",
  "--/exts/omni.kit.registry.nucleus/registries/0/name=0",
  "--portable-root ${test_root}/portable_root",
	"--portable",
	"--/log/flushStandardStreamOutput=1", # Prevents mixed up piped stdout
  "--reset-user"
]
timeout = 500

[repo_test.suites.postinstalltests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1

[[repo_test.suites.postinstalltests.group]]
include = ["omni.isaac.sim.post.install.run${shell_ext}"]
timeout = 960

[repo_test.suites.warmuptests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1

[[repo_test.suites.warmuptests.group]]
include = ["omni.isaac.sim.warmup${shell_ext}"]
timeout = 960

[repo_test.suites.pythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.pythontests.group]]
  include = ["tests-python*${shell_ext}"]
  exclude = ["tests-python-omni.isaac.gym${shell_ext}", "tests-python-omni.isaac.internal_tools*${shell_ext}", "tests-python-omni.isaac.benchmarks*${shell_ext}", "tests-python-omni.isaac.gym.benchmark*${shell_ext}", "tests-python-omni.isaac.onshape*${shell_ext}"]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 960
stdout_fail_patterns.exclude = [
	"*Remote server does not support WebSockets*",
  "*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]
[[repo_test.suites.pythontests.bucket]]
name = "1"
include = ["tests-python-omni.isaac.*benchmark_environments*${shell_ext}", "tests-python-omni.isaac.*motion*${shell_ext}", "tests-python-omni.isaac.*dynamic*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "2"
include = ["tests-python-omni.isaac.example*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "3"
include = ["tests-python-omni.isaac.ros*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "4"
include = ["tests-python-omni.isaac.core*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "5"
include = ["tests-python-omni.isaac.tests*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "6"
include = ["tests-python-omni.isaac.demo*${shell_ext}", "tests-python-omni.isaac.debug_draw*${shell_ext}", "tests-python-omni.isaac.synthetic*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "7"
include = ["tests-python-omni.isaac.*motion*${shell_ext}","tests-python-omni.isaac.*sensor*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "8"
include = ["tests-python-omni.isaac*${shell_ext}"]
[[repo_test.suites.pythontests.bucket]]
name = "9"
include = ["*"]
exclude =["tests-python-omni.isaac.internal_tools*${shell_ext}", "tests-python-omni.isaac.benchmarks*${shell_ext}", "tests-python-omni.isaac.gym.benchmark*${shell_ext}"]

[repo_test.suites.internalpythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.internalpythontests.group]]
  include = ["tests-python-omni.isaac.internal_tools*${shell_ext}", "tests-python-omni.isaac.benchmarks*${shell_ext}", "tests-python-omni.importer.onshape*${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 5000

stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]
stdout_fail_patterns.exclude = [
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]
[[repo_test.suites.internalpythontests.bucket]]
name = "1"
include = ["tests-python-omni.isaac.internal_tools*${shell_ext}", "tests-python-omni.importer.onshape*${shell_ext}"]
[[repo_test.suites.internalpythontests.bucket]]
name = "2"
include = ["tests-python-omni.isaac.benchmarks*${shell_ext}"]

[repo_test.suites.internalnativepythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.internalnativepythontests.group]]
  include = ["tests-internalnativepython*${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 960

stdout_fail_patterns.exclude = [
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
	"*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]

[repo_test.suites.nativepythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.nativepythontests.group]]
  include = ["tests-nativepython*${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 960

stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]

[[repo_test.suites.nativepythontests.bucket]]
name = "1"
include = ["tests-nativepython-replicator*${shell_ext}"]
[[repo_test.suites.nativepythontests.bucket]]
name = "2"
include = ["*"]

[repo_test.suites.jupytertests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.jupytertests.group]]
  include = ["tests-jupyter*${shell_ext}"]
  exclude =[]
  args = []
  tc_report_enabled = false
  timeout = 960

[repo_test.suites.dockertests]
kind = "glob_and_exec"
path = "${test_root}"
tests_per_process = 1
  [[repo_test.suites.dockertests.group]]
  include = ["isaac-sim.docker${shell_ext}"]
  args = ["nvidia-smi && ls && ./isaac-sim.headless.native.sh --allow-root --/app/quitAfter=500"]
  timeout = 1200
  [[repo_test.suites.dockertests.group]]
  include = ["isaac-sim.docker.gui${shell_ext}"]
  args = ["nvidia-smi && ls && ./isaac-sim.sh --allow-root --/app/quitAfter=500"]
  timeout = 1200
# stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]

[repo_test.suites.internaldockertests]
kind = "glob_and_exec"
path = "${test_root}/tests"
tests_per_process = 1
  [[repo_test.suites.internaldockertests.group]]
  include = ["tests-internaldocker*${shell_ext}"]
  timeout = 1200
# stdout_fail_patterns.include = ["*[[]error[]]*", "*[[]fatal[]]*"]

[[repo_test.suites.internaldockertests.bucket]]
name = "1"
include = ["tests-internaldocker-python*${shell_ext}"]
[[repo_test.suites.internaldockertests.bucket]]
name = "2"
include = ["*"]

# Catch2 Unit Tests
[repo_test.suites.unittests]
kind = "catch2"
default = true
executables = [
	"${test_root}/tests/tests-unit-omni.isaac.range_sensor${exe_ext}",
]

[repo_test.suites.gympythontests]
kind = "glob_and_exec"
path = "${test_root}/tests"
  [[repo_test.suites.gympythontests.group]]
  include = ["tests-python-omni.isaac.gym${shell_ext}"]
  exclude =[]
  args = ["--portable-root ${test_root}/portable_root", "--reset-user"]
  tc_report_enabled = false
  timeout = 100000
stdout_fail_patterns.exclude = [
  "*Remote server does not support WebSockets*",
  "*[Error] [rtx.optixdenoising.plugin] [Optix] [DiskCacheDatabase]*",  # optix disk cache errors
  "*[Error] [rtx.optixdenoising.plugin] [Optix] [WARNING]*", # optix disk cache errors
]

