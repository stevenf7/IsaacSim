########################################################################################################################
# NVIDIA CUDA runtime libraries (dependencies of PyTorch)
########################################################################################################################

# These nvidia-* CUDA wheels are dependencies of torch on Linux. Windows torch does not need them,
# so they are kept separate from the core ML packages in pip_ml.toml.
#
# NOTE - For any new packages added to this list, please make sure that the license is compatible with Omniverse
# (i.e. avoid GPL/LGPL) and that a SWIPAT bug report is filed for legal to validate if there is no existing ticket.
# The SWIPAT template is here: http://nvbugs/2732212

[[dependency]]
python = "../_build/target-deps/python"
packages = [
    "cuda-bindings==12.9.4",              # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cublas-cu12==12.8.4.1",       # SWIPAT filed under: NA # Used by: (dependency of nvidia-cudnn-cu12, nvidia-cusolver-cu12, torch)
    "nvidia-cuda-cupti-cu12==12.8.90",    # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cuda-nvrtc-cu12==12.8.93",    # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cuda-runtime-cu12==12.8.90",  # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cudnn-cu12==9.19.0.56",       # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cufft-cu12==11.3.3.83",       # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cufile-cu12==1.13.1.3",       # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-curand-cu12==10.3.9.90",      # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cusolver-cu12==11.7.3.90",    # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-cusparse-cu12==12.5.8.93",    # SWIPAT filed under: NA # Used by: (dependency of nvidia-cusolver-cu12, torch)
    "nvidia-cusparselt-cu12==0.7.1",      # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-nccl-cu12==2.28.9",           # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-nvjitlink-cu12==12.8.93",     # SWIPAT filed under: NA # Used by: (dependency of nvidia-cufft-cu12, nvidia-cusolver-cu12, nvidia-cusparse-cu12, torch)
    "nvidia-nvshmem-cu12==3.4.5",         # SWIPAT filed under: NA # Used by: (dependency of torch)
    "nvidia-nvtx-cu12==12.8.90",          # SWIPAT filed under: NA # Used by: (dependency of torch)
]
extra_args = ["--extra-index-url", "https://download.pytorch.org/whl/cu128"]
target = "../_build/target-deps/isaac_nv_prebundle"
platforms = ["linux-x86_64", "linux-aarch64"]
download_only = false
append_to_install_folder = true
gather_licenses_path = "../_build/PACKAGE-LICENSES/PIP-prebundled-LICENSES.txt"
install_dependencies = false
