# ocs2 is a custom dependency that is compiled and brought in from packman for omni.isaac.ocs2
# 2023-01-18 - updated to fix RPATH for dependencies
# 2023-08-07 - updated to python 3.10 and boost 1.76.0
# 2023-08-08 - fix origin path issue with libs
[[dependency]]
python = "../_build/target-deps/python"
packages = [
    "ocs2"            # SWIPAT filed under: https://nvbugs/3875854
]
target = "../_build/target-deps/isaac_ocs2_prebundle"
platforms = ["linux-x86_64"]
download_only = false
install_dependencies = false
append_to_install_folder = true
gather_licenses_path = "../_build/PACKAGE-LICENSES/PIP-prebundled-LICENSES.txt"
extra_args = ["--extra-index-url", "-i", "_build/target-deps/ocs2", "--upgrade"]
