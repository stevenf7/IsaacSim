# the scene converter is a python tool created by the SRL to export USD to URDF
[[dependency]]
python = "../_build/target-deps/python"
packages = [
    "lxml==4.9.3",                   # SWIPAT filed under: https://nvbugs/4248625
    "nvidia-srl-base==0.9.0",        # SWIPAT filed under: https://nvbugs/4235578
    "nvidia-srl-math==0.8.0",        # SWIPAT filed under: https://nvbugs/4235574
    "nvidia-srl-usd==0.13.0",        # SWIPAT filed under: https://nvbugs/4235568
    "nvidia-srl-usd-to-urdf==0.5.0", # SWIPAT filed under: https://nvbugs/4235566
    "setuptools_scm==8.0.4",         # SWIPAT filed under: https://nvbugs/4248640
    "tomli==2.0.1",                  # SWIPAT filed under: https://nvbugs/4411305
]
target = "../_build/target-deps/isaac_usd_to_urdf_prebundle"
platforms = ["*-x86_64"]
download_only = false
install_dependencies = false
append_to_install_folder = true
gather_licenses_path = "../_build/PACKAGE-LICENSES/PIP-prebundled-LICENSES.txt"
extra_args = ["--index-url", "https://gitlab-master.nvidia.com/api/v4/groups/4131/-/packages/pypi/simple"]
