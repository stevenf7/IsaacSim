# Target kit 109.x
# MuJoCo USD Converter for MJCF import
# Based on: https://github.com/newton-physics/mujoco-usd-converter

[[dependency]]
python = "../_build/target-deps/python"
packages = [
    "mujoco-usd-converter==0.1.0a7",  # Newton Physics MJCF to USD converter
]
target = "../_build/target-deps/isaac_mujoco_usd_prebundle"
platforms = ["*-x86_64", "*-aarch64"]
download_only = false
install_dependencies = true
append_to_install_folder = true
gather_licenses_path = "../_build/PACKAGE-LICENSES/PIP-prebundled-LICENSES.txt"
extra_args = ["--extra-index-url", "https://pypi.org/simple"]

