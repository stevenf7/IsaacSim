    "torchvision==0.26.0+cu128", # SWIPAT filed under: https://nvbugs/3433812 # Used by: (none found)
    "torchaudio==2.11.0+cu128", # SWIPAT filed under: https://nvbugs/5326960 # Used by: (none found)

    # dependencies
    "filelock==3.25.2", # SWIPAT filed under: https://nvbugs/5303100 # Used by: (dependency of torch)
    "fsspec==2026.2.0", # SWIPAT filed under: https://nvbugs/5303035 # Used by: (dependency of torch)
    "mpmath==1.3.0", # SWIPAT filed under: https://nvbugs/5303037 # Used by: (dependency of sympy)
    "networkx==3.6.1", # SWIPAT filed under: https://nvbugs/5303034 # Used by: (dependency of torch)
    "sympy==1.14.0", # SWIPAT filed under: https://nvbugs/5303081 # Used by: (dependency of torch)
