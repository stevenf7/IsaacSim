# ==============================================================================================================
# By default, all platforms (windows-x86_64, linux-x86_64) are published,
# but this can be changed in repo.toml config if necessary:
#    [repo_publish_exts]
#    platforms = ["linux-x86_64"]
verify-publish-extensions:
    extends:
      - .deploy-common
      - .runner-utility-linux-x86_64
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.6-97c67f00
    script:
      - ./repo.sh build --fetch-only -rd
      - ./repo.sh publish_exts -a --from-package -c release --verify
      - ./repo.sh publish_exts -a --from-package -c debug --verify
      # - ./repo.sh ci publish_extensions
    needs:
      # We set all dependencies as optional just in case a platform is not needed,
      # then the yml file can override both build/test on one platform and deploy will still work.
      - job: build-windows-x86_64-release
        artifacts: true
        optional: false
      - job: build-linux-x86_64-release
        artifacts: true
        optional: false
      - job: build-windows-x86_64-debug
        artifacts: true
        optional: false
      - job: build-linux-x86_64-debug
        artifacts: true
        optional: false
      #   - job: test-windows-x86_64-startuptests
      #     artifacts: false
      #     optional: true
      #   - job: test-linux-x86_64-startuptests
      #     artifacts: false
      #     optional: true
    rules:
      - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.rules-push, rules]
      # - !reference [.rules-version-changed, rules]


      # ==============================================================================================================
      # By default, all platforms (windows-x86_64, linux-x86_64) are published,
      # but this can be changed in repo.toml config if necessary:
      #    [repo_publish_exts]
      #    platforms = ["linux-x86_64"]
      # Currently, extensions are published frome the 'develop' branch only
publish-extensions:
    extends:
      - .deploy-common
      - .runner-utility-linux-x86_64
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.6-97c67f00
    script:
      - ./repo.sh build --fetch-only -rd
      - ./repo.sh publish_exts -a --from-package -c release
      - ./repo.sh publish_exts -a --from-package -c debug
    needs:
      # We set all dependencies as optional just in case a platform is not needed,
      # then the yml file can override both build/test on one platform and deploy will still work.
      - job: build-windows-x86_64-release
        artifacts: true
        optional: false
      - job: build-linux-x86_64-release
        artifacts: true
        optional: false
      - job: build-windows-x86_64-debug
        artifacts: true
        optional: false
      - job: build-linux-x86_64-debug
        artifacts: true
        optional: false
    rules:
      - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - if: '$CI_COMMIT_BRANCH != "develop"'
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

# ==============================================================================================================
publish-python-packages-linux:
    extends:
      - .deploy-common
      - .runner-build-linux-x86_64
    script:
      - ./repo.sh unzip_file --file _build/packages/isaac-sim-standalone*.linux-x86_64.release.7z --dst _build/linux-x86_64/release
      - ls _build/linux-x86_64/release
      - ./repo.sh python_package --create
      - ./repo.sh comment_archive_deps
      - ./repo.sh python_package --wheel
      - ls _build/packages/dist
      - ./repo.sh python_package --publish
    needs:
      - job: build-linux-x86_64-release
        artifacts: true
    rules:
      - if: $ALLOW_PUBLISH_PYTHON_PACKAGES != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

publish-python-packages-windows:
    extends:
      - .deploy-common
      - .runner-build-windows-x86_64
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      - ./repo.bat unzip_file --file _build/packages/isaac-sim-standalone*.windows-x86_64.release.7z --dst _build/windows-x86_64/release
      - ls _build/windows-x86_64/release
      - ./repo.bat python_package --create
      - ./repo.bat comment_archive_deps
      - ./repo.bat python_package --wheel
      - ls _build/packages/dist
      - ./repo.bat python_package --publish
    needs:
      - job: sign-windows-x86_64-release
        artifacts: true
    rules:
      - if: $ALLOW_PUBLISH_PYTHON_PACKAGES != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

verify-publish-python-packages-linux:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .runner-test-linux-x86_64-gpu
    script:
      # install Python 3.10
      - sudo apt update
      - sudo apt -y install python3.10-venv
      # create and source a virtual environment
      - python3.10 -m venv env_isaacsim
      - source env_isaacsim/bin/activate
      # upgrade pip and install Isaac Sim - Python packages
      - pip install --upgrade pip
      - pip install -r _build/packages/python/requirements.txt --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/ct-omniverse-pypi/simple
      # accept EULA
      - export OMNI_KIT_ACCEPT_EULA=YES
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedOnExit=1 --no-window
    needs:
      - job: publish-python-packages-linux
        artifacts: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

verify-publish-python-packages-windows:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .runner-test-windows-x86_64-gpu
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      # install Python 3.10
      - curl -o python-3.10.exe https://www.python.org/ftp/python/3.10.11/python-3.10.11-amd64.exe
      - cmd /c start /wait python-3.10.exe /quiet TargetDir=C:\Python310
      # create and source a virtual environment
      - C:\Python310\python.exe -m venv C:\env_isaacsim
      - C:\env_isaacsim\Scripts\python.exe -m pip install --upgrade pip
      - C:\env_isaacsim\Scripts\activate.ps1
      # install Isaac Sim - Python packages
      - pip install -r _build/packages/python/requirements.txt --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/ct-omniverse-pypi/simple
      # accept EULA
      - $env:OMNI_KIT_ACCEPT_EULA = "YES"
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedOnExit=1 --no-window
    needs:
      - job: publish-python-packages-windows
        artifacts: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

