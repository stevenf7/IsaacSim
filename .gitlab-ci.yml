# ==============================================================================================================
#
# ── IsaacLab CI Jobs ───────────────────────────────────────────────────────────────────────────────────────────
#
# All IsaacLab-related jobs are collected here for clear separation from Isaac Sim CI above.
# Ordering reflects the pipeline DAG: shared templates → test runs → dashboard & notifications.
#
# ==============================================================================================================

# ==============================================================================================================
# Shared variables for the IsaacLab dashboard producer/consumer pair.
# Historical data is now transmitted via an evergreen artifact (see
# tools/ci/dashboards/fetch_latest_cache.sh): get-isaac-lab-historical-data
# hydrates from the most recent successful run of itself on the default
# branch, then publishes a fresh _isaaclab_cache/ artifact that
# generate-isaac-lab-dashboard consumes via `needs: artifacts: true`.
# GitLab `cache:` was previously used here but is unreliable across
# runners — it has been removed in favour of the artifact path.
.isaac-lab-dashboard-cache:
    variables:
        ISAAC_LAB_BRANCH: "develop"
        # Newline-separated list of omni_isaac_sim branches whose historical GitLab
        # pipelines are fetched and displayed in the Isaac Sim CI dropdown.
        ISAAC_LAB_CI_REPORT_BRANCHES: |
            develop
            develop-kit-tot
            kit-integration/master
            kit-integration/feature/110.1
            kit-integration/production/110.1
            kit-integration/major/111
            kit-integration/feature/main

# ==============================================================================================================
# Shared rules for IsaacLab test/agent jobs.
.isaac-test-rules:
  rules:
    - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_TESTS != "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

# Same conditions as .isaac-test-rules but always runs (even when upstream jobs fail).
# Used for dashboard generation and Slack notification jobs that must surface failures.
.isaac-test-rules-always:
  rules:
    - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_TESTS != "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED == "true"
      when: always
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never

# ==============================================================================================================
# Fetch historical IsaacLab test data from GitLab CI + GitHub mirror.
# Runs automatically on every qualifying pipeline to keep the cache fresh.
get-isaac-lab-historical-data:
    stage: test
    dependencies: []
    extends:
      - .isaac-lab-dashboard-cache
      - .ipp_lnx_x86_64_cpu_small
      # Always run so the dashboard's hard `needs:` on this job doesn't get
      # blocked when an unrelated upstream (e.g. build) fails.
      - .isaac-test-rules-always
    # Failures still don't block the pipeline — we publish whatever cache
    # state we managed to seed (`when: always` on artifacts), and the
    # dashboard consumes that via `needs: artifacts: true`.
    allow_failure: true
    artifacts:
        expire_in: 1 week
        when: always
        paths:
          - _isaaclab_cache/
    script:
      # Evergreen seed: hydrate _isaaclab_cache/ from the most recent successful
      # run of this same job on the default branch.  This makes the cache
      # transmission durable across pipelines without relying on GitLab's
      # runner-affinity-bound `cache:` mechanism.
      - >
        ./tools/ci/dashboards/fetch_latest_cache.sh
        --project "${CI_PROJECT_PATH}"
        --job get-isaac-lab-historical-data
        --ref "${CI_DEFAULT_BRANCH:-develop}"
        --dest .
      - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
      - echo "=== GitLab / GitHub API (GITLAB_AUTH_TOKEN, GITHUB_NVIDIA_DEV_TOKEN) ==="
      - ./tools/packman/python.sh tools/ci/dashboards/verify_api_tokens.py
      # Historical GitLab + GitHub data — appended on top of the evergreen seed.
      - |
        set +e
        ERR_COUNT=0
        echo "=== Historical GitLab fetch (optional) ==="
        while IFS= read -r REPORT_BRANCH; do
          [ -z "$REPORT_BRANCH" ] && continue
          echo "--- Fetching branch: $REPORT_BRANCH ---"
          ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py \
            fetch-gitlab \
            --config tools/ci/dashboards/config_isaac_lab.yml \
            --isaac-sim-branch "$REPORT_BRANCH" \
            --isaac-lab-branch "${ISAAC_LAB_BRANCH:-develop}" \
            --data-dir _isaaclab_cache
          if [ $? -ne 0 ]; then
            echo "${RED}Error: historical GitLab fetch failed for branch $REPORT_BRANCH.${RESET}" >&2
            ERR_COUNT=$((ERR_COUNT + 1))
          fi
        done <<< "${ISAAC_LAB_CI_REPORT_BRANCHES:-develop}"
        echo "=== Historical GitHub fetch ==="
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py fetch-github --config tools/ci/dashboards/config_isaac_lab.yml --data-dir _isaaclab_cache
        if [ $? -ne 0 ]; then
          echo "${RED}Error: historical GitHub fetch (ci_dashboard.py fetch-github) failed.${RESET}" >&2
          ERR_COUNT=$((ERR_COUNT + 1))
        fi
        if [ "$ERR_COUNT" -gt 0 ]; then
          echo "${RED}Historical fetch finished with ${ERR_COUNT} error(s).${RESET}" >&2
        fi

# ==============================================================================================================
.test-linux-x86_64-isaac-lab-integration-base:
  stage: test
  needs:
    - job: build-linux-x86_64-release
      artifacts: true
  extends:
    - .ipp_lnx_x86_64_gpu
    - .kit-runner-test-linux-x86_64-1x-gpu
  script:
    - ./repo.sh ci test_isaaclab
  allow_failure: false
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - _isaaclab/tests/*
    reports:
      junit:
        - '_isaaclab/tests/full_report.xml'

test-linux-x86_64-isaac-lab-integration:
  extends:
    - .test-common
    - .test-linux-x86_64-isaac-lab-integration-base
    - .isaac-test-rules
  # Test failures return exit code 42, but failures of the test job itself (e.g. pytest crashing) return exit code 66.
  # allow_failure has been disabled to enforce the contract that IsaacLab tests are gating to pipeline success.
  variables:
    ISAACSIM_CI_SHORT: "true"
    IPP_RUNNER_EXECUTION_DURATION: 21600 # 6 hours

test-linux-x86_64-isaac-lab-integration-nightly:
  variables:
    IPP_RUNNER_EXECUTION_DURATION: 43200 # 12 hours
  extends:
    - .test-nightly
    - .test-linux-x86_64-isaac-lab-integration-base

# ==============================================================================================================
# Dashboard generation, Slack notification, and AI failure analysis.
generate-isaac-lab-dashboard:
    stage: report-results
    allow_failure: true
    extends:
      - .isaac-lab-dashboard-cache
      - .ipp_lnx_x86_64_cpu_small
      - .isaac-test-rules-always
    # Hard dependency on the historical-data fetch.  Without its artifact
    # the slack subcommand can't compute regressions ("Failed to fetch
    # baseline test report") and the dashboard renders against an empty
    # cache, so we wait for it explicitly and consume its artifact directly
    # instead of relying on the stage-level `dependencies:` model.
    needs:
      - job: get-isaac-lab-historical-data
        artifacts: true
    script:
      - export TZ="America/Los_Angeles"
      # Installing kaleido/chrome deps here so the heatmap PNG can be rendered
      # in this job (previously lived in the post-to-*-slack jobs).
      - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2
      - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
      # Fetch the current pipeline's results (bypasses scope=finished since the pipeline is still running).
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        fetch-gitlab
        --config tools/ci/dashboards/config_isaac_lab.yml
        --isaac-sim-branch "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_COMMIT_REF_NAME:-develop}}"
        --isaac-lab-branch "${ISAAC_LAB_BRANCH:-develop}"
        --extra-pipeline-id "${CI_PIPELINE_ID}"
        --max-runs 1
        --data-dir _isaaclab_cache
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        generate
        --config tools/ci/dashboards/config_isaac_lab.yml
        --data-dir _isaaclab_cache
        --output-dir _isaaclab_cache/output
      # Render the test heatmap alongside the dashboard so every artifact for
      # this dashboard lands in a single output directory.
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        heatmap
        --config tools/ci/dashboards/config_isaac_lab.yml
        --output-dir _isaaclab_cache/output
    artifacts:
        expire_in: 2 weeks
        when: always
        paths:
          - _isaaclab_cache/output/

# ==============================================================================================================
# Posts IsaacLab test results to Slack.  Consumes artifacts produced by
# generate-isaac-lab-dashboard — this job does not generate anything.
post-to-isaac-lab-slack:
  stage: report-results
  extends:
    - .ipp_lnx_x86_64_cpu_small
    - .isaac-test-rules-always
  # Hard `needs:` (no `optional: true`) — if the dashboard didn't produce an
  # artifact there is no baseline to diff against, and posting a degraded
  # report is worse than posting nothing.  Skipping this job cleanly is the
  # intended behaviour in that case.
  needs:
    - job: generate-isaac-lab-dashboard
      artifacts: true
  script:
    - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
    - ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py slack --config tools/ci/dashboards/config_isaac_lab.yml
  artifacts:
    paths:
      - regressions.txt
    expire_in: 1 week

# ==============================================================================================================
# Analyzes IsaacLab test failures using an AI agent and suggests code fixes.
# Runs in the same stage as generate-isaac-lab-dashboard, after the test jobs complete.
# NOTE: This job is currently disabled as it is an experimental feature that has lower priorities for now.
#       It has been left in place for future reference and potential re-enabling.
.agent-analyze-isaac-lab-failures:
  stage: report-results
  image:
    name: urm.nvidia.com/ct-omniverse-docker/ci-opencode-runner:latest
    pull_policy: always
  extends:
    - .ipp_lnx_x86_64_cpu_small
    - .isaac-test-rules
  variables:
    IPP_RUNNER_EXECUTION_DURATION: 7200 # 2 hours
    NVIDIA_API_KEY: $INFERENCE_API_KEY
    AGENT_MODEL: "nvidia-hub/azure/anthropic/claude-sonnet-4-6"
    AGENT_RESULT_DIR: "${CI_PROJECT_DIR}/agent-results"
    AGENT_ALLOWED_TOOLS: "Read,Glob,Grep,Bash(python3 *)"
    AGENT_PROMPT: |
      You are analyzing CI test failures for Isaac Sim / IsaacLab.

      The JUnit XML test results are at `_isaaclab/tests/full_report.xml`.
      The Isaac Sim source code is under `source/`.
      The IsaacLab source code is under `_isaaclab-src/`.
      The Kit source code, if present, is under `_kit-src/` (only available on
      kit-integration/* branches — check whether it exists before using it).

      Step 1 — Parse the results.
      Use python3 to parse the XML and count totals: passed, failed, errored, skipped.
      If there are no failures or errors, write a brief summary to
      agent-results/isaaclab-analysis.md and stop.

      Step 2 — For each failed or errored test (up to 10, prioritized by error type):
        a. Extract: test name, classname, failure message, and full stack trace.
        b. Search source/, _isaaclab-src/, and _kit-src/ (if present) for files
            relevant to the classname or symbols in the stack trace.
        c. Read those files and identify the most likely root cause.
        d. Classify as one of: REGRESSION, ENVIRONMENT, FLAKY, or UPSTREAM_ISAACSIM.
        e. For REGRESSION or UPSTREAM_ISAACSIM: propose a specific fix with the file path,
            line number, and what to change or investigate.

      Step 3 — Write agent-results/isaaclab-analysis.md with this structure:
        ## Summary
        Total: X passed, Y failed, Z errored, W skipped.

        ## Failed Tests
        One subsection per failure with: test name, classification, root cause explanation,
        and suggested fix if applicable.

        ## Prioritized Fixes
        Ranked list of actionable code changes (most impactful first).

        ## Verdict
        One of: ALL_PASSED | REGRESSIONS_FOUND | ENVIRONMENT_ISSUES | NEEDS_INVESTIGATION
  needs:
    - job: test-linux-x86_64-isaac-lab-integration
      artifacts: true
      optional: true
    - job: test-linux-x86_64-isaac-lab-integration-nightly
      artifacts: true
      optional: true
  script:
    - |
      if [ ! -f "_isaaclab/tests/full_report.xml" ]; then
        echo "No test results found at _isaaclab/tests/full_report.xml -- skipping analysis."
        exit 0
      fi
    - git clone "https://${GITHUB_NVIDIA_DEV_TOKEN}@github.com/isaac-sim/IsaacLab.git"
        --depth=1 --branch "${ISAAC_LAB_BRANCH:-develop}" _isaaclab-src
    - |
      if [[ "${CI_COMMIT_REF_NAME}" == kit-integration/* ]]; then
        KIT_BRANCH="${CI_COMMIT_REF_NAME#kit-integration/}"
        echo "Cloning Kit branch ${KIT_BRANCH} for analysis..."
        git clone "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab-master.nvidia.com/omniverse/kit.git" \
          --depth=1 --branch "${KIT_BRANCH}" _kit-src
      fi
    - /opt/opencode-runner/entrypoint.sh
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - agent-results/
  allow_failure: true

# ==============================================================================================================
# ── IsaacSim Dashboard Jobs ───────────────────────────────────────────────────────────────────────────────────
#
# These jobs generate an interactive test dashboard for IsaacSim using the same pipeline as the IsaacLab
# dashboard.  Test data is fetched from the omni_isaac_sim GitLab CI pipeline (all non-excluded test jobs,
# stored as collapsible sections grouped by job name) and optionally from the isaac-sim/IsaacSim GitHub mirror.
#
# To populate the cache, run get-isaacsim-historical-data manually from the CI pipeline UI.
# ==============================================================================================================

# Shared variables for the IsaacSim dashboard producer/consumer pair.  Same
# evergreen-artifact transmission model as .isaac-lab-dashboard-cache; see
# tools/ci/dashboards/fetch_latest_cache.sh.  GitLab `cache:` was previously
# used here but is unreliable across runners — it has been removed in favour
# of the artifact path.
.isaac-sim-dashboard-cache:
    variables:
        ISAACSIM_BRANCH: "develop"
        # Newline-separated list of omni_isaac_sim branches whose historical GitLab
        # pipelines are fetched and displayed in the IsaacSim CI dropdown.
        ISAACSIM_CI_REPORT_BRANCHES: |
            develop
            develop-kit-tot
            kit-integration/master
            kit-integration/feature/main

# ==============================================================================================================
# Fetch historical IsaacSim test data from GitLab CI + GitHub mirror.
# Runs automatically on every qualifying pipeline to keep the cache fresh.
get-isaac-sim-historical-data:
    stage: test
    dependencies: []
    extends:
      - .isaac-sim-dashboard-cache
      - .ipp_lnx_x86_64_cpu_small
      # Always run so the dashboard's hard `needs:` on this job doesn't get
      # blocked when an unrelated upstream (e.g. build) fails.
      - .isaac-test-rules-always
    allow_failure: true
    artifacts:
        expire_in: 1 week
        when: always
        paths:
          - _isaacsim_cache/
    script:
      # Evergreen seed: hydrate _isaacsim_cache/ from the most recent successful
      # run of this same job on the default branch.
      - >
        ./tools/ci/dashboards/fetch_latest_cache.sh
        --project "${CI_PROJECT_PATH}"
        --job get-isaac-sim-historical-data
        --ref "${CI_DEFAULT_BRANCH:-develop}"
        --dest .
      - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
      - echo "=== GitLab / GitHub API (GITLAB_AUTH_TOKEN, GITHUB_NVIDIA_DEV_TOKEN) ==="
      - ./tools/packman/python.sh tools/ci/dashboards/verify_api_tokens.py
      - |
        set +e
        ERR_COUNT=0
        echo "=== IsaacSim historical GitLab fetch ==="
        while IFS= read -r REPORT_BRANCH; do
          [ -z "$REPORT_BRANCH" ] && continue
          echo "--- Fetching branch: $REPORT_BRANCH ---"
          ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py \
            fetch-gitlab \
            --config tools/ci/dashboards/config_isaac_sim.yml \
            --isaac-sim-branch "$REPORT_BRANCH" \
            --data-dir _isaacsim_cache
          if [ $? -ne 0 ]; then
            echo "${RED}Error: IsaacSim GitLab fetch failed for branch $REPORT_BRANCH.${RESET}" >&2
            ERR_COUNT=$((ERR_COUNT + 1))
          fi
        done <<< "${ISAACSIM_CI_REPORT_BRANCHES:-develop}"
        echo "=== IsaacSim GitHub fetch ==="
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py \
          fetch-github \
          --config tools/ci/dashboards/config_isaac_sim.yml \
          --data-dir _isaacsim_cache
        if [ $? -ne 0 ]; then
          echo "${RED}Error: IsaacSim GitHub fetch failed.${RESET}" >&2
          ERR_COUNT=$((ERR_COUNT + 1))
        fi
        if [ "$ERR_COUNT" -gt 0 ]; then
          echo "${RED}Historical fetch finished with ${ERR_COUNT} error(s).${RESET}" >&2
        fi

# ==============================================================================================================
# Generates the IsaacSim dashboard HTML from the cached historical data.
generate-isaac-sim-dashboard:
    stage: report-results
    extends:
      - .isaac-sim-dashboard-cache
      - .ipp_lnx_x86_64_cpu_small
      - .isaac-test-rules-always
    allow_failure: true
    # Hard dependency on the historical-data fetch — see the matching note
    # on generate-isaac-lab-dashboard.
    needs:
      - job: get-isaac-sim-historical-data
        artifacts: true
    script:
      - export TZ="America/Los_Angeles"
      # Installing kaleido/chrome deps here so the heatmap PNG can be rendered
      # in this job (previously lived in the post-to-*-slack jobs).
      - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2
      - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
      # Fetch the current pipeline's results (bypasses scope=finished since the pipeline is still running).
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        fetch-gitlab
        --config tools/ci/dashboards/config_isaac_sim.yml
        --isaac-sim-branch "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_COMMIT_REF_NAME:-develop}}"
        --extra-pipeline-id "${CI_PIPELINE_ID}"
        --max-runs 1
        --data-dir _isaacsim_cache
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        generate
        --config tools/ci/dashboards/config_isaac_sim.yml
        --data-dir _isaacsim_cache
        --output-dir _isaacsim_cache/output
      # Render the test heatmap alongside the dashboard so every artifact for
      # this dashboard lands in a single output directory.
      - >
        ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py
        heatmap
        --config tools/ci/dashboards/config_isaac_sim.yml
        --output-dir _isaacsim_cache/output
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _isaacsim_cache/output/

# ==============================================================================================================
# Slack notifications
.post_job_status_to_slack:
  after_script:
    - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
    - ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py slack --config tools/ci/dashboards/config_isaac_sim.yml --job-report

post-to-isaac-sim-slack:
  stage: report-results
  extends:
    - .ipp_lnx_x86_64_cpu_small
    - .isaac-test-rules-always
  # Hard `needs:` — see the matching note on post-to-isaac-lab-slack.
  needs:
    - job: generate-isaac-sim-dashboard
      artifacts: true
  script:
    - ./tools/packman/python.sh -m pip install -r tools/ci/requirements.txt --quiet
    - ./tools/packman/python.sh tools/ci/dashboards/ci_dashboard.py slack --config tools/ci/dashboards/config_isaac_sim.yml
  artifacts:
    paths:
      - regressions.txt
    expire_in: 1 week
