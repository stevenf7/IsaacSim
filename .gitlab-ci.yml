test-container:
  extends:
    - .test-common
    - .ipp_lnx_x86_64_gpu
    - .kit-runner-test-linux-x86_64-1x-gpu
  image: gitlab-master.nvidia.com:5005/omniverse/isaac/omni_isaac_sim/isaac-sim${MR_SUFFIX}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}-x86_64
  # variables:
  #   GIT_STRATEGY: none
  parallel:
    matrix:
      - BUCKET:
        - deprecated
        - asset
        - core
        - examples_tests
        - replicator
        - ros
        - sensors
        - utils_gui
        - robot
  script:
    - pushd /isaac-sim
    - ls -lash
    - echo "Okay wasn't sure if this would work"
    - ./python.sh run_tests.py --suite pythontests --bucket ${BUCKET}
    - popd
    - cp -r /isaac-sim/.local/share/ov/data/_testoutput .
    - cp _testoutput/ext_test_results.txt _testoutput/repo_test_results.txt
    - /isaac-sim/python.sh tools/ci/standalone_report.py  _testoutput ${BUCKET}
  stage: deploy-test
  allow_failure: true
  needs:
    - job: publish-container-x86_64
      artifacts: false
  rules:
    - !reference [.container-rules, rules]
  artifacts:
    paths:
      - _testoutput
    expire_in: 1 week
    when: always
    reports:
      junit:
        - "_testoutput/*.xml"

