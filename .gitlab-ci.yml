# ==============================================================================================================
.deploy-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    - _build/**/*.log
    - _repo/repo.log
    - _repo/repolog*.txt
    - _logs/**/*.log


# ==============================================================================================================
.deploy-common:
  stage: deploy
  extends:
  - .deploy-artifacts
  timeout: 3 hour
  interruptible: false
  before_script:
  - set -eu
  - !reference [.omni_codesign_get_secrets, omni_codesign_get_secrets]
  - !reference [.omni_s3_write_get_secrets, omni_s3_write_get_secrets]
  rules:
  - if: $RUN_DOCS_BUILD == "true" || RUN_NIGHTLY_TESTS=="true"
    when: never

pages:
  stage: pages
  extends:
  - .build-common
  - .runner-build-linux-x86_64
  before_script:
  - set -eu
  - yum install -y p7zip p7zip-plugins
  script:
  - mkdir .public
  - ls
  - mv omni-docs/_build/docs/* .public/
  - ls .public
  - 7z x _build/packages/docs@*.7z -oisaacsim
  - mkdir -p .public/py/
  - mv isaacsim .public/py/
  - ls .public/py/isaacsim
  - mv .public public
  artifacts:
    paths:
    - public
  rules:
  - !reference [.rules-build-docs, rules]
  needs:
  - job: build-linux-x86_64-release
    artifacts: true
  - job: build-docs
    artifacts: true

build-docs:
  extends:
  - .build-common
  - .runner-build-linux-x86_64
  timeout: 3 hours
  before_script:
  - set -eu
  - yum install -y bsdtar
  - !reference [.omni_s3_write_get_secrets, omni_s3_write_get_secrets]
  script:
  - git clone --depth=1 -b isaac_sim --single-branch https://gitlab-master.nvidia.com/omniverse/omni-docs.git
  - pushd omni-docs
  - ./repo docs --warn-as-error=0
  - ./repo docs --stage sphinx
  - ./repo docs --stage post
  - popd
  rules:
  - !reference [.rules-build-docs, rules]
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    - omni-docs/_build/docs


# ==============================================================================================================
.benchmark-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    - '_testoutput/benchmark.*.json'
    - .reggie-out/

# ==============================================================================================================
.benchmark-common:
  stage: test
  timeout: 1 hour
  interruptible: true
  extends:
  - .benchmark-artifacts
  variables:
    MAX_RETRIES: 2
  retry: 2
  rules:
  - if: $RUN_EXTENSION_BENCHMARKS != "true"
    when: never
  - !reference [.rules-workflow, rules]


# ==============================================================================================================
benchmark-linux-x86_64:
  extends:
  - .benchmark-common
  tags:
  - instance/gitlab-gtl-performance
  - omni-perf-only/linux
  variables:
    MACHINE_OS: "ubuntu22"
    MACHINE_KIND: "AMD EPYC 7313P"
    MACHINE_DRIVER: "NVIDIA-Linux-x86_64-525.85.05"
  script:
  - ./repo.sh bench
  - !reference [.reggie_detect_ubuntu, commands]
  needs:
  - job: build-linux-x86_64-release
    artifacts: true


# ==============================================================================================================
benchmark-windows-x86_64:
  extends:
  - .benchmark-common
  tags:
  - instance/gitlab-gtl-performance
  - omni-perf-only/windows
  variables:
    MACHINE_OS: "windows10-20H2"
    MACHINE_KIND: "AMD EPYC 7313P"
    MACHINE_DRIVER: "537.70-sandbag_UDA_QuadroWeb_Public-wddm2-x64-dch-AttestedDriverSigning"
  script:
  - ./repo.bat bench
  - !reference [.reggie_detect_windows, commands]
  needs:
  - job: build-windows-x86_64-release
    artifacts: true



