# ==============================================================================================================
publish-to-packman:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_small
    script:
      - ls _build/packages/
      - ./repo.sh publish_packages
    needs:
      - job: sign-windows-x86_64-release
        artifacts: true
      - job: build-linux-x86_64-release
        artifacts: true
      - job: build-linux-aarch64-release
        artifacts: true
        optional: true
      - job: build-windows-x86_64-debug
        artifacts: true
        optional: true
      - job: build-linux-x86_64-debug
        artifacts: true
        optional: true
      - job: build-linux-aarch64-debug
        artifacts: true
        optional: true
    retry:
        max: 2
        when:
          - always
    rules:
      - if: $ALLOW_PUBLISH_TO_PACKMAN != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly" && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
        allow_failure: true
      # Allow execution when triggered by nightly upstream pipeline
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly"
        when: manual
        allow_failure: true
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

# ==============================================================================================================
# Generate and publish isaacsim.etm.list.isaacsim_app_template.* from source/apps/isaacsim.exp.extscache.kit
# It's safe to always run the job. The operation will be skipped if there is no change comparing to the latest version.
publish-etm-list:
  extends:
    - .deploy-common
    - .ipp_lnx_x86_64_cpu_small
  image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a
  timeout: 1 hour
  script:
    - ./repo.sh build --fetch-only -r
    - ./repo.sh ci generate_etm_list
    - mkdir -p _build/linux-x86_64/release/exts && cp -f source/apps/*.etm.list.*.kit _build/linux-x86_64/release/exts
    - ./repo.sh publish_exts -c release
  # needs: []  # Test it immediately, for development
  needs:
    - job: publish-extensions
      artifacts: false
      optional: true
  dependencies: []
  rules:
    # For development: allow manual testing independently.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - source/apps/isaacsim.exp.extscache.kit
      when: manual
      allow_failure: true
    # For production: match rules of publish-extensions.
    - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
      when: never
    - if: $RUN_BUMP_VERSION == "true"
      when: never
    - if: '$CI_COMMIT_BRANCH != "develop"'
      when: never
    - !reference [.rules-version-changed, rules]
    - !reference [.rules-push-manual, rules]
  interruptible: false

