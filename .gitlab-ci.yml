check-python-packages-dependencies-linux-x86_64:
  extends:
    - .repo-artifacts
    - .check-common
    - .runner-utility-linux-x86_64
  stage: check-externals
  needs: []
  allow_failure: true
  script:
    - ./repo.sh check_python_package_definitions --gitlab
    # check for dependency conflicts
    - apt update
    - apt install -y python3.11-venv
    - python3.11 -m venv _env_dependency_check
    - source _env_dependency_check/bin/activate
    - pip install --upgrade pip
    - pip install -r python-package-requirements-linux-x86_64.txt  # exported from check_python_package_definitions

check-python-packages-dependencies-linux-aarch64:
  extends:
    - .repo-artifacts
    - .check-common
    - .runner-build-linux-aarch64
  stage: check-externals
  needs: []
  allow_failure: true
  script:
    - ./repo.sh check_python_package_definitions --gitlab
    # check for dependency conflicts
    - apt update
    - apt install -y python3.11-venv python3.11-dev
    - python3.11 -m venv _env_dependency_check
    - source _env_dependency_check/bin/activate
    - pip install --upgrade pip
    - pip install -r python-package-requirements-linux-aarch64.txt  # exported from check_python_package_definitions

check-python-packages-dependencies-windows-x86_64:
  extends:
    - .repo-artifacts
    - .check-common
    - .runner-utility-windows-x86_64
  stage: check-externals
  needs: []
  allow_failure: true
  script:
    - ./repo.bat check_python_package_definitions --gitlab
    # check for dependency conflicts
    # - install Python 3.11
    - curl -o python-3.11.exe https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe
    - cmd /c start /wait python-3.11.exe /quiet TargetDir=C:\Python311
    # - create and source a virtual environment
    - C:\Python311\python.exe -m venv C:\_env_dependency_check
    - C:\_env_dependency_check\Scripts\python.exe -m pip install --upgrade pip
    - C:\_env_dependency_check\Scripts\activate.ps1
    # - install dependencies
    - pip install -r python-package-requirements-windows-x86_64.txt  # exported from check_python_package_definitions

