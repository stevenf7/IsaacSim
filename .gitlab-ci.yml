    extends:
      - .deploy-common
      - .runner-utility-linux-x86_64
    variables:
        # Required access tokens for publishing to S3
        AWS_ACCESS_KEY_ID: $AWS_OMNIVERSEDOCS_ACCESS_KEY_ID
        AWS_SECRET_ACCESS_KEY: $AWS_OMNIVERSEDOCS_SECRET_ACCESS_KEY
    needs: []
    script:
      - curl -o ./artifact.zip  https://gitlab-master.nvidia.com/api/v4/projects/25020/jobs/artifacts/release/4.2/download?job=build-linux-x86_64-release
      - unzip artifact.zip
      - mkdir -p /builds/omniverse/isaac/omni_isaac_sim/_build/docs/isaac_sim/latest
      - 7z x _build/packages/docs@*.7z -o/builds/omniverse/isaac/omni_isaac_sim/_build/docs/isaac_sim/latest
      - ./repo.sh docs --config release --stage publish --edition production
    rules:
      - if: $ALLOW_PUBLISH_DOCS != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

