# ==============================================================================================================
verify-stage-to-gitlab:
    stage: verify-github-staging
    timeout: 1 hour
    interruptible: true
    allow_failure: true
    extends:
      - .runner-utility-linux-x86_64
    script:
      - ./tools/ci/check_github_staging/check_github_staging.sh _git/isaacsim_staging
    needs:
      - job: stage-to-gitlab
        optional: true
    rules:
      - if: $CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+_oss$/
      - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  =~ /^release\/\d+\.\d+_oss$/
    artifacts:
      expire_in: 2 weeks
      when: always
      paths:
        - results.json
        - results_by_file.json


