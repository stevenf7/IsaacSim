# By default, all platforms (windows-x86_64, linux-x86_64) are published,
# but this can be changed in repo.toml config if necessary:
#    [repo_publish_exts]
#    platforms = ["linux-x86_64"]
verify-publish-extensions:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_small
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a
    script:
      - ./repo.sh build --fetch-only -r
      - ./repo.sh publish_exts -a --from-package --verify
      # - ./repo.sh ci publish_extensions
    variables:
      IPP_RUNNER_EPHEMERAL_STORAGE_REQUEST: 250Gi
      IPP_RUNNER_EPHEMERAL_STORAGE_LIMIT: 250Gi
    needs:
      # We set all dependencies as optional just in case a platform is not needed,
      # then the yml file can override both build/test on one platform and deploy will still work.
      - job: build-windows-x86_64-release
        artifacts: true
        optional: false
      - job: build-linux-x86_64-release
        artifacts: true
        optional: false
      - job: build-windows-x86_64-debug
        artifacts: true
        optional: false
      - job: build-linux-x86_64-debug
        artifacts: true
        optional: false
      - job: build-linux-aarch64-release
        artifacts: true
        optional: false
      - job: build-linux-aarch64-debug
        artifacts: true
        optional: false
      #   - job: test-windows-x86_64-startuptests
      #     artifacts: false
      #     optional: true
      #   - job: test-linux-x86_64-startuptests
      #     artifacts: false
      #     optional: true
    rules:
      - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - if: $RUN_DEPLOY == "false"
        when: never
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        when: never
      - !reference [.rules-push, rules]
      # - !reference [.rules-version-changed, rules]



