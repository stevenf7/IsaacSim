# external-tests

test-linux-x86_64-external-ar:
    extends:
      - .test-external
      - .install-linux-test-packages
      - .osec:vault:v3:prod_token_job
      - .omni_nvks_gpu
      - .kit-runner-test-linux-x86_64-1x-gpu
    before_script:
      - set -eu
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
      - curl -o ./archive.zip  https://gitlab-master.nvidia.com/api/v4/projects/139162/repository/archive.zip
      - unzip archive.zip -d _git
      - mkdir -p source/standalone_examples/testing/external_workflow_tests/ar
      - cp -r _git/*/ar/* source/standalone_examples/testing/external_workflow_tests/ar
      - ./build.sh -r --no-docker
    script:
      - cd _build/linux-x86_64/release
      - ./python.sh standalone_examples/testing/external_workflow_tests/ar/ar_sdg_test.py --scene standalone_examples/testing/external_workflow_tests/ar/data/physics_GPU.usda --num_datasets 3 --num_frames 3 --test --output _testoutput
      # Fail if _testoutput is empty
      - |
        if [ -z "$(ls -A _testoutput)" ]; then
          echo "Error: _testoutput directory is empty";
          exit 1;
        fi
    after_script:
      - !reference [.datadog-test-visibility-linux-x86_64, script]
      - ./repo.sh ci test -- --generate-report

# ==============================================================================================================
.deploy-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/packages/python/requirements.txt # produced by repo_python_package
          - _build/**/*.log
          - _repo/repo.log
          - _repo/repolog*.txt
          - _logs/**/*.log

# ==============================================================================================================
.deploy-common:
    stage: deploy
    extends:
      - .deploy-artifacts
      - .osec:vault:v3:prod_token_job
    timeout: 3 hour
    interruptible: false
    variables:
        KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "200Gi"
        KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "200Gi"
    before_script:
      - set -eu
      - !reference [.osec:vault:v3:linux, codesign:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, nucleus:kit-extensions.ov.nvidia.com:kit-extension-svc:perform_vault_requests]
    rules:
      - if: $RUN_DOCS_BUILD == "true" || RUN_NIGHTLY_TESTS=="true" || $RUN_DEPLOY != "true"
        when: never

