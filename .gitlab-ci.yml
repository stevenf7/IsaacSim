      - .deploy-common
      - .runner-build-windows-x86_64
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      - ./repo.bat unzip_file --file _build/packages/isaac-sim-standalone*.release.7z --dst _build/windows-x86_64/release
      - ls _build/windows-x86_64/release
      - ./repo.bat python_package --create
      - ./repo.bat comment_archive_deps
      - ./repo.bat python_package --wheel
      - ls _build/packages/dist
      - ./repo.bat python_package --publish
    needs:
      - job: sign-windows-x86_64-release
        artifacts: true
    rules:
      - if: $ALLOW_PUBLISH_PYTHON_PACKAGES != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

verify-publish-python-packages-linux-x86_64:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .omni_nvks_gpu
      - .kit-runner-test-linux-x86_64-1x-gpu
    script:
      # install Python 3.11
      - apt update
      - apt -y install python3.11-venv
      # create and source a virtual environment
      - python3.11 -m venv env_isaacsim
      - source env_isaacsim/bin/activate
      # upgrade pip and install Isaac Sim - Python packages
      - pip install --upgrade pip
      - pip install -r _build/packages/python/requirements.txt --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple
      # accept EULA
      - export OMNI_KIT_ACCEPT_EULA=YES
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedOnExit=1 --no-window
    needs:
      - job: publish-python-packages-linux-x86_64
        artifacts: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

verify-publish-python-packages-windows-x86_64:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .kit-runner-test-windows-x86_64-1x-gpu
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      # install Python 3.11
      - curl -o python-3.11.exe https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe
      - cmd /c start /wait python-3.11.exe /quiet TargetDir=C:\Python311
      # create and source a virtual environment
      - C:\Python311\python.exe -m venv C:\env_isaacsim
      - C:\env_isaacsim\Scripts\python.exe -m pip install --upgrade pip
      - C:\env_isaacsim\Scripts\activate.ps1
      # install Isaac Sim - Python packages
      - pip install -r _build/packages/python/requirements.txt --extra-index-url https://urm.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple
      # accept EULA
      - $env:OMNI_KIT_ACCEPT_EULA = "YES"
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedOnExit=1 --no-window
    needs:
      - job: publish-python-packages-windows-x86_64
        artifacts: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS == "true"
        when: never
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

