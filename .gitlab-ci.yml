# ==============================================================================================================
check-code-format:
    extends:
      - .check-common
      - .repo-artifacts
      - .ipp_lnx_x86_64_cpu_small
    variables:
        GIT_DEPTH: 0 # needed to update copyrights
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      - !reference [.check-common, rules]
    script:
      - ./repo.sh format --verify

# ==============================================================================================================
check-python-packages:
    extends:
      - .check-common
      - .repo-artifacts
      - .ipp_lnx_x86_64_cpu_small
    rules:
      - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE =~ /^(nightly|post_merge)$/ && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
        when: always
      - !reference [.check-common, rules]
    script:
      - ./repo.sh check_python_package_definitions --gitlab

# ==============================================================================================================
.build-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          # Temporarily disable these artifacts to fix link error when extracting kit-sdk
          # - _build/**/*.gcno # produced by the coverage build
          # - _build/**/*.log
          - _build/packages/
          - _repo/repo.log
          - _repo/repolog*.txt
          # For debugging downstream kit build things
          - deps/kit-sdk.packman.xml.user
# ==============================================================================================================
.build-common:
    stage: build
    timeout: 3 hours
    interruptible: true
    extends:
      - .build-artifacts
    rules:
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        variables:
          IPP_RUNNER_EPHEMERAL_STORAGE_REQUEST: "200Gi"
          IPP_RUNNER_EPHEMERAL_STORAGE_LIMIT: "200Gi"
          KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "200Gi"
          KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "200Gi"
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_BUILDS != "true"
        when: never
      - !reference [.rules-workflow, rules]
# ==============================================================================================================
.disable_on_downstream_of_mr:
    rules:
      - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE == "merge_request"
        when: never
# ==============================================================================================================
# Currently arm builds are not 100% reliable in kit downstreams, so we will allow failure for now
.kit_post_merge_or_nightly_allow_failure:
    rules:
      - if: $UPSTREAM_PIPELINE_SOURCE =~ /^(nightly|post_merge)$/ && $CI_PIPELINE_SOURCE == "pipeline"
        allow_failure: true
# ==============================================================================================================
.aarch64-build-common:
    extends:
      - .build-common
    image: nvcr.io/nvidia/cuda:13.1.0-devel-ubuntu24.04
    variables:
      OMNI_REPO_BUILD_NO_DOCKER: "1"
    before_script:
      - set -eu
      - apt-get update
      - apt-get install -y --no-install-recommends curl unzip g++-11 gcc-11 git
      # Create alternatives for gcc-11 and g++-11 and set as default
      - update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 110
      - update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 110
      - update-alternatives --set gcc /usr/bin/gcc-11
      - update-alternatives --set g++ /usr/bin/g++-11
      - !reference [.gitlab-info-external-urls-linux, script]
      - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
    after_script:
      - !reference [.gitlab-info-external-urls-linux, script]
# ==============================================================================================================
build-linux-x86_64-release:
    extends:
      - .build-common
      - .ipp_lnx_x86_64_cpu_large
      - .osec:vault:v3:prod_token_job
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a
    before_script:
      - set -eu
      - apt-get install -y libarchive-tools
      # - apt-get install -y rdfind # TODO: Add rdfind back in, was seeing package not found error on gitlab runner
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    rules:
      # Covered by build-linux-x86_64-c++-coverage, so skip it in MR pipelines to save resources.
      - !reference [.disable_on_downstream_of_mr, rules]
