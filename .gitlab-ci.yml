# Set REPORT_TIMING to "after_script" for pythontests/nativepythontests, "inline" otherwise. Reference at start of script in matrix test jobs.
.determine_report_generation_timing_linux:
  script:
    - if [ "$SUITE" == "pythontests" ] || [ "$SUITE" == "nativepythontests" ]; then export REPORT_TIMING="after_script"; else export REPORT_TIMING="inline"; fi

.determine_report_generation_timing_windows:
  script:
    - if ($env:SUITE -eq "pythontests" -or $env:SUITE -eq "nativepythontests") { $env:REPORT_TIMING = "after_script" } else { $env:REPORT_TIMING = "inline" }

.test-linux-common:
    after_script:
      - !reference [.datadog-test-visibility-linux-x86_64, script]
      - !reference [.determine_report_generation_timing_linux, script]
      - mkdir -p _build/intermediate/${CI_JOB_ID}
      - mv _build/intermediate/linux-x86_64 _build/intermediate/${CI_JOB_ID}/
      - INTERMEDIATE_FOLDER=$(find _build/packages/ -type d -iname 'intermediate')
      - cp -r ${INTERMEDIATE_FOLDER}/* _build/intermediate/${CI_JOB_ID}
      - if [ "$REPORT_TIMING" == "after_script" ]; then
      -   ./repo.sh ci test -- --generate-report
      - fi
      - TESTOUTPUT_FOLDER=$(find _build/packages -type d -iname '_testoutput')
      - mkdir -p ${TESTOUTPUT_FOLDER}/${CI_JOB_ID}
      - cp -r ${TESTOUTPUT_FOLDER}/* ${TESTOUTPUT_FOLDER}/${CI_JOB_ID}
    needs:
      - job: build-linux-x86_64-c++-coverage
        artifacts: true

