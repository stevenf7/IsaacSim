include:
  # external
  - project: 'omniverse/devplat/gitlab/templates/runners'
    file: 'modules/include.yml'
    ref: v1_latest
  - project: 'omniverse/devplat/gitlab/templates/common/utilities'
    file: 'modules/include.yml'
    ref: v1_latest
  - project: 'omniverse/sectools/vault'
    file:
      - 'templates/v3/common/token_job.gitlab-ci.yml'
      - 'templates/v3/linux/codesign.gitlab-ci.yml'
      - 'templates/v3/windows/codesign.gitlab-ci.yml'
      - 'templates/v3/linux/packman_s3.gitlab-ci.yml'
      - 'templates/v3/windows/packman_s3.gitlab-ci.yml'
      - 'templates/v3/linux/nucleus/kit-extensions.ov.nvidia.com/kit-extension-svc.gitlab-ci.yml'
  - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    # local to devplat/gitlab/templates/runners, external to this repo:
    file: 'modules/common.yml'
  - project: omniverse/benchmark/reggie
    #- project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #  file: 'modules/benchmarks.yml'
    ref: release/v2
    file: /ci/detect.yml
  - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    # - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #   file: 'modules/stage-build.yml'
    # - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #   file: 'modules/etm.yml'
    file:
      - 'modules/stage-deploy.yml'
      - 'modules/stage-security.yml'
      - 'modules/sanitizers.yml'
    ref: 1.18.0
  - project: "omniverse/devplat/gitlab/templates/common/compliance"
    file: "modules/omniverse-repo-compliance.gitlab-ci.yml"
    ref: v1_latest
# ==============================================================================================================
stages:
  - check
  - build
  - test
  - nightly-test
  - external-test
  - security
  - deploy
  - deploy-test
  - prod-test
  - check-externals
  - github-staging
  - verify-github-staging
  - pages

# ==============================================================================================================
# Default values applied to all jobs
default:
    # Only retry on Gitlab failures (not on script failures for example)
    retry:
        max: 2
        when:
          - api_failure
          - runner_system_failure
          - stuck_or_timeout_failure
          - scheduler_failure
          - unknown_failure

workflow:
    auto_cancel:
        on_new_commit: interruptible
        on_job_failure: none
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        auto_cancel:
            on_new_commit: conservative
      - if: $CI_COMMIT_BRANCH == "develop"
        auto_cancel:
            on_new_commit: conservative
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED
        auto_cancel:
            on_new_commit: none
      - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_PROTECTED
        auto_cancel:
            on_new_commit: none

# ==============================================================================================================
# More variables can be found in common.yml - here we put the ones controlling the jobs workflow
variables:
    OSEC_NSPECT_ID: "NSPECT-8CX1-LP1G"
    OSEC_CHECKMARX_ENABLED: "false"
    OSEC_SONARQUBE_ENABLED: "true"
    OSEC_GITLAB_SAST_ENABLED: "false"
    OSEC_PULSE_TRUFFLEHOG_ENABLED: "false"
    OSEC_OMNI_PULSE_ENABLED: "false"
    OSEC_README_ENABLED: "false" # WARNING: Also have the init() function get_nspectid_from_repo_toml() in there...
    ALLOW_PUBLISH_DOCS:
        value: "false"
        description: "Set to true to publish docs"
    ALLOW_PUBLISH_TO_LAUNCHER:
        value: "false"
        description: "Set to true to for Kit apps that are published to the Launcher. That adds jobs for that."
    ALLOW_PUBLISH_TO_PACKMAN:
        value: "true"
        description: "Set to true to for Kit apps that are published to the Packman. That adds jobs for that."
    ALLOW_PUBLISH_PYTHON_PACKAGES:
        value: "true"
        description: "Set to true to create and publish python packages."
    ALLOW_PUBLISH_EXTENSIONS:
        value: "true"
        description: "Set to true to publish extension updates."
    ALLOW_PUBLISH_CONTAINERS:
        value: "true"
        description: "Set to true to publish containers to NGC."
    ALLOW_SECURITY_SCAN:
        value: "false"
        description: "Set to true to trigger a security scan as a child pipeline (non blocking)"
    ALLOW_SCHEDULE_PIPELINE:
        value: "true"
        description: "Set to 'false' to disable schedule pipeline on a all jobs, useful to set it back on only some jobs."
    ALLOW_TAG_PIPELINE:
        value: "true"
        description: "Set to 'false' to disable tag pipeline on a all push jobs."
    RUN_EXTENSION_BENCHMARKS:
        value: "false"
        description: "Set to true to run benchmarks for kit extensions."
    RUN_ETM_TESTS:
        value: "false"
        description: "Set to true to run ETM tests for kit extensions. Only happens on push (extensions need to be published first)."
    DATADOG_TEST_VISIBILITY:
        value: "true"
        description: "Set to false to skip sending tests results to Datadog (internal)"
    OMNI_CI_ENABLE_CXX_COVERAGE:
        value: "false"
        description: "Set to 'true' to enable C++ code coverage testing."
    OMNI_CI_ENABLE_SANITIZERS:
        value: "false"
        description: "Set to 'true' to enable C++ sanitizer builds."
    RUN_BUMP_VERSION:
        value: "false"
        description: "Set to true to run bump version. Only happens on schedule."
    RUN_NIGHTLY_TESTS:
        value: "true"
        description: "Set to true to run nightly tests. Only happens on schedule."
    RUN_DOCS_PUBLISH:
        value: "false"
        description: "Set to true to publish omni docs. Only happens on schedule."
    RUN_DOCS_BUILD:
        value: "false"
        description: "Set to true to build omni docs. Only happens on schedule."
    RUN_CHECKS:
        value: "true"
        description: "Set to true to run check stage."
    PLATFORM_LINUX_AARCH64: 'true'
    RUN_BUILDS:
        value: "true"
        description: "Set to true to run build stage."
    RUN_TESTS:
        value: "true"
        description: "Set to true to run test stage."
    RUN_DEPLOY:
        value: "true"
        description: "Set to true to run deploy stage."
    # KUBERNETES_EPHEMERAL_STORAGE_REQUEST:
    #     value: "200Gi"
    #     description: "Fix publish extensions"
    # KUBERNETES_EPHEMERAL_STORAGE_LIMIT:
    #     value: "200Gi"
    #     description: "Fix publish extensions"

# ==============================================================================================================
# overrides for compliance/osec job
osec:sonarqube:
    stage: security
    allow_failure:
      exit_codes:
        - 2
        - 3
    variables:
      SONAR_CFAMILY_COMPILE_COMMANDS: "_build/linux-x86_64/release/compile_commands.json"
      LINBUILD_EMBEDDED: "1"
      SONAR_EXTRA_ARGS: "-Dsonar.qualitygate.timeout=1000 -Dsonar.branch.name=$CI_COMMIT_REF_NAME"
      SONAR_EXCLUSIONS:  "**/_build/**,**/_repo/**,**/_compiler/**,\
        \
        **/*.js,**/*.ts,**/*.css,**/*.html,\
        \
        source/extensions/omni.kit.loop-isaac/plugins/omni.kit.loop/RunLoopRunner.cpp,\
        \
        **/tests/**/*.cpp,\
        \
        "
    before_script:
      - set -eu && ./repo.sh build --generate --config release --no-licensing --/repo_build/fetch/after_pull_commands=''
      # OSEC-1623 (originally OSEC-1511) patch the compile_commands.json sonarqube will use for analysis to include our behaviour changing "SONAR" ifdef
      # - sed -i -e 's/"g++ /"g++ -DNV_SONAR_BUILD=1 /' $SONAR_CFAMILY_COMPILE_COMMANDS
    rules:
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true")
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        when: never
      # - !reference [.rules-push-manual, rules]

# ==============================================================================================================
.check-common:
    stage: check
    timeout: 20 minutes
    interruptible: true
    rules:
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - if: $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true"
        when: never
      - if: $RUN_CHECKS == "false"
        when: never
      - !reference [.rules-workflow, rules]

.repo-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _repo/repo.log
          - _repo/repolog*.txt

# ==============================================================================================================
# Rule for running nightly tests on scheduled pipeline on develop and release branches
.rules-bump-version:
    rules:
      - if: $CI_COMMIT_TITLE =~ /^Bumped version/
        when: never
      - if: $CI_PIPELINE_SOURCE == "schedule" && $RUN_BUMP_VERSION == "true" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)

# ==============================================================================================================
# Rule for running nightly tests on scheduled pipeline on protected and release branches
.rules-nightly-tests:
    rules:
      # allow schedule pipeline if RUN_NIGHTLY_TESTS is set to "true" and on protected and release/* branches
      - if: $CI_PIPELINE_SOURCE == "push" && $RUN_NIGHTLY_TESTS == "true" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        # allow on bump version
        changes:
          - VERSION.md
          - VERSION

.rules-publish-docs:
    rules:
      # allow schedule pipeline if RUN_DOCS_PUBLISH is set to "true" and its scheduled
      - if: $CI_PIPELINE_SOURCE == "schedule" && $RUN_DOCS_PUBLISH == "true"
        when: always
      - when: never

.rules-build-docs:
    rules:
      # allow schedule pipeline if RUN_DOCS_BUILD is set to "true" and its scheduled
      - if: $CI_PIPELINE_SOURCE == "schedule" && $RUN_DOCS_BUILD == "true"
        when: always
      - when: never

# ==============================================================================================================
# Rule for running publisher on push on develop and release branches
.rules-version-changed:
    rules:
      - if: $CI_COMMIT_TITLE !~ /^Bumped version/
        when: never
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        changes:
          - VERSION.md
          - VERSION

# ==============================================================================================================
# Job that ensures that the MR has a JIRA ticket reference in the title
check-jira-ticket:
    extends:
      - .check-common
      - .check-jira-ticket
      - .omni_nvks_runner
    allow_failure: true
    rules:
      - !reference [.rules-mr, rules]

