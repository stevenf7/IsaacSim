# ==============================================================================================================
rebase-kit-integration-branches:
    parallel:
      matrix:
        - BRANCH:
          - develop-kit-tot
          - kit-integration/master
          - kit-integration/feature/110.0
          - kit-integration/feature/110.1
          - kit-integration/production/110.1
          - kit-integration/major/111
          - kit-integration/feature/main
    extends:
      - .ipp_lnx_x86_64_cpu_small
    variables:
        GIT_DEPTH: 0
        GIT_STRATEGY: clone
        GITLAB_REPO_URL: "https://oauth2:$GITLAB_PUSH_TOKEN@gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim.git"
    script:
      - git config user.email "gitlab@nvidia.com"
      - git config user.name "gitlab"
      - git remote set-url --push origin $GITLAB_REPO_URL
      - git fetch origin $BRANCH
      - git checkout $BRANCH
      - git rebase origin/develop
      - git push --force-with-lease origin $BRANCH
    after_script:
      - !reference [.post_job_status_to_slack, after_script]
    needs: []
    rules:
      - if: $CI_COMMIT_BRANCH != "develop"
        when: never
      - !reference [.rules-version-changed, rules]

# ==============================================================================================================
sign-windows-x86_64-release:
    extends:
      - .build-common
      - .runner-build-windows-x86_64
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'codesign:perform_vault_requests']
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      - ls _build/packages/
      - mkdir _unsignedpackages
      - mkdir _signedpackages
      - mv -Force _build/packages/*windows-x86_64.release.7z _unsignedpackages/
      - ./repo.bat codesign
      - mv -Force _signedpackages/*windows-x86_64.release.7z _build/packages/
      - ls _build/packages/
    needs:
      - job: build-windows-x86_64-release
        artifacts: true
    rules:
      - if: $ALLOW_PUBLISH_TO_PACKMAN != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly" && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
        allow_failure: true
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly"
        when: manual
        allow_failure: true
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 10800 # 3 hours

# ==============================================================================================================
.container-rules:
  rules:
    - if: $ALLOW_PUBLISH_CONTAINERS != "true"
      when: never
    - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
      when: never
    - if: $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] Generate containers in MR pipelines/"
      # Extra bit of hackery to get the MR suffix into the container tags
      variables:
          MR_SUFFIX: "-mr"
    - !reference [.rules-version-changed, rules]
    - !reference [.rules-push-manual, rules]

# ==============================================================================================================
publish-container-x86_64:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_medium_with_docker
    before_script:
      - docker version
      - docker login -u sabdulajees -p ${gitlab_registry_push} gitlab-master.nvidia.com:5005
      - |
        if [ "${CI_COMMIT_REF_PROTECTED:-false}" = "true" ]; then
            docker login -u \$oauthtoken -p "$NGC_TOKEN" nvcr.io
            docker login nvcr.io
        else
            echo "Skipping NGC login for unprotected ref ${CI_COMMIT_REF_NAME:-unknown}"
        fi
    script:
      - source ./tools/ci/gitlab/section_marker.sh
      - section_start "unzipping_packages" "Unzipping packages"
      - 7z x -y -o_build/docs/isaac-sim/latest _build/packages/docs*.7z
      - 7z x -y -o_build/linux-x86_64/release _build/packages/isaac-sim-standalone*.7z
      - section_end "unzipping_packages"
      - rm -r .vscode
      - mv _build/linux-x86_64/release/.vscode .
      - section_start "prep_docker_build" "Preparing Docker build"
      - ./tools/docker/prep_docker_build.sh --x86_64
      - section_end "prep_docker_build"
      - section_start "build_docker" "Building Docker image"
      - ./tools/docker/build_docker.sh --x86_64 --tag gitlab-master.nvidia.com:5005/omniverse/isaac/omni_isaac_sim/isaac-sim-cicd:pipeline-${CI_PIPELINE_ID}-x86_64 --push
      - section_end "build_docker"
      - section_start "tag_and_push_container" "Tagging and pushing container"
      - PLATFORM_TAG=x86_64 ./tools/docker/tag_and_push_container.sh
      - section_end "tag_and_push_container"
    needs:
      - job: build-linux-x86_64-release
        artifacts: true
    rules:
      - !reference [.container-rules, rules]

