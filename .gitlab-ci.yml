  extends:
  - .deploy-common
  - .omni_nvks_runner_with_docker
  script:
  - ./tools/ci/build-and-packaging/isaac-sim-assets-3/step.sh
  - ./repo.sh publish_assets_launcher_3
  needs: []
  rules:
  - if: $ALLOW_PUBLISH_TO_LAUNCHER != "true"
    when: never
  - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_BUILD == "true"
    when: never
  - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "gitlab-ci")
    when: manual
  - !reference [.rules-version-changed, rules]
  - !reference [.rules-push-manual, rules]
  allow_failure: true
