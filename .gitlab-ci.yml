check_externals:
  extends:
    - .repo-artifacts
    - .check-common
    - .ipp_lnx_x86_64_cpu_small
  stage: check-externals
  needs: []
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      when: never
    - !reference [.check-common, rules]
  artifacts:
    paths:
      - packman_private_results.csv
      - packman_full_results.csv
    expire_in: 1 week
  script:
    - ./tools/packman/python.sh tools/check_externals/download_all_kits.py
    - ./tools/packman/python.sh -m pip install -r tools/check_externals/requirements.txt
    - ./tools/packman/python.sh tools/check_externals/new_check_externals.py --allowed-external linbuild

