.build-docs-base:
    extends:
      - .build-common
      - .ipp_lnx_x86_64_cpu_small
      - .osec:vault:v3:prod_token_job
    stage: docs
    timeout: 3 hours
    before_script:
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    script:
      - git lfs pull
      - echo "Building full docs (user guide + API)..."
      - |
        if [ -d "_build/docs/isaac-sim/latest/py" ]; then
          rm -rf "_build/docs/.api-docs-backup"
          mkdir -p "_build/docs/.api-docs-backup"
          cp -a "_build/docs/isaac-sim/latest/py" "_build/docs/.api-docs-backup/"
          echo "API docs backed up from linux build artifacts."
        else
          echo "WARNING - API docs not found in artifacts"
        fi
      - ./repo.sh docs --project isaac-sim --warn-as-error=0 > build_log_full.txt 2>&1 || true
      - |
        if [ -d "_build/docs/.api-docs-backup/py" ]; then
          mkdir -p "_build/docs/isaac-sim/latest"
          rm -rf "_build/docs/isaac-sim/latest/py"
          cp -a "_build/docs/.api-docs-backup/py" "_build/docs/isaac-sim/latest/"
          echo "API docs restored into final docs output."
        fi
      - ls _build/docs/isaac-sim/latest/py/index.html && echo "API docs present in final output" || echo "WARNING - API docs still missing in final output"
      - echo "Docs build complete. Check build_log_full.txt for details."
    needs:
      - job: build-linux-x86_64-release
        artifacts: true
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/docs/isaac-sim/latest
          - build_log_full.txt

build-docs:
    extends: .build-docs-base
    rules:
      - !reference [.rules-build-docs, rules]

build-docs-mr:
    extends: .build-docs-base
    script:
      - git lfs pull
      - echo "Building full docs (user guide + API)..."
      - |
        if [ -d "_build/docs/isaac-sim/latest/py" ]; then
          rm -rf "_build/docs/.api-docs-backup"
          mkdir -p "_build/docs/.api-docs-backup"
          cp -a "_build/docs/isaac-sim/latest/py" "_build/docs/.api-docs-backup/"
          echo "API docs backed up from linux build artifacts."
        else
          echo "WARNING - API docs not found in artifacts"
        fi
      - ./repo.sh docs --project isaac-sim --warn-as-error=0 > build_log_full.txt 2>&1 || true
      - |
        if [ -d "_build/docs/.api-docs-backup/py" ]; then
          mkdir -p "_build/docs/isaac-sim/latest"
          rm -rf "_build/docs/isaac-sim/latest/py"
          cp -a "_build/docs/.api-docs-backup/py" "_build/docs/isaac-sim/latest/"
          echo "API docs restored into final docs output."
        fi
      - ls _build/docs/isaac-sim/latest/py/index.html && echo "API docs present in final output" || echo "WARNING - API docs still missing in final output"
      - echo "Docs build complete. Check build_log_full.txt for details."
      - echo "Preview at https://omniverse.gitlab-master-pages.nvidia.com/-/isaac/omni_isaac_sim/-/jobs/$CI_JOB_ID/artifacts/_build/docs/isaac-sim/latest/index.html"
    rules:
      - !reference [.rules-build-docs-mr, rules]
    environment:
      name: review/$CI_MERGE_REQUEST_IID
      url: https://omniverse.gitlab-master-pages.nvidia.com/-/isaac/omni_isaac_sim/-/jobs/$CI_JOB_ID/artifacts/_build/docs/isaac-sim/latest/index.html
      auto_stop_in: 2 weeks

build-docs-only-mr:
    extends:
      - .build-common
      - .ipp_lnx_x86_64_cpu_small
      - .osec:vault:v3:prod_token_job
    stage: docs
    timeout: 1 hour
    before_script:
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    script:
      - git lfs pull
      - echo "Building user guide only (docs-only change, no API docs)..."
      - ./repo.sh docs --project isaac-sim --warn-as-error=0 > build_log_full.txt 2>&1 || true
      - echo "Docs build complete. Check build_log_full.txt for details."
      - echo "Preview at https://omniverse.gitlab-master-pages.nvidia.com/-/isaac/omni_isaac_sim/-/jobs/$CI_JOB_ID/artifacts/_build/docs/isaac-sim/latest/index.html"
    rules:
      - !reference [.rules-build-docs-only-mr, rules]
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/docs/isaac-sim/latest
          - build_log_full.txt
    environment:
      name: review/$CI_MERGE_REQUEST_IID
      url: https://omniverse.gitlab-master-pages.nvidia.com/-/isaac/omni_isaac_sim/-/jobs/$CI_JOB_ID/artifacts/_build/docs/isaac-sim/latest/index.html
      auto_stop_in: 2 weeks

pages:
    stage: pages
    extends:
      - .build-common
      - .ipp_lnx_x86_64_cpu_small
    script:
      - mkdir -p .public
      - cp -r _build/docs/isaac-sim/latest/* .public/ || true
      - mv pipeline_test_chart_heatmap.html .public/heatmap.html || true
      - mv pipeline_test_chart_heatmap.png .public/heatmap.png || true
      - mv .public public
    artifacts:
        expire_in: never
        paths:
          - public
    pages:
      # develop -> root (empty prefix), release/x.y -> prefixed deployment
      path_prefix: "$PAGES_PATH_PREFIX"
    rules:
      - !reference [.rules-publish-docs, rules]
    needs:
      - job: build-docs
        artifacts: true
        optional: true
      - job: post_to_slack
        artifacts: true
        optional: true


