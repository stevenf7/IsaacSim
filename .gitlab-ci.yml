gather-coverage:
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a
    rules:
      - !reference [.disable_on_downstream_of_mr, rules]
      - !reference [.test-common, rules]
    extends:
      - .test-common
      - .ipp_lnx_x86_64_cpu_small
    timeout: 2h
    needs:
      - job: test-linux-x86_64
        artifacts: true
      - job: test-linux-x86_64-benchmarks-1-gpu
        artifacts: true
      - job: test-linux-x86_64-benchmarks-2-gpu
        artifacts: true
    script:
      - ./build.sh -r --fetch-only --no-docker
      # Remove previous results.xml file to prevent double reporting
      - find _build/packages -iname 'results.xml' -type f -delete
      - lcov --capture --directory _build/intermediate --output-file _build/coverage.info
      - lcov --remove _build/coverage.info '/usr/include/*' --output-file _build/coverage.filtered.info
      - ./tools/packman/python.sh -m pip install lcov_cobertura==2.1.1
      - ./tools/packman/python.sh -m lcov_cobertura _build/coverage.filtered.info  -o cpp_coverage.xml
      - ./tools/packman/python.sh -m pip install -r _repo/deps/repo_test/requirements.txt
      - ./tools/packman/python.sh tools/ci/coverage/read_pycov_paths.py "_build/packages/**/*.pycov" --exclude-prefix extscache
      # Find all .pycov files and combine them in one command
      - |
        PYCOV_FILES=$(find _build/packages -name "*.pycov" 2>/dev/null || true)

        if [ -n "$PYCOV_FILES" ]; then
          PYCOV_COUNT=$(echo "$PYCOV_FILES" | wc -l)
          echo "Found $PYCOV_COUNT .pycov files to combine"
          ./tools/packman/python.sh -m coverage combine --rcfile=.coveragemergerc --keep $PYCOV_FILES
        else
          echo "No .pycov files found in _build/packages"
          exit 1
        fi
      - ./tools/packman/python.sh -m coverage xml --rcfile=.coveragemergerc --ignore-errors
      - ./tools/packman/python.sh ./tools/ci/coverage/combine_line_counts.py cpp_coverage.xml coverage.xml
    coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

