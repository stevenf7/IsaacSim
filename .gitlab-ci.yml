test-linux-x86_64-omniperf-benchmarks-1-gpu:
    rules:
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - !reference [.disable_on_downstream_of_mr, rules]
      - if: $CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"
      - if: $CI_PIPELINE_SOURCE == "pipeline" && ( $CI_COMMIT_BRANCH =~ /^kit-integration\// || $CI_COMMIT_BRANCH =~ /^release\// )
      - !reference [.rules-run-omniperf-mr, rules]
    stage: test
    interruptible: true
    allow_failure: true
    tags:
      - omni-perf-only/linux
      - instance/gitlab-gtl-performance
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 10800 # 3 hours
      OMNIPERF_INDEX_URL: "https://urm.nvidia.com/artifactory/api/pypi/ct-omniverse-pypi/simple"
      OMNIPERF_EXTRA_INDEX_URL: "https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi/simple"
      MACHINE_OS: "ubuntu22-04-5"
      MACHINE_KIND: "EPYC_9124P_1XL40_ADA"
      MACHINE_DRIVER: "NVIDIA-Linux-x86_64-580.126.09"
    id_tokens: !reference [.with_omniperf_vault_linux, id_tokens]
    needs:
      - job: build-linux-x86_64-release
        artifacts: true
    before_script:
      - !reference [.with_omniperf_vault_linux, before_script]
      - sudo apt-get update --allow-releaseinfo-change || true
      - sudo apt-get install -y python3-pip || true
      - python3 -m pip install --upgrade --index-url ${OMNIPERF_INDEX_URL} --extra-index-url ${OMNIPERF_EXTRA_INDEX_URL} --extra-index-url https://pypi.org/simple --no-cache-dir omniperf
      # Bootstrap reggie (download + setup venv, same as .reggie_detect_ubuntu but without running detect)
      - echo "Installing reggie bootstrap (ref ${REGGIE_BOOTSTRAP_REF})..."
      - curl -s "https://gitlab-master.nvidia.com/omniverse/benchmark/reggie-bootstrap/-/archive/${REGGIE_BOOTSTRAP_REF}/reggie-bootstrap-${REGGIE_BOOTSTRAP_REF}.tar.gz" | tar -zx
      - ./reggie-bootstrap-${REGGIE_BOOTSTRAP_REF}/setup_venv.sh ${REGGIE_VERSION}
    script:
      - ./tools/ci/omniperf/set_cpu_governor_performance.sh
      - ./tools/ci/omniperf/run_benchmarks.sh
    after_script:
      - ./tools/ci/omniperf/restore_cpu_governor.sh
    artifacts:
      paths:
        - _omniperf_results/
        - .reggie-out/
        - .reggie-out-iter-*/
      when: always
      expire_in: 2 weeks
    retry: 1

