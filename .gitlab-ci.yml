# ==============================================================================================================
.test-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/**/*.log
          - _build/**/debug/*.xml
          - _build/**/release/*.xml
          - _build/coverage.info
          - _build/coverage/**
          - _repo/repo.log
          - _repo/repolog*.txt
          - _build/**/_testoutput/
        reports:
            junit:
              - _build/**/debug/*.xml
              - _build/**/release/*.xml
              - _build/**/_testoutput/results.xml

# ==============================================================================================================
.test-common:
    stage: test
    timeout: 3 hour
    interruptible: true
    extends:
      - .test-artifacts
    allow_failure: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true"
        when: never
      - !reference [.rules-workflow, rules]

.test-linux-common:
    after_script:
      - !reference [.datadog-test-visibility-linux-x86_64, script]
      - ./repo.sh ci test -- --generate-report
    needs:
      - job: build-linux-x86_64-release
        artifacts: true

.test-windows-common:
    after_script:
      - !reference [.datadog-test-visibility-windows-x86_64, script]
      - ./repo.bat ci test -- --generate-report
    needs:
      - job: build-windows-x86_64-release
        artifacts: true

