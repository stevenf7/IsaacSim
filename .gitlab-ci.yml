    - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE =~ /^(nightly|post_merge)$/ && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
      when: always
    - !reference [.check-common, rules]
  script:
    - export TZ="America/Los_Angeles"
    - export DEBIAN_FRONTEND="noninteractive"
    - apt-get update
    - apt-get install -y software-properties-common
    - add-apt-repository ppa:deadsnakes/ppa -y
    - apt-get update
    - apt-get install -y python3.12 python3.12-venv python3.12-dev
    - ./repo.sh check_python_package_definitions --gitlab --validate

check-python-packages-dependencies-windows-x86_64:
  extends:
    - .repo-artifacts
    - .check-common
    - .runner-utility-windows-x86_64
  stage: check-externals
  needs: []
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE =~ /^(nightly|post_merge)$/ && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
      when: always
    - !reference [.check-common, rules]
  script:
    # install Python 3.12 for --validate
    - curl -o python-3.12.exe https://www.python.org/ftp/python/3.12.9/python-3.12.9-amd64.exe
    - cmd /c start /wait python-3.12.exe /quiet TargetDir=C:\Python312
    - ./repo.bat check_python_package_definitions --gitlab --validate

