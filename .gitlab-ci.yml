# ==============================================================================================================
publish-container-multi-arch:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_medium_with_docker
    before_script:
      - docker version
      - docker login -u sabdulajees -p ${gitlab_registry_push} gitlab-master.nvidia.com:5005
      - |
        if [ "${CI_COMMIT_REF_PROTECTED:-false}" = "true" ]; then
            docker login -u \$oauthtoken -p "$NGC_TOKEN" nvcr.io
            docker login nvcr.io
        else
            echo "Skipping NGC login for unprotected ref ${CI_COMMIT_REF_NAME:-unknown}"
        fi
    #   - docker run --privileged --rm tonistiigi/binfmt --install all
    #   - docker buildx create --name multiarch-builder --driver docker-container --use
    #   - docker buildx inspect --bootstrap
    script:
      - |
        if [ "${CI_COMMIT_REF_PROTECTED:-false}" != "true" ]; then
            echo "Skipping NGC multi-arch manifest for unprotected ref ${CI_COMMIT_REF_NAME:-unknown}"
            exit 0
        fi
        X86_IMAGE="nvcr.io/nvidian/isaac-sim:latest-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}-x86_64"
        AARCH64_IMAGE="nvcr.io/nvidian/isaac-sim:latest-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}-aarch64"
        BRANCH_MANIFEST="nvcr.io/nvidian/isaac-sim:latest-${CI_COMMIT_REF_SLUG}"
        COMMIT_MANIFEST="nvcr.io/nvidian/isaac-sim:latest-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"

        docker manifest inspect "$X86_IMAGE"
        docker manifest inspect "$AARCH64_IMAGE"

        docker manifest create "$BRANCH_MANIFEST" --amend "$X86_IMAGE" --amend "$AARCH64_IMAGE"
        docker manifest push "$BRANCH_MANIFEST"
        docker manifest inspect "$BRANCH_MANIFEST"

        docker manifest create "$COMMIT_MANIFEST" --amend "$X86_IMAGE" --amend "$AARCH64_IMAGE"
        docker manifest push "$COMMIT_MANIFEST"
        docker manifest inspect "$COMMIT_MANIFEST"
    needs:
      - job: publish-container-x86_64
        artifacts: false
      - job: publish-container-aarch64
        artifacts: false
    rules:
      # Special exemption to prevent this from happening on MRs
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        when: never
      - if: $CI_COMMIT_REF_PROTECTED != "true"
        when: never
      - !reference [.container-rules, rules]

