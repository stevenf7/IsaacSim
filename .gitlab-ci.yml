# ==============================================================================================================
sign-windows-x86_64-release:
  timeout: 3 hour
  extends:
  - .build-common
  - .runner-build-windows-x86_64
  before_script:
  - !reference [.repo_codesign_get_secrets_windows_powershell, repo_codesign_get_secrets_windows_powershell]
  - !reference [.windows_packman_s3_creds_get_powershell, windows_packman_s3_creds_get_powershell]
  script:
  - ls _build/packages/
  - mkdir _unsignedpackages
  - mkdir _signedpackages
  - mv -Force _build/packages/*windows-x86_64.release.7z _unsignedpackages/
  - ./repo.bat codesign
  - mv -Force _signedpackages/*windows-x86_64.release.7z _build/packages/
  - ls _build/packages/
  needs:
  - job: build-windows-x86_64-release
    artifacts: true
  rules:
  - if: $ALLOW_PUBLISH_TO_LAUNCHER != "true"
    when: never
  - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_BUILD == "true"
    when: never
  - !reference [.rules-version-changed, rules]
  - !reference [.rules-push-manual, rules]
  allow_failure: true


