# ==============================================================================================================
.deploy-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/packages/python/requirements.txt # produced by repo_python_package
          - _build/**/*.log
          - _repo/repo.log
          - _repo/repolog*.txt
          - _logs/**/*.log

# ==============================================================================================================
.deploy-common:
    stage: deploy
    extends:
      - .deploy-artifacts
      - .osec:vault:v3:prod_token_job
    timeout: 3 hour
    interruptible: false
    before_script:
      - set -eu
      - !reference [.osec:vault:v3:linux, codesign:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, nucleus:kit-extensions.ov.nvidia.com:kit-extension-svc:perform_vault_requests]
    rules:
      - if: $RUN_DOCS_BUILD == "true" || RUN_NIGHTLY_TESTS=="true"
        when: never

pages:
    stage: pages
    extends:
      - .build-common
      - .runner-utility-linux-x86_64
    script:
      - mkdir .public
      - ls
      - export UNZIP_DISABLE_ZIPBOMB_DETECTION=TRUE
      # - curl -o ./docs.zip  https://gitlab-master.nvidia.com/api/v4/projects/25020/jobs/artifacts/develop/download?job=build-docs
      # - unzip docs.zip
      - mv isaacsim-docs/_build/docs/isaac-sim/latest/* .public/
      - ls .public
      - curl -o ./artifact.zip  https://gitlab-master.nvidia.com/api/v4/projects/25020/jobs/artifacts/develop/download?job=build-linux-x86_64-release
      - unzip artifact.zip
      - 7z x _build/packages/docs@*.7z -opy
      - mv py .public/
      - ls .public/py
      - mv .public public
    artifacts:
        paths:
          - public
    rules:
      - !reference [.rules-publish-docs, rules]
    needs:
      - job: build-docs
        artifacts: true

build-docs:
    extends:
      - .build-common
      - .runner-utility-linux-x86_64
      - .osec:vault:v3:prod_token_job
    timeout: 3 hours
    before_script:
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    script:
      # - git clone -q --depth=1 -b isaac_sim --single-branch https://gitlab-master.nvidia.com/omniverse/omni-docs.git
      # - echo "Build log is captured in the build logs. Running build..."
      # - pushd omni-docs
      # - ./repo docs --warn-as-error=0 > ../build_log_full.txt
      # - ./repo docs --stage sphinx > ../build_log_sphinx.txt
      # - ./repo docs --stage post > ../build_log_post.txt
      # - popd
      - git clone -q --depth=1 -b main --single-branch https://gitlab-master.nvidia.com/omniverse/isaac/isaacsim-docs.git
      - echo "Build log is captured in the build logs. Running build..."
      - pushd isaacsim-docs
      - ./repo docs > ../build_log_full.txt
      - popd

    rules:
      - !reference [.rules-build-docs, rules]
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - isaacsim-docs/_build/docs/isaac-sim/latest
          - build_log_full.txt
          # - build_log_sphinx.txt
          # - build_log_post.txt


          # ==============================================================================================================
.benchmark-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - '_testoutput/benchmark.*.json'
          - .reggie-out/

# ==============================================================================================================
.benchmark-common:
    stage: test
    timeout: 1 hour
    interruptible: true
    extends:
      - .benchmark-artifacts
    variables:
        MAX_RETRIES: 2
    retry: 2
    rules:
      - if: $RUN_EXTENSION_BENCHMARKS != "true"
        when: never
      - !reference [.rules-workflow, rules]

# ==============================================================================================================
benchmark-linux-x86_64:
    extends:
      - .benchmark-common
    tags:
      - instance/gitlab-gtl-performance
      - omni-perf-only/linux
    variables:
        MACHINE_OS: "ubuntu22"
        MACHINE_KIND: "AMD EPYC 7313P"
        MACHINE_DRIVER: "NVIDIA-Linux-x86_64-525.85.05"
    script:
      - ./repo.sh bench
      - !reference [.reggie_detect_ubuntu, commands]
    needs:
      - job: build-linux-x86_64-release
        artifacts: true

# ==============================================================================================================
benchmark-windows-x86_64:
    extends:
      - .benchmark-common
    tags:
      - instance/gitlab-gtl-performance
      - omni-perf-only/windows
    variables:
        MACHINE_OS: "windows10-20H2"
        MACHINE_KIND: "AMD EPYC 7313P"
        MACHINE_DRIVER: "537.70-sandbag_UDA_QuadroWeb_Public-wddm2-x64-dch-AttestedDriverSigning"
    script:
      - ./repo.bat bench
      - !reference [.reggie_detect_windows, commands]
    needs:
      - job: build-windows-x86_64-release
        artifacts: true

