include:
  # external
  - project: 'omniverse/devplat/gitlab/templates/runners'
    file: 'modules/include.yml'
    ref: v1_latest
  - project: 'omniverse/devplat/gitlab/templates/common/utilities'
    file: 'modules/include.yml'
    ref: v1_latest
  - project: 'omniverse/sectools/vault'
    file:
      - 'templates/v3/common/token_job.gitlab-ci.yml'
      - 'templates/v3/linux/codesign.gitlab-ci.yml'
      - 'templates/v3/windows/codesign.gitlab-ci.yml'
      - 'templates/v3/linux/packman_s3.gitlab-ci.yml'
      - 'templates/v3/windows/packman_s3.gitlab-ci.yml'
      - 'templates/v3/linux/nucleus/kit-extensions.ov.nvidia.com/kit-extension-svc.gitlab-ci.yml'
  - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    # local to devplat/gitlab/templates/runners, external to this repo:
    file: 'modules/common.yml'
  - project: omniverse/benchmark/reggie
    #- project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #  file: 'modules/benchmarks.yml'
    ref: release/v2
    file: /ci/detect.yml
  - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    # - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #   file: 'modules/stage-build.yml'
    # - project: 'omniverse/devplat/gitlab/templates/common/kit-extension'
    #   file: 'modules/etm.yml'
    file:
      - 'modules/stage-deploy.yml'
      - 'modules/stage-security.yml'
      - 'modules/sanitizers.yml'
    ref: 1.18.0
  - project: "omniverse/devplat/gitlab/templates/common/compliance"
    file: "modules/omniverse-repo-compliance.gitlab-ci.yml"
    ref: v1_latest
  - local: tools/ci/test_matrixes/kit_mr_tests.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE == "merge_request"
  - local: tools/ci/test_matrixes/all.yml
    rules:
      - if: $CI_PIPELINE_SOURCE != "pipeline" || ($CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE != "merge_request")
# ==============================================================================================================
stages:
  - check
  - build
  - docs
  - test
  - nightly-test
  - external-test
  - security
  - deploy
  - deploy-test
  - prod-test
  - check-externals
  - github-staging
  - verify-github-staging
  - slack-notifications
  - pages

# ==============================================================================================================
# Default values applied to all jobs
default:
    # Only retry on Gitlab failures (not on script failures for example)
    retry:
        max: 2
        when:
          - api_failure
          - runner_system_failure
          - stuck_or_timeout_failure
          - scheduler_failure
          - unknown_failure

workflow:
    auto_cancel:
        on_new_commit: interruptible
        on_job_failure: none
    rules:
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        auto_cancel:
            on_new_commit: none
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
        auto_cancel:
            on_new_commit: conservative
        variables:
            RUN_CHECKS: "false"
            RUN_BUILDS: "false"
            RUN_TESTS: "false"
            RUN_NIGHTLY_TESTS: "false"
            RUN_DEPLOY: "false"
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        auto_cancel:
            on_new_commit: conservative
      - if: $CI_COMMIT_BRANCH == "develop"
        auto_cancel:
            on_new_commit: conservative
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED
        auto_cancel:
            on_new_commit: none
      - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_PROTECTED
        auto_cancel:
            on_new_commit: none
      # Disable pipelines on pushes to non protected branches
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED != "true"
        when: never

# ==============================================================================================================
# More variables can be found in common.yml - here we put the ones controlling the jobs workflow
variables:
    IPP_RUNNER_POST_SCRIPT_PREEMPTIVE_TERMINATION_TIMEOUT_SECONDS: "1800"
    OSEC_NSPECT_ID: "NSPECT-8CX1-LP1G"
    OSEC_CHECKMARX_ENABLED: "false"
    OSEC_SONARQUBE_ENABLED: "true"
    OSEC_GITLAB_SAST_ENABLED: "false"
    OSEC_PULSE_TRUFFLEHOG_ENABLED: "false"
    OSEC_OMNI_PULSE_ENABLED: "false"
    OSEC_README_ENABLED: "false" # WARNING: Also have the init() function get_nspectid_from_repo_toml() in there...
    ALLOW_PUBLISH_DOCS:
        value: "false"
        description: "Set to true to publish docs"
    ALLOW_PUBLISH_TO_LAUNCHER:
        value: "false"
        description: "Set to true to for Kit apps that are published to the Launcher. That adds jobs for that."
    ALLOW_PUBLISH_TO_PACKMAN:
        value: "true"
        description: "Set to true to for Kit apps that are published to the Packman. That adds jobs for that."
    ALLOW_PUBLISH_PYTHON_PACKAGES:
        value: "true"
        description: "Set to true to create and publish python packages."
    ALLOW_PUBLISH_EXTENSIONS:
        value: "true"
        description: "Set to true to publish extension updates."
    ALLOW_PUBLISH_CONTAINERS:
        value: "true"
        description: "Set to true to publish containers to NGC."
    ALLOW_SECURITY_SCAN:
        value: "false"
        description: "Set to true to trigger a security scan as a child pipeline (non blocking)"
    ALLOW_SCHEDULE_PIPELINE:
        value: "true"
        description: "Set to 'false' to disable schedule pipeline on a all jobs, useful to set it back on only some jobs."
    ALLOW_TAG_PIPELINE:
        value: "true"
        description: "Set to 'false' to disable tag pipeline on a all push jobs."
    RUN_EXTENSION_BENCHMARKS:
        value: "false"
        description: "Set to true to run benchmarks for kit extensions."
    RUN_ETM_TESTS:
        value: "false"
        description: "Set to true to run ETM tests for kit extensions. Only happens on push (extensions need to be published first)."
    DATADOG_TEST_VISIBILITY:
        value: "true"
        description: "Set to false to skip sending tests results to Datadog (internal)"
    OMNI_CI_ENABLE_CXX_COVERAGE:
        value: "true"
        description: "Set to 'true' to enable C++ code coverage testing."
    OMNI_CI_ENABLE_SANITIZERS:
        value: "false"
        description: "Set to 'true' to enable C++ sanitizer builds."
    RUN_BUMP_VERSION:
        value: "false"
        description: "Set to true to run bump version. Only happens on schedule."
    RUN_NIGHTLY_TESTS:
        value: "true"
        description: "Set to true to run nightly tests. Only happens on schedule."
    RUN_DOCS_PUBLISH:
        value: "false"
        description: "Set to true to publish omni docs. Only happens on schedule."
    RUN_DOCS_BUILD:
        value: "false"
        description: "Set to true to build omni docs. Only happens on schedule."
    RUN_CHECKS:
        value: "true"
        description: "Set to true to run check stage."
    PLATFORM_LINUX_AARCH64: 'true'
    RUN_BUILDS:
        value: "true"
        description: "Set to true to run build stage."
    RUN_TESTS:
        value: "true"
        description: "Set to true to run test stage."
    RUN_DEPLOY:
        value: "true"
        description: "Set to true to run deploy stage."
    # KUBERNETES_EPHEMERAL_STORAGE_REQUEST:
    #     value: "200Gi"
    #     description: "Fix publish extensions"
    # KUBERNETES_EPHEMERAL_STORAGE_LIMIT:
    #     value: "200Gi"
    #     description: "Fix publish extensions"

# ==============================================================================================================
# Slack notifications
.post_job_status_to_slack:
  after_script:
    - ./tools/packman/python.sh -m pip install -r tools/ci/slack/requirements.txt --quiet
    - ./tools/packman/python.sh tools/ci/slack/post_to_slack.py --job-report

post_to_slack:
  dependencies: []
  variables:
    SLACK_CHANNEL: "#isaac-sim-ci"
  stage: slack-notifications
  extends:
    - .ipp_lnx_x86_64_cpu_small
  script:
    # Installing some packages to get kaleido happy
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2
    - ./tools/packman/python.sh -m pip install -r tools/ci/slack/requirements.txt --quiet
    - ./tools/packman/python.sh tools/ci/slack/post_to_slack.py --pipeline-report --channel $SLACK_CHANNEL
  rules:
    # Using rules to set the channel.  
    # Nightlies from Kit against a kit-integration branch get #isaac-sim-kit-integration-ci
    # We shouldn't get them but nightlies from kit that do not hit a kit-integration branch get #isaac-sim-ci
    # MRs from Kit (with checkbox selected) and Isaac (with checkbox selected) get #isaac-sim-ci-mr
    # Nightlies from Isaac, and post-merge from Isaac get #isaac-sim-ci
    - if: $CI_COMMIT_REF_NAME =~ /^kit-integration\// && $CI_PIPELINE_SOURCE != "push" && $UPSTREAM_PIPELINE_SOURCE == "merge_request"
      when: always
      variables:
        SLACK_CHANNEL: "#isaac-sim-ci-mr"
    - if: $CI_COMMIT_REF_NAME == "develop-kit-tot" && $CI_PIPELINE_SOURCE != "push" && $UPSTREAM_PIPELINE_SOURCE == "nightly"
      when: always
    - if: $UPSTREAM_PIPELINE_SOURCE == "post_merge"
      when: always
    - if: $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] Post pipeline reports to slack/"
      when: always
      variables:
        SLACK_CHANNEL: "#isaac-sim-ci-mr"
    - if: $CI_COMMIT_REF_NAME =~ /^kit-integration\// && $CI_PIPELINE_SOURCE != "push" && $UPSTREAM_PIPELINE_SOURCE == "nightly"
      when: always
      variables:
       SLACK_CHANNEL: "#isaac-sim-kit-integration-ci"
    - !reference [.rules-nightly-tests-always, rules]
  artifacts:
    paths:
      - pipeline_test_chart_heatmap.html
      - pipeline_test_chart_heatmap.png
      - regressions.txt
    expire_in: 1 week
  


# ==============================================================================================================
# overrides for compliance/osec job
osec:sonarqube:
    stage: security
    needs:
      - job: gather-coverage
        artifacts: true
    allow_failure:
      exit_codes:
        - 2
        - 3
    variables:
      SONAR_CFAMILY_COMPILE_COMMANDS: "_build/linux-x86_64/release/compile_commands.json"
      LINBUILD_EMBEDDED: "1"
      SONAR_EXTRA_ARGS: "-Dsonar.qualitygate.timeout=1000 -Dsonar.branch.name=$CI_COMMIT_REF_NAME -Dsonar.python.coverage.reportPaths=coverage.xml -Dsonar.cfamily.cobertura.reportPaths=cpp_coverage.xml"
      SONAR_EXCLUSIONS:  "**/_build/**,**/_repo/**,**/_compiler/**,\
        \
        **/*.js,**/*.ts,**/*.css,**/*.html,\
        \
        source/extensions/omni.kit.loop-isaac/plugins/omni.kit.loop/RunLoopRunner.cpp,\
        \
        **/tests/**/*.cpp,\
        \
        "
    before_script:
      - set -eu && ./repo.sh build --generate --config release --no-licensing --skip-compiler-version-check --/repo_build/fetch/after_pull_commands='' --/repo_build/post_build/commands='' --/repo_build/pre_build/commands=''
      # OSEC-1623 (originally OSEC-1511) patch the compile_commands.json sonarqube will use for analysis to include our behaviour changing "SONAR" ifdef
      # - sed -i -e 's/"g++ /"g++ -DNV_SONAR_BUILD=1 /' $SONAR_CFAMILY_COMPILE_COMMANDS
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
        when: never
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true")
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        allow_failure: true
        interruptible: true
      # - !reference [.rules-push-manual, rules]

# ==============================================================================================================
.check-common:
    stage: check
    timeout: 20 minutes
    interruptible: true
    rules:
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - if: $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true"
        when: never
      - if: $RUN_CHECKS == "false"
        when: never
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        when: never
      - !reference [.rules-workflow, rules]

.repo-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _repo/repo.log
          - _repo/repolog*.txt

# ==============================================================================================================
# Rule for running nightly tests on scheduled pipeline on develop and release branches
.rules-bump-version:
    rules:
      - if: $CI_COMMIT_TITLE =~ /^Bumped version/
        when: never
      - if: $CI_PIPELINE_SOURCE == "schedule" && $RUN_BUMP_VERSION == "true" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)

# ==============================================================================================================
# Rule for running nightly tests on scheduled pipeline on protected and release branches
.rules-nightly-tests:
    rules:
      # allow schedule pipeline if RUN_NIGHTLY_TESTS is set to "true" and on protected and release/* branches
      - if: $CI_PIPELINE_SOURCE == "push" && $RUN_NIGHTLY_TESTS == "true" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        # allow on bump version
        changes:
          - VERSION.md
          - VERSION

# Copy paste of the previous but this one always runs, used for the slack post currently
.rules-nightly-tests-always:
    rules:
      # allow schedule pipeline if RUN_NIGHTLY_TESTS is set to "true" and on protected and release/* branches
      - if: $CI_PIPELINE_SOURCE == "push" && $RUN_NIGHTLY_TESTS == "true" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        when: always
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        when: always
        # allow on bump version
        changes:
          - VERSION.md
          - VERSION

.rules-publish-docs:
    rules:
      # Publish release docs for release/x.y branches on push pipelines
      - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+$/'
        when: always
        variables:
          PAGES_PATH_PREFIX: "$CI_COMMIT_REF_NAME"
      # Publish release docs for release/x.y branches on scheduled docs builds
      - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+$/ && $RUN_DOCS_BUILD == "true"'
        when: always
        variables:
          PAGES_PATH_PREFIX: "$CI_COMMIT_REF_NAME"
      # Publish root docs from develop on push pipelines
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"
        when: always
        variables:
          PAGES_PATH_PREFIX: "develop"
      - if: $CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE =~ /^(nightly|post_merge)$/ && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
        when: always
        variables:
          PAGES_PATH_PREFIX: "$CI_COMMIT_REF_NAME"

.rules-build-docs:
    rules:
      # allow docs build on push pipelines
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH =~ $OFFICIAL_BRANCH_REGEX)
        when: always
      # allow schedule pipeline if RUN_DOCS_BUILD is set to "true"
      - if: $CI_PIPELINE_SOURCE == "schedule" && $RUN_DOCS_BUILD == "true"
        when: always
      - when: never

.rules-build-docs-mr:
    rules:
      # Skip if "User docs only change" is checked (handled by the lightweight job instead)
      - if: $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"
        when: never
      # MR checkbox opt-in for full docs (user guide + API)
      - if: $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] Build docs in MR pipelines/"
      - when: never

.rules-build-docs-only-mr:
    rules:
      # Run only when user checks the box (no auto-trigger on docs-only changes)
      - if: $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"
      - when: never

# ==============================================================================================================
# Rule for running publisher on push on develop and release branches
.rules-version-changed:
    rules:
      - if: $CI_COMMIT_TITLE !~ /^Bumped version/
        when: never
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        when: never
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        changes:
          - VERSION.md
          - VERSION

.rules-version-changed-manual:
    rules:
      - if: $CI_COMMIT_TITLE !~ /^Bumped version/
        when: never
      - if: $CI_PIPELINE_SOURCE == "pipeline"
        when: never
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        changes:
          - VERSION.md
          - VERSION
        when: manual
        allow_failure: true

.rules-push-manual:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_PROTECTED == "true" || $CI_COMMIT_BRANCH
      =~ $OFFICIAL_BRANCH_REGEX)
    interruptible: false
    when: manual
    allow_failure: true
  - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
    when: manual
    allow_failure: true
  - if: $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "web"
    when: manual
    allow_failure: true
  - if: $CI_PIPELINE_SOURCE == "schedule" && $ALLOW_SCHEDULE_PIPELINE == "true"
    interruptible: false
    when: manual
    allow_failure: true


# ==============================================================================================================
# Job that ensures that the MR has a JIRA ticket reference in the title
check-jira-ticket:
    extends:
      - .check-common
      - .check-jira-ticket
      - .ipp_lnx_x86_64_cpu_medium
    allow_failure: true
    rules:
      - !reference [.rules-mr, rules]

