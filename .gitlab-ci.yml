# ==============================================================================================================
# Publishes docs and the IsaacLab dashboard to GitLab Pages.
pages:
    stage: pages
    extends:
      - .build-common
      - .ipp_lnx_x86_64_cpu_small
    # Heatmap artifact basenames (no extension) — must live in `variables:` so
    # every script step sees them; assigning in a prior `script:` line does not
    # persist across separate runner shell invocations.
    variables:
      LAB_HM: "pipeline_test_chart_isaaclab_heatmap"
      SIM_HM: "pipeline_test_chart_isaacsim_heatmap"
    script:
      - mkdir -p .public
      - cp -r _build/docs/isaac-sim/latest/* .public/ || true
      - |
        ILAB_BRANCH="${ISAAC_LAB_BRANCH:-develop}"
        if [ -d _isaaclab_cache/output ]; then
          mkdir -p ".public/isaac-lab/${ILAB_BRANCH}/data"
          cp _isaaclab_cache/output/dashboard.html ".public/isaac-lab/${ILAB_BRANCH}/"
          cp -r _isaaclab_cache/output/data/. ".public/isaac-lab/${ILAB_BRANCH}/data/"
          # Co-locate the IsaacLab heatmap next to its dashboard so the in-page
          # "Open heatmap" link (which points at the namespace-specific
          # filename) resolves.
          cp _isaaclab_cache/output/$LAB_HM.html ".public/isaac-lab/${ILAB_BRANCH}/" 2>/dev/null || true
          cp _isaaclab_cache/output/$LAB_HM.png ".public/isaac-lab/${ILAB_BRANCH}/" 2>/dev/null || true
        fi
      - |
        if [ -d _isaacsim_cache/output ]; then
          mkdir -p .public/isaac-sim/data
          cp _isaacsim_cache/output/dashboard.html .public/isaac-sim/index.html
          cp -r _isaacsim_cache/output/data/. .public/isaac-sim/data/
          cp _isaacsim_cache/output/$SIM_HM.html .public/isaac-sim/ 2>/dev/null || true
          cp _isaacsim_cache/output/$SIM_HM.png .public/isaac-sim/ 2>/dev/null || true
          # IsaacSim heatmap also stays at the generic top-level location for
          # backward compatibility with existing links.
          cp _isaacsim_cache/output/$SIM_HM.html .public/heatmap.html 2>/dev/null || true
          cp _isaacsim_cache/output/$SIM_HM.png .public/heatmap.png 2>/dev/null || true
        fi
      - mv .public public
      - |
        # Print the public URLs for the dashboards and heatmaps that were published.
        # Some GitLab versions/instances expose CI_PAGES_URL as the project Pages
        # root even when pages:path_prefix is set, so add the normalized prefix
        # here if GitLab has not already included it.
        ILAB_BRANCH="${ISAAC_LAB_BRANCH:-develop}"
        BASE="${CI_PAGES_URL%/}"
        case "${BASE}" in
          http://omniverse.gitlab-master-pages.nvidia.com|http://omniverse.gitlab-master-pages.nvidia.com/*)
            BASE="https://${BASE#http://}"
            ;;
        esac
        PATH_PREFIX="${PAGES_PATH_PREFIX:-}"
        if [ -n "${PATH_PREFIX}" ]; then
          NORMALIZED_PREFIX="$(
            printf '%s' "${PATH_PREFIX}" \
              | LC_ALL=C tr '[:upper:]' '[:lower:]' \
              | LC_ALL=C sed -e 's/[^a-z0-9.]/-/g' -e 's/^[.-]*//' \
              | LC_ALL=C cut -b1-63 \
              | LC_ALL=C sed -e 's/[.-]*$//'
          )"
          if [ -n "${NORMALIZED_PREFIX}" ]; then
            case "${BASE}/" in
              */"${NORMALIZED_PREFIX}/") ;;
              *) BASE="${BASE}/${NORMALIZED_PREFIX}" ;;
            esac
          fi
        fi
        echo "=== Published pages URLs ==="
        [ -f "public/isaac-sim/index.html" ] && echo "IsaacSim dashboard:  ${BASE}/isaac-sim/"
        [ -f "public/isaac-sim/${SIM_HM}.html" ] && echo "IsaacSim heatmap:    ${BASE}/isaac-sim/${SIM_HM}.html"
        [ -f "public/isaac-lab/${ILAB_BRANCH}/dashboard.html" ] && echo "IsaacLab dashboard:  ${BASE}/isaac-lab/${ILAB_BRANCH}/dashboard.html"
        [ -f "public/isaac-lab/${ILAB_BRANCH}/${LAB_HM}.html" ] && echo "IsaacLab heatmap:    ${BASE}/isaac-lab/${ILAB_BRANCH}/${LAB_HM}.html"
    artifacts:
        expire_in: never
        paths:
          - public
    pages:
      # develop -> develop, release/x.y -> normalized branch-prefixed deployment
      # GitLab 17.4 expires parallel Pages deployments after 24 hours unless kept.
      path_prefix: "$PAGES_PATH_PREFIX"
      expire_in: never
    rules:
      - !reference [.rules-publish-docs, rules]
    needs:
      - job: build-docs
        artifacts: true
        optional: true
      - job: post-to-isaac-sim-slack
        artifacts: true
        optional: true
      - job: post-to-isaac-lab-slack
        artifacts: true
        optional: true
      - job: generate-isaac-lab-dashboard
        artifacts: true
        optional: true
      - job: generate-isaac-sim-dashboard
        artifacts: true
        optional: true


