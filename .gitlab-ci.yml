# Hidden jobs defining Python 3.12 images for Linux
.python312-image-linux-x86_64:
  image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-python312:1.0.17

.python312-image-linux-aarch64:
  image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-aarch64-python312:1.0.17

verify-publish-python-packages-linux-x86_64:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_gpu
      - .kit-runner-test-linux-x86_64-1x-gpu
      - .python312-image-linux-x86_64
    script:
      # create and source a virtual environment
      - python3.12 -m venv env_isaacsim
      - source env_isaacsim/bin/activate
      # upgrade pip and install Isaac Sim - Python packages
      - pip install --upgrade pip
      - pip install -r _build/packages/python/requirements.txt --extra-index-url "https://${ISAACSIM_ARTIFACTORY_USERNAME}:${ISAACSIM_ARTIFACTORY_PASSWORD}@artifactory.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple"
      # accept EULA
      - export OMNI_KIT_ACCEPT_EULA=YES
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedStage=1 --no-window
    needs:
      - job: publish-python-packages-linux-x86_64
        artifacts: true
    rules:
      - !reference [publish-python-packages-linux-x86_64, rules]

verify-publish-python-packages-windows-x86_64:
    interruptible: true
    allow_failure: true
    extends:
      - .deploy-common
      - .kit-runner-test-windows-x86_64-1x-gpu
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      # install Python 3.12
      - curl -o python-3.12.exe https://www.python.org/ftp/python/3.12.9/python-3.12.9-amd64.exe
      - cmd /c start /wait python-3.12.exe /quiet TargetDir=C:\Python312
      # create and source a virtual environment
      - C:\Python312\python.exe -m venv C:\env_isaacsim
      - C:\env_isaacsim\Scripts\python.exe -m pip install --upgrade pip
      - C:\env_isaacsim\Scripts\activate.ps1
      # install Isaac Sim - Python packages
      - pip install -r _build/packages/python/requirements.txt --extra-index-url "https://$($env:ISAACSIM_ARTIFACTORY_USERNAME):$($env:ISAACSIM_ARTIFACTORY_PASSWORD)@artifactory.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi/simple"
      # accept EULA
      - $env:OMNI_KIT_ACCEPT_EULA = "YES"
      # run tests
      - python -c "import isaacsim"
      - isaacsim isaacsim.exp.full --/app/quitAfter=100 --/app/file/ignoreUnsavedStage=1 --no-window
    needs:
      - job: publish-python-packages-windows-x86_64
        artifacts: true
    rules:
      - !reference [publish-python-packages-windows-x86_64, rules]

