      - !reference [.osec:vault:v3:linux, codesign:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
      - !reference [.osec:vault:v3:linux, nucleus:kit-extensions.ov.nvidia.com:kit-extension-svc:perform_vault_requests]
    script:
      - ./repo.sh stage_for_github _git/isaacsim_staging
      - cd _git/isaacsim_staging
      - git remote -v
      - git lfs fetch --all
      # Custom Cleanup - clean extension.toml files to remove authors and repository
      - find source -name "extension.toml" -exec sed -i '/^\s*\(authors\|repository\)\s*=/d' {} \;
    #   # Custom Cleanup - remove pycaches
    #   - find -type d -iname '__pycache__' -exec rm -rf "{}" \;
      - git config user.email "gitlab@nvidia.com"
      - git config user.name "gitlab"
      - echo "Isaac Sim Update"
      - git checkout -b upstream/update_from_${CI_COMMIT_SHORT_SHA}
      - git add -Af && git commit -m "Isaac Sim Update"
      - git push --set-upstream origin upstream/update_from_${CI_COMMIT_SHORT_SHA}
    # when: manual
    rules:
      - if: $CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+_oss$/
        when: manual
    #   - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  =~ /^release\/\d+\.\d+_oss$/
    #     when: manual
      # - !reference [.rules-version-changed, rules]
      # - !reference [.rules-push-manual, rules]

# ==============================================================================================================
verify-stage-to-gitlab:
    stage: verify-github-staging
    timeout: 1 hour
    interruptible: true
    allow_failure: true
    extends:
      - .ipp_lnx_x86_64_cpu_small
    script:
      - ./tools/ci/check_github_staging/check_github_staging.sh _git/isaacsim_staging
    needs:
      - job: stage-to-gitlab
        optional: true
    rules:
      - if: $CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+_oss$/
      - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME  =~ /^release\/\d+\.\d+_oss$/
    artifacts:
      expire_in: 2 weeks
      when: always
      paths:
        - results.json
        - results_by_file.json


# ==============================================================================================================
scan-packages-internal-urls:
    stage: security
    timeout: 2 hours
    interruptible: true
    allow_failure: true
    extends:
      - .ipp_lnx_x86_64_cpu_medium
    needs:
      - job: build-linux-x86_64-release
        artifacts: true
        optional: true
      - job: build-linux-aarch64-release
        artifacts: true
        optional: true
      - job: build-windows-x86_64-release
        artifacts: true
        optional: true
    script:
      - python3 tools/ci/package_scanner/scan_packages.py
          --version $(cat VERSION | head -1)
          --skip-download
          --filter release
          --exclude-dir kit
          --exclude-dir extscache
          --exclude-dir tests
          --exclude-dir docs
          --exclude-dir extsInternal
    rules:
      - if: $RUN_BUMP_VERSION == "true"
        when: never
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        when: manual
      - !reference [.rules-push-manual, rules]
      - !reference [.rules-version-changed, rules]
    artifacts:
      expire_in: 2 weeks
      when: always
      paths:
        - _build/packages/internal_url_report.csv


# ==============================================================================================================
.test-linux-x86_64-isaaclab-integration-base:
  stage: test
  needs:
    - job: build-linux-x86_64-release
      artifacts: true
  extends:
    - .ipp_lnx_x86_64_gpu
    - .kit-runner-test-linux-x86_64-1x-gpu
  script:
    - ./repo.sh ci test_isaaclab
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - _isaaclab/tests/*
      - '**/tests/*.xml'
    reports:
      junit:
        - '**/tests/full_report.xml'

test-linux-x86_64-isaaclab-integration:
  rules:
    # Disable this job for all downstream pipelines until its more green
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - !reference [.disable_on_downstream_of_mr, rules]
    - !reference [.test-common, rules]
  extends:
    - .test-common
    - .test-linux-x86_64-isaaclab-integration-base
  variables:
    ISAACSIM_CI_SHORT: "true"

test-linux-x86_64-isaaclab-integration-nightly:
  timeout: 12 hours
  extends:
    - .test-nightly
    - .test-linux-x86_64-isaaclab-integration-base

check-app-version-locks:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_large
  needs:
    - job: build-linux-x86_64-release
  script:
    # Test the script that we'll run.
    - ./repo.sh test -s check_app_version_locks
    # Run the script to list missing extensions
    - ./repo.sh ci check_app_version_locks
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    # Reports for release engineers.
    - "*.kit"
    - "*.txt"
    # For development/debug.
    - source/apps/
    - source/extensions/
  allow_failure: true
  rules:
  - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
    when: never
  - if: $RUN_BUMP_VERSION == "true"
    when: never
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: never
  - if: $CI_COMMIT_BRANCH =~ /^release\/.*$/
  - !reference [.rules-version-changed, rules]
  - !reference [.rules-push-manual, rules]

check-extension-support-levels:
  stage: test
  extends:
      - .ipp_lnx_x86_64_gpu
      - .kit-runner-test-linux-x86_64-1x-gpu
  needs:
    - job: build-linux-x86_64-release
  script:
    # Run the script to list the conflicting support levels
    - ./repo.sh ci check_extension_support_levels
  artifacts:
    when: always
    expire_in: 2 Weeks
    paths:
    - "*.json"
    - "*.kit"
    # For development/debug.
    - source/apps/
  allow_failure: true
  rules:
  - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
    when: never
  - if: $RUN_BUMP_VERSION == "true"
    when: never
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: never
  - if: $CI_COMMIT_BRANCH =~ /^release\/.*$/
  - !reference [.rules-version-changed, rules]
  - !reference [.rules-push-manual, rules]


generate-public-extension-mr:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_large
  needs:
    - job: check-app-version-locks
  script:
    - mkdir -p _build/linux-x86_64/release/apps
    - cp source/apps/isaacsim.exp.extscache.kit _build/linux-x86_64/release/apps/
    - ./repo.sh deploy_exts
  rules:
  - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
    when: never
  - if: $RUN_BUMP_VERSION == "true"
    when: never
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: never
  - if: $CI_COMMIT_BRANCH =~ /^release\/.*$/
    when: manual
    allow_failure: true
  - !reference [.rules-version-changed-manual, rules]
  - !reference [.rules-push-manual, rules]
