# ==============================================================================================================
.deploy-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    - _build/**/*.log
    - _repo/repo.log
    - _repo/repolog*.txt
    - _logs/**/*.log


# ==============================================================================================================
.deploy-common:
  stage: deploy
  extends:
  - .deploy-artifacts
  timeout: 1 hour
  interruptible: false
  before_script:
  - set -eu
  - !reference [.omni_codesign_get_secrets, omni_codesign_get_secrets]
  - !reference [.omni_s3_write_get_secrets, omni_s3_write_get_secrets]

pages:
  tags:
  - pages
  stage: deploy
  image: alpine:latest
  script:
  - apk add --no-cache p7zip wget curl
  - mkdir .public
  - echo "10.36.168.30 teamcity.nvidia.com" >> /etc/hosts
  - echo "24.51.7.209 swiftstack-maglev.ngc.nvidia.com" >> /etc/hosts
  - 'curl -L --output docs.7z --header "Authorization: Bearer $TC_TOKEN" https://teamcity.nvidia.com/repository/download/Omniverse_IsaacSim_Develop_BuildAndPackaging_OmniDocsBuildLinuxX8664/.lastSuccessful/omniverse-robotics-docs%40%7Bbuild.number%7D.7z'
  - 'curl -L --output pydocs.7z --header "Authorization: Bearer $TC_TOKEN" https://teamcity.nvidia.com/repository/download/Omniverse_IsaacSim_Develop_BuildAndValidation/.lastSuccessful/artifacts/Linux/docs%40%7Bbuild.number%7D.linux-x86_64.7z'
  - 7z x docs.7z -o.public
  - 7z x pydocs.7z -oisaacsim
  - mkdir -p .public/py/
  - mv isaacsim .public/py/
  - ls .public/py/isaacsim
  - mv .public public
  artifacts:
    paths:
    - public
  rules:
  - if: $RUN_BUMP_VERSION == "true" || $CI_COMMIT_BRANCH != "develop"
    when: never

# ==============================================================================================================
.benchmark-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
    - '_testoutput/benchmark.*.json'
    - .reggie-out/

# ==============================================================================================================
.benchmark-common:
  stage: test
  timeout: 1 hour
  extends:
  - .benchmark-artifacts
  variables:
    MAX_RETRIES: 2
  retry: 2
  rules:
  - if: $RUN_EXTENSION_BENCHMARKS != "true"
    when: never
  - !reference [.rules-workflow, rules]


# ==============================================================================================================
benchmark-linux-x86_64:
  extends:
  - .benchmark-common
  tags:
  - instance/gitlab-gtl-performance
  - omni-perf-only/linux
  variables:
    MACHINE_OS: "ubuntu22"
    MACHINE_KIND: "AMD EPYC 7313P"
    MACHINE_DRIVER: "NVIDIA-Linux-x86_64-525.85.05"
  script:
  - ./repo.sh bench
  - !reference [.reggie_detect_ubuntu, commands]
  needs:
  - job: build-linux-x86_64-release
    artifacts: true


# ==============================================================================================================
benchmark-windows-x86_64:
  extends:
  - .benchmark-common
  tags:
  - instance/gitlab-gtl-performance
  - omni-perf-only/windows
  variables:
    MACHINE_OS: "windows10-20H2"
    MACHINE_KIND: "AMD EPYC 7313P"
    MACHINE_DRIVER: "537.70-sandbag_UDA_QuadroWeb_Public-wddm2-x64-dch-AttestedDriverSigning"
  script:
  - ./repo.bat bench
  - !reference [.reggie_detect_windows, commands]
  needs:
  - job: build-windows-x86_64-release
    artifacts: true



