# ==============================================================================================================
check-code-format:
    extends:
      - .check-common
      - .repo-artifacts
      - .runner-utility-linux-x86_64
    variables:
        GIT_DEPTH: 0 # needed to update copyrights
    script:
      - ./repo.sh format --verify

# ==============================================================================================================
check-python-packages:
    extends:
      - .check-common
      - .repo-artifacts
      - .runner-utility-linux-x86_64
    script:
      - ./repo.sh check_python_package_definitions --gitlab

# ==============================================================================================================
.build-artifacts:
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          # Temporarily disable these artifacts to fix link error when extracting kit-sdk
          # - _build/**/*.gcno # produced by the coverage build
          # - _build/**/*.log
          - _build/packages/
          - _repo/repo.log
          - _repo/repolog*.txt

# ==============================================================================================================
.build-common:
    stage: build
    timeout: 3 hours
    interruptible: true
    extends:
      - .build-artifacts
    retry:
        max: 2
        when:
          - always
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_BUILDS != "true"
        when: never
      - !reference [.rules-workflow, rules]

# ==============================================================================================================
build-linux-x86_64-release:
    extends:
      - .build-common
      - .runner-large-build-linux-x86_64
      - .osec:vault:v3:prod_token_job
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.6-97c67f00
    before_script:
      - set -eu
      - apt-get install -y libarchive-tools
      # - apt-get install -y rdfind # TODO: Add rdfind back in, was seeing package not found error on gitlab runner
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    script:
      - ./repo.sh ci build -c release

# ==============================================================================================================
build-linux-x86_64-debug:
    extends:
      - .build-common
      - .runner-large-build-linux-x86_64
      - .osec:vault:v3:prod_token_job
    image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.6-97c67f00
    before_script:
      - set -eu
      - apt-get install -y libarchive-tools
      # - apt-get install -y rdfind # TODO: Add rdfind back in, was seeing package not found error on gitlab runner
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    script:
      - ./repo.sh ci build -c debug

# ==============================================================================================================
build-linux-aarch64-release:
  extends:
    - .build-common
    - .runner-build-linux-aarch64
    - .osec:vault:v3:prod_token_job
  image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-aarch64-builder:1.0.6-97c67f00
  variables:
    OMNI_REPO_BUILD_NO_DOCKER: "1"
  before_script:
    - set -eu
    - !reference [.gitlab-info-external-urls-linux, script]
    - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
  script:
    - ./repo.sh ci build -c release
  after_script:
    - !reference [.gitlab-info-external-urls-linux, script]
  rules:
    - if: $RUN_BUMP_VERSION == "true"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never  # Manual to avoid overloading ARM ci runners during MRs
    - !reference [.rules-platform-linux-aarch64, rules]
    - !reference [.rules-workflow, rules]
    - !reference [.rules-version-changed, rules]

# ==============================================================================================================
build-linux-aarch64-debug:
  extends:
    - .build-common
    - .runner-build-linux-aarch64
    - .osec:vault:v3:prod_token_job
  image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-aarch64-builder:1.0.6-97c67f00
  variables:
    OMNI_REPO_BUILD_NO_DOCKER: "1"
  before_script:
    - set -eu
    - !reference [.gitlab-info-external-urls-linux, script]
    - !reference [.osec:vault:v3:linux, packman_s3:perform_vault_requests]
  script:
    - ./repo.sh ci build -c debug
  after_script:
    - !reference [.gitlab-info-external-urls-linux, script]
  rules:
    - if: $RUN_BUMP_VERSION == "true"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never  # Manual to avoid overloading ARM ci runners during MRs
    - !reference [.rules-platform-linux-aarch64, rules]
    - !reference [.rules-workflow, rules]
    - !reference [.rules-version-changed, rules]


# ==============================================================================================================
build-windows-x86_64-release:
    extends:
      - .build-common
      - .runner-large-build-windows-x86_64
      - .osec:vault:v3:prod_token_job
    before_script:
      - !reference ['.osec:vault:v3:windows:powershell', 'packman_s3:perform_vault_requests']
    script:
      - ./repo.bat ci build -c release

# ==============================================================================================================
build-windows-x86_64-debug:
    extends:
      - .build-common
      - .runner-large-build-windows-x86_64
      - .osec:vault:v3:prod_token_job
