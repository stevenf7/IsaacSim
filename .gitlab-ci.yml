.test-artifacts:
    artifacts:
        when: always
        expire_in: 12 weeks
        paths:
          - _build/**/*.log
          - _build/**/debug/*.xml
          - _build/**/release/*.xml
          - _build/coverage.info
          - _build/coverage/**
          - _build/**/*.gcda
          - _build/**/*.gcno
          - _repo/repo.log
          - _repo/repolog*.txt
          - _build/**/_testoutput/
          - .coverage
          - .coveragemergerc
          - coverage.xml
          - _testoutput
          - cpp_coverage.xml
        reports:
            junit:
              - _build/**/debug/*.xml
              - _build/**/release/*.xml
              - _build/**/_testoutput/**/results.xml
            coverage_report:
              coverage_format: cobertura
              path: ./*coverage.xml

# ==============================================================================================================
.test-common:
    stage: test
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 10800 # 3 hours
    interruptible: true
    extends:
      - .test-artifacts
    allow_failure: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_TESTS != "true"
        when: never
      - !reference [.rules-workflow, rules]

# ==============================================================================================================
# Fast CPU-only test of the isaacsim_design and isaacsim_homepage parser
# and validator behavior. Belongs in the `test` stage semantically (it's
# pytest, not a lint check) — but we cannot extend .test-common, which
# gates on $RUN_TESTS == "true" and would skip on standard MRs. Instead
# we inherit .check-common's "always-run-on-MRs" rules, override the
# stage to `test`, and use `needs: []` so the job starts immediately
# instead of waiting for the check stage to finish. The first rule
# overrides the "[X] User docs only change" MR shortcut (which sets
# RUN_CHECKS=false and would otherwise skip .check-common) — docs-only
# MRs are exactly when this job needs to run. Dependency versions are
# pinned so the job stays reproducible even as upstream releases churn;
# bump them together with the main docs build's pinned Sphinx /
# docutils.
test-docs-isaacsim-design:
    extends:
      - .check-common
      - .ipp_lnx_x86_64_cpu_small
    stage: test
    needs: []
    image: python:3.11-alpine
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      - !reference [.check-common, rules]
    script:
      - pip install --quiet --no-cache-dir
          'pytest==8.3.4'
          'docutils==0.21.2'
          'sphinx==7.4.7'
      - PYTHONPATH=docs/conf/ext python3 -m pytest -v
          docs/conf/ext/isaacsim_design/tests/test_parsers.py
          docs/conf/ext/isaacsim_homepage/tests/test_parsers.py

.test-nightly:
    stage: nightly-test
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 10800 # 3 hours
    interruptible: true
    extends:
      - .test-artifacts
    allow_failure: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS != "true"
        when: never
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        when: never
      - !reference [.rules-version-changed, rules]

.test-external:
    stage: external-test
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 10800 # 3 hours
    interruptible: true
    extends:
      - .test-artifacts
    allow_failure: true
    needs:
      - job: check-code-format
        optional: true
      - job: build-linux-x86_64-c++-coverage
        artifacts: true
    rules:
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true" || $ALLOW_PUBLISH_DOCS == "true" || $RUN_NIGHTLY_TESTS != "true"
        when: never
      - !reference [.disable_on_downstream_of_mr, rules]
      - !reference [.rules-workflow, rules]

# Set REPORT_TIMING to "after_script" for pythontests/nativepythontests, "inline" otherwise. Reference at start of script in matrix test jobs.
.determine_report_generation_timing_linux:
  script:
    - if [ "$SUITE" == "pythontests" ] || [ "$SUITE" == "nativepythontests" ] || [ "$SUITE" == "doc_snippets" ] || [ "$SUITE" == "doc_snippets_async" ]; then export REPORT_TIMING="after_script"; else export REPORT_TIMING="inline"; fi

.determine_report_generation_timing_windows:
  script:
    - if ($env:SUITE -eq "pythontests" -or $env:SUITE -eq "nativepythontests" -or $env:SUITE -eq "doc_snippets" -or $env:SUITE -eq "doc_snippets_async") { $env:REPORT_TIMING = "after_script" } else { $env:REPORT_TIMING = "inline" }

.test-linux-common:
    after_script:
      - !reference [.datadog-test-visibility-linux-x86_64, script]
      - !reference [.determine_report_generation_timing_linux, script]
      - mkdir -p _build/intermediate/${CI_JOB_ID}
      - if [ -d _build/intermediate/linux-x86_64 ]; then
      -   mv _build/intermediate/linux-x86_64 _build/intermediate/${CI_JOB_ID}/
      - fi
      - INTERMEDIATE_FOLDER=$(find _build/packages/ -type d -iname 'intermediate')
      - if [ -d ${INTERMEDIATE_FOLDER} ]; then
      -   cp -r ${INTERMEDIATE_FOLDER}/* _build/intermediate/${CI_JOB_ID}
      - fi
      - if [ "$REPORT_TIMING" == "after_script" ]; then
      -   ./repo.sh ci test -- --generate-report
      - fi
      - TESTOUTPUT_FOLDER=$(find _build/packages -type d -iname '_testoutput')
      - mkdir -p ${TESTOUTPUT_FOLDER}/${CI_JOB_ID}
      - if [ -d ${TESTOUTPUT_FOLDER} ]; then
      -   cp -r ${TESTOUTPUT_FOLDER}/* _build/intermediate/${CI_JOB_ID}
      - fi
    needs:
      - job: build-linux-x86_64-c++-coverage
        artifacts: true

# ==============================================================================================================
# Install VC++ Redistributable for Windows test jobs (required for PyTorch DLLs like c10.dll)
.install-windows-vcredist:
    before_script:
      - |
        # Print Windows version info for debugging
        Write-Host "=== Windows Version Info ==="
        Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"
        Write-Host "Platform: $([System.Environment]::Is64BitOperatingSystem)"
        Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber | Format-List
        Write-Host "==========================="
      - |
        # Install VC++ Redistributable and UCRT using multiple methods for reliability
        Write-Host "Installing Visual C++ Redistributable 2015-2022 (includes UCRT)..."

        # Method 1: Try winget first (fastest, most reliable on modern Windows)
        $wingetAvailable = Get-Command winget -ErrorAction SilentlyContinue
        if ($wingetAvailable) {
          Write-Host "Using winget to install VC++ Redistributable..."
          winget install Microsoft.VCRedist.2015+.x64 --silent --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -eq 0) {
            Write-Host "winget installation successful."
          } else {
            Write-Host "winget installation returned code $LASTEXITCODE, trying direct download..."
          }
        } else {
          Write-Host "winget not available, using direct download..."
        }

        # Method 2: Direct download as fallback/supplement
        Write-Host "Downloading and installing VC++ Redistributable directly..."
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
        Start-Process -FilePath ".\vc_redist.x64.exe" -ArgumentList "/install","/quiet","/norestart" -Wait
        Write-Host "Direct installation complete."

        # Verify installation
        Write-Host "`nVerifying VC++ Runtime installation:"
        $vcDlls = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll", "ucrtbase.dll")
        foreach ($dll in $vcDlls) {
          $path = "$env:SystemRoot\System32\$dll"
          if (Test-Path $path) {
            Write-Host "  FOUND: $dll"
          } else {
            Write-Host "  MISSING: $dll"
          }
        }


.test-windows-common:
    extends:
      - .install-windows-vcredist
    after_script:
      - !reference [.datadog-test-visibility-windows-x86_64, script]
      # Only generate report in after_script when not using inline reporting (cmd.exe compatible)
      - !reference [.determine_report_generation_timing_windows, script]
      - cmd /c "if not \"%REPORT_TIMING%\"==\"inline\" (repo.bat ci test -- --generate-report)"
    needs:
      - job: build-windows-x86_64-release-vs2026
        artifacts: true

