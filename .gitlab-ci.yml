test-container:
  extends:
    - .test-common
    - .ipp_lnx_x86_64_gpu
    - .kit-runner-test-linux-x86_64-1x-gpu
  image: gitlab-master.nvidia.com:5005/omniverse/isaac/omni_isaac_sim/isaac-sim${MR_SUFFIX}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}-x86_64
  parallel:
    matrix:
      - BUCKET:
        - deprecated
        - asset
        - core
        - examples_tests
        - replicator
        - ros
        - sensors
        - utils_gui
        - robot
  script:
    - pushd /isaac-sim
    - ./python.sh run_tests.py --suite pythontests --bucket ${BUCKET}
    - popd
    - cp -r /isaac-sim/.local/share/ov/data/_testoutput .
    - cp _testoutput/ext_test_results.txt _testoutput/repo_test_results.txt
    - /isaac-sim/python.sh tools/ci/standalone_report.py  _testoutput ${BUCKET}
  stage: deploy-test
  allow_failure: true
  needs:
    - job: publish-container-x86_64
      artifacts: false
  rules:
    - !reference [.container-rules, rules]
  artifacts:
    paths:
      - _testoutput
    expire_in: 1 week
    when: always
    reports:
      junit:
        - "_testoutput/*.xml"

# ==============================================================================================================
assets-publish-to-packman:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_small
      - .osec:vault:v3:prod_token_job
    parallel:
      matrix:
        - ASSET_NUM: ["1", "2", "3", "4"]
          KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "200Gi"
          KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "200Gi"
        - ASSET_NUM: ["5"]
          KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "400Gi"
          KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "400Gi"
    retry:
        max: 0
        when:
          - always
    artifacts:
        when: always
        expire_in: 2 weeks
        paths:
          - _build/packages/*.zip
    before_script:
      - !reference ['.osec:vault:v3:linux', 'packman_s3:perform_vault_requests']
    variables:
      IPP_RUNNER_EXECUTION_DURATION: 21600 # 6 hours
    script:
      - ./tools/ci/build-and-packaging/publish-assets-step.sh $ASSET_NUM
      - ./repo.sh publish_assets_package --num $ASSET_NUM
    needs: []
    rules:
      - if: $ALLOW_PUBLISH_TO_PACKMAN != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^release\/.*/)
        when: manual
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]
      # - !reference [.rules-mr, rules]
    allow_failure: true

# ==============================================================================================================
publish-to-packman:
    extends:
      - .deploy-common
      - .ipp_lnx_x86_64_cpu_small
    script:
      - ls _build/packages/
      - ./repo.sh publish_packages
    needs:
      - job: sign-windows-x86_64-release
        artifacts: true
      - job: build-linux-x86_64-release
        artifacts: true
      - job: build-linux-aarch64-release
        artifacts: true
        optional: true
      - job: build-windows-x86_64-debug
        artifacts: true
        optional: true
      - job: build-linux-x86_64-debug
        artifacts: true
        optional: true
      - job: build-linux-aarch64-debug
        artifacts: true
        optional: true
    retry:
        max: 2
        when:
          - always
    rules:
      - if: $ALLOW_PUBLISH_TO_PACKMAN != "true"
        when: never
      - if: $RUN_BUMP_VERSION == "true" || $RUN_DOCS_PUBLISH == "true"
        when: never
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly" && $CI_COMMIT_REF_NAME =~ /^kit-integration\//
        allow_failure: true
      # Allow execution when triggered by nightly upstream pipeline
      - if: $UPSTREAM_PIPELINE_SOURCE == "nightly"
        when: manual
        allow_failure: true
      - !reference [.rules-version-changed, rules]
      - !reference [.rules-push-manual, rules]

# ==============================================================================================================
# Generate and publish isaacsim.etm.list.isaacsim_app_template.* from source/apps/isaacsim.exp.extscache.kit
# It's safe to always run the job. The operation will be skipped if there is no change comparing to the latest version.
publish-etm-list:
  extends:
    - .deploy-common
    - .ipp_lnx_x86_64_cpu_small
  # image: urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a
  variables:
    IPP_RUNNER_EXECUTION_DURATION: 3600 # 1 hour
  script:
    - ./repo.sh build --fetch-only -r
    - ./repo.sh ci generate_etm_list
    - mkdir -p _build/linux-x86_64/release/exts && cp -f source/apps/*.etm.list.*.kit _build/linux-x86_64/release/exts
    # publish_exts shells out to the Kit-bundled packman; some kit-kernel builds
    # ship a cloudfront remote that's download-only, which breaks packman push.
    # No-op once the upstream Kit config includes the upload transport.
    - python3 tools/ci/ensure_packman_upload_transport.py _build/linux-x86_64/release/kit/dev/tools/packman/config.packman.xml
    - ./repo.sh publish_exts -c release
  # needs: []  # Test it immediately, for development
  needs:
    - job: publish-extensions
      artifacts: false
      optional: true
  dependencies: []
  rules:
    # For development: allow manual testing independently.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - source/apps/isaacsim.exp.extscache.kit
      when: manual
      allow_failure: true
    # For production: match rules of publish-extensions.
    - if: $ALLOW_PUBLISH_EXTENSIONS != "true"
      when: never
    - if: $RUN_BUMP_VERSION == "true"
      when: never
    - if: '$CI_COMMIT_BRANCH != "develop"'
      when: never
    - !reference [.rules-version-changed, rules]
    - !reference [.rules-push-manual, rules]
  interruptible: false

# ==============================================================================================================
check_externals:
  extends:
    - .repo-artifacts
    - .check-common
    - .ipp_lnx_x86_64_cpu_small
  stage: check-externals
  needs: []
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      when: never
    - !reference [.check-common, rules]
  artifacts:
    paths:
      - packman_private_results.csv
      - packman_full_results.csv
    expire_in: 1 week
  script:
    - ./tools/packman/python.sh tools/check_externals/download_all_kits.py
    - ./tools/packman/python.sh -m pip install -r tools/check_externals/requirements.txt
    - ./tools/packman/python.sh tools/check_externals/new_check_externals.py --allowed-external linbuild

# ==============================================================================================================
check_oss_baseline:
  extends:
    - .repo-artifacts
    - .check-common
    - .ipp_lnx_x86_64_cpu_small
    - .post_job_status_to_slack
  stage: check-externals
  needs:
    - job: build-linux-x86_64-release
      artifacts: true
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DESCRIPTION =~ "/\[[Xx]\] User docs only change/"'
      when: never
    # On MR contexts route the Slack notification to #isaac-sim-ci-mr; on
    # protected pushes fall through to the dashboard's default channel.
    - if: '$CI_PIPELINE_SOURCE == "pipeline" && $UPSTREAM_PIPELINE_SOURCE == "merge_request"'
      variables:
        SLACK_CHANNEL: "#isaac-sim-ci-mr"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        SLACK_CHANNEL: "#isaac-sim-ci-mr"
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED == "true"'
    - !reference [.check-common, rules]
  artifacts:
    when: always
    # expose_as surfaces both files on the MR widget (note: GitLab restricts
    # the label to letters, digits, '-', '_' and spaces).
    expose_as: "OSS baseline snapshot and diff"
    paths:
      - oss_baseline_current.csv
      - oss_baseline_diff.json
    expire_in: 1 week
  script:
    # The build job publishes _build/packages/*.7z, not the loose release
    # tree. Unzip the standalone package so the scanner can walk .dist-info
    # dirs (same pattern as publish-python-package and dockertest).
    - ./repo.sh unzip_file --file _build/packages/isaac-sim-standalone*.7z --dst _build/linux-x86_64/release
    - ./repo.sh check_oss_baseline --release-dir _build/linux-x86_64/release

