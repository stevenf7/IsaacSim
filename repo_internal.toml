# Repo.toml files for internal tools


########################################################################################################################
# Documentation building
########################################################################################################################

[repo_docs]

config = "release"
enabled = true

# the name of you project.  should be a single word. used to name files.
project = "isaac_sim"

# a slightly more descriptive name for your project. user visible. keep it short.
long_name = "Isaac Sim"
name = "Isaac Sim"

# first year in your projects copyright.
copyright_start = 2018

# Use python from kit sdk
# python_path =  "${root}/_build/${platform}/${config}/python${shell_ext}"

# our api docs are not versioned
version_selector_enabled = false

# version = "6.0.0"

# Move api docs to build directory
# docs_dst = "${root}/_build/${platform}/${config}/docs"

logo_target_url = "index.html"
copybutton_enabled = true
announcement = ""

extra_content_head = [
    "${env:TRACKING_SCRIPT}"
]

social_media = [
    ["twitter", "https://twitter.com/nvidiaomniverse"],
    ["youtube", "https://www.youtube.com/channel/UCSKUoczbGAcMld7HjpCR8OA"],
    ["instagram", "https://www.instagram.com/nvidiarobotics"],
    ["www", "https://developer.nvidia.com/isaac/sim"],
    ["linkedin", "https://www.linkedin.com/showcase/nvidiarobotics"],
    ["twitch", "https://www.twitch.tv/nvidiaomniverse"],
    ["discord", "https://discord.gg/4ZsTFksGh8"],
    ["github", "https://github.com/isaac-sim"],
    # ["question", "https://forums.developer.nvidia.com/c/omniverse/simulation/69"],
    # ["cloud", "https://catalog.ngc.nvidia.com/orgs/nvidia/containers/isaac-sim"],
]

# Enable LUNR search, which works better than Sphinx search - especially when running locally (from docs archive)
enhanced_search_enabled = true

# open all external links in a new tab
external_links_open_new_tab = true

# Add all extensions to docs sys.path

library_paths = [
  "$root/_build/$platform/$config/kit",
  "$root/_build/$platform/$config/extscache/omni.usd*/bin",
  "$root/_build/$platform/$config/extscache/omni.usd.schema*/lib",
]
python_paths = [
  "${root}/_build/${platform}/${config}/exts/*",
  "${root}/_build/${platform}/${config}/extsbuild/*",
  "${root}/_build/${platform}/${config}/exts/isaacsim.robot_motion.lula/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/isaacsim.robot.schema/plugins",
  "${root}/_build/${platform}/${config}/extscache/omni.kit.numpy.common*",
  "${root}/_build/${platform}/${config}/extscache/omni.kit.commands*",
  # archives
  "${root}/_build/${platform}/${config}/exts/omni.isaac.core_archive/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/omni.isaac.ml_archive/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/omni.pip.cloud/pip_prebundle",
  "${root}/_build/${platform}/${config}/exts/omni.pip.compute/pip_prebundle",
  "${root}/_build/${platform}/${config}/extscache/omni.kit.pip_archive*/pip_prebundle",
  "${root}/_build/${platform}/${config}/extscache/omni.kit.pip_archive*/pip_prebundle/Pillow/pillow*",  # PIL
]

sphinx_conf_py_extra = """
    add_module_names = False
    html_logo = "docs/media/main_ov_logo_square.png"
    html_favicon = "docs/media/favicon.ico"
    html_static_path += [
        "docs/media/NVIDIA-LogoBlack.svg",
    ]
    autodoc_member_order = 'groupwise'
    autodoc_mock_imports = [
        "carb",
        "omni.appwindow",
        "omni.client",
        "omni.ext",
        "omni.graph",
        # don't mock 'omni.kit' (needed for 'omni.kit.loop-isaac'),
        "omni.kit.app",
        "omni.kit.actions",
        "omni.kit.commands",
        "omni.kit.menu",
        "omni.kit.property",
        "omni.kit.stage_templates",
        "omni.kit.test",
        "omni.kit.tool",
        "omni.kit.usd",
        "omni.kit.utils",
        "omni.kit.viewport",
        "omni.kit.widget",
        "omni.kit.window",
        "omni.metrics",
        "omni.physics",
        "omni.physx",
        "omni.physxclashdetectioncore",
        "omni.replicator",
        "omni.stats",
        "omni.syntheticdata",
        "omni.timeline",
        "omni.ui",
        "omni.usd",
        "pxr",
        "Semantics",
        "usdrt",
        "warp",
        "omni.isaac.IsaacSensorSchema", # This cannot be documented because usd plugin needs to be loaded first
        "omni.isaac.RangeSensorSchema", # This cannot be documented because usd plugin needs to be loaded first
    ]

    rst_prolog = '''
    .. |br| raw:: html

        <br>

    .. |hr| raw:: html

        <hr>

    .. |physx_docs| replace:: `PhysX docs <https://nvidia-omniverse.github.io/PhysX/physx>`__

    '''

    # hack to suppress 'WARNING: duplicate object description... use :no-index:'
    import logging

    class DuplicateObjectDescriptionFilter(logging.Filter):
        def filter(self, record):
            strings = [
                "duplicate object description",
                "more than one target found for cross-reference",
            ]
            for item in strings:
                if item in record.getMessage():
                    return False
            return True

    logging.getLogger("sphinx.sphinx.domains.python").addFilter(DuplicateObjectDescriptionFilter())
"""

sphinx_exclude_patterns = [
  "**/omni.isaac.app",
