# Repo.toml files for internal tools

########################################################################################################################
# Code coverage settings
########################################################################################################################

[repo_cxx_coverage]
# This is required for the C++ coverage pipeline to work.
# If OMNI_CI_ENABLE_CXX_COVERAGE is set to true in .gitlab-ci.yml.
enabled = true

# This will cause cxx_coverage to launch into docker for its subcommands on gitlab, like it does
# locally (by default it assumes you're already running your job in the correct container image).
use_linbuild_on_gitlab = false

# This setting lets us use a newer container image tag for the cxx_coverage job
linbuild_container_tag = "urm.nvidia.com/ct-omniverse-docker/ci-jammy-x86_64-builder:1.0.11-1cf1ab9a"


########################################################################################################################
# Documentation building
########################################################################################################################

[repo_docs]

config = "release"
enabled = true
"platform:linux-aarch64".enabled = false
"platform:windows-x86_64".enabled = false
"platform:linux-x86_64".enabled = true

project_build_order = ["isaac-sim", "api"]

logo_target_url = "index.html"
copybutton_enabled = true
enhanced_search_enabled = true
external_links_open_new_tab = true
sphinx_parallel = "auto"
copyright_start = 2023
version = "6.0.0"

announcement = "<span style='color: orange; font-size: 1.2em;'>&#9888;</span><strong>Isaac Sim 6.0 Early Developer Release:</strong> This documentation is incomplete. To use this version, build Isaac Sim from source on <a href='https://github.com/isaac-sim/IsaacSim/tree/develop' target='_blank'>GitHub</a>.<br>Binaries, pip packages, pre-built containers and other artifacts will be available with the General Availability (GA) release."

extra_content_head = [
    "${env:TRACKING_SCRIPT}"
]

social_media = [
    ["twitter", "https://twitter.com/nvidiaomniverse"],
    ["youtube", "https://www.youtube.com/channel/UCSKUoczbGAcMld7HjpCR8OA"],
    ["instagram", "https://www.instagram.com/nvidiarobotics"],
    ["www", "https://developer.nvidia.com/isaac/sim"],
    ["linkedin", "https://www.linkedin.com/showcase/nvidiarobotics"],
    ["twitch", "https://www.twitch.tv/nvidiaomniverse"],
    ["discord", "http://discord.gg/nvidiaomniverse"],
    ["github", "https://github.com/isaac-sim"],
]

# ==============================
# Project: isaac-sim (User Guide — main docs)
# ==============================
[repo_docs.projects.isaac-sim]
docs_root = "docs/isaacsim"
name = "Isaac Sim Documentation"
version_selector_enabled = true
mr_version_override_enabled = false
output_path_template = "${project}/latest${dash_build}"
breadcrumbs_home_url = "../../index.html"
breadcrumbs_add_project = true

python_paths = [
    "${root}/docs",
    "${root}/docs/conf/ext",
]

sphinx_conf_py_extra = """
from terms import TERMS
rst_epilog = TERMS

try:
    suppress_warnings.append("myst.header")
except NameError:
    suppress_warnings = ["myst.header"]

try:
    extensions.append("config_selector")
    extensions.append("image_lightbox")
except NameError:
    extensions = ["config_selector", "image_lightbox"]
"""

sphinx_exclude_patterns = [
    "_build",
    "**/license_files/*.md",
    "**/custom/*.rst",
    "${root}/docs/isaacsim/assets/SICK/**/readme.md",
]

deps = [
   ["extensions", "https://docs.omniverse.nvidia.com/extensions/latest"],
   ["dev-guide", "https://docs.omniverse.nvidia.com/dev-guide/latest"],
   ["composer", "https://docs.omniverse.nvidia.com/composer/latest"],
   ["utilities", "https://docs.omniverse.nvidia.com/utilities/latest"],
   ["nucleus", "https://docs.omniverse.nvidia.com/nucleus/latest"],
   ["launcher", "https://docs.omniverse.nvidia.com/launcher/latest"],
   ["kit", "https://docs.omniverse.nvidia.com/kit/docs/kit-manual/latest"],
   ["kit-physics", "https://docs.omniverse.nvidia.com/kit/docs/omni_physics/latest"],
   ["usd", "https://docs.omniverse.nvidia.com/usd/latest"],
   ["developer_workstations", "https://docs.omniverse.nvidia.com/developer_workstations/latest"],
]

