[repo_docs.editions.production]
bucket_dir = "py/isaacsim/"
bucket_name = "omniverse-docs-production"
formats_to_publish = ["html"]
protocol = "s3"
region = "us-west-1"
s3_exclude_patterns = []




########################################################################################################################
# Bump version
########################################################################################################################

[bump_version]
git_url = "https://oauth2:${env:GITLAB_PUSH_TOKEN}@gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim.git"
# FOR DEVELOPMENT #
branch_name = "develop"
# # FOR PRODUCTION #
# branch_name = "release/6.0"

########################################################################################################################
# Prepare Kit overrides (fetch upstream Kit artifacts, write packman .user files)
########################################################################################################################

[prepare_kit_overrides]
project_id = 6510
gitlab_url = "https://gitlab-master.nvidia.com"

########################################################################################################################
# Generate changelog
########################################################################################################################

[repo_generate_changelog]
exts_exclude = []
extscache_paths = ["${root}/source/apps/isaacsim.exp.extscache.kit"]
home_path = "${root}/source/extensions/"

########################################################################################################################
# Find duplicate files
########################################################################################################################

[repo_find_duplicate_files]
min_file_size_to_warn = 0
min_file_size_to_fail = 5242880 # 5 MB


########################################################################################################################
# Tool to sign package
########################################################################################################################
[repo_codesign]
enabled = true
folder_input = "${root}/_unsignedpackages"
folder_output = "${root}/_signedpackages"


########################################################################################################################
# Custom scripts for repo_ci
########################################################################################################################
[repo_ci.jobs.build]
script = "${config_root}/tools/ci/build_isaac.py"

[repo_ci.jobs.build-coverage]
script = "${config_root}/tools/ci/build_isaac_coverage.py"

[repo_ci.jobs.test]
script = "${config_root}/tools/ci/test_isaac.py"

[repo_ci.jobs.standalone_report]
script = "${config_root}/tools/ci/standalone_report.py"


[repo_ci.jobs.test_isaaclab]
script = "${config_root}/tools/ci/test_isaac_lab.py"

[repo_ci.jobs."generate_etm_list"]
script = "${root}/tools/ci/generate_etm_list.py"

[repo_ci.jobs.check_app_version_locks]
script = "${root}/tools/ci/check_app_version_locks/check_app_version_locks.py"

[repo_ci.jobs.check_extension_support_levels]
script = "${root}/tools/ci/check_extension_support_levels/check_extension_support_levels.py"


########################################################################################################################
# Python packages generation
########################################################################################################################
[repo_python_package]
enabled = true

templates.pyproject = """
[build-system]
requires = [ "setuptools >= 78.1.1" ]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true
package-dir = { "" = "src" }

[project.scripts]
isaacsim = "isaacsim:main"
"""

# package generation
definition_paths = ["${root}/python_packages.toml"]
distributions_folder = "${root}/_build/packages/dist"
namespace = "isaacsim"
packages_folder = "${root}/_build/packages/python"
source_folder = "${root}/_build/${platform}/release"

# package metadata (common)
# pyproject.toml
pyproject.authors = [{name = "Isaac Sim team"}]
pyproject.classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "License :: Other/Proprietary License",
]
pyproject.license = {text = "NVIDIA Proprietary Software"}
pyproject.readme = """
See [Install Isaac Sim using PIP](https://docs.isaacsim.omniverse.nvidia.com/latest/installation/install_python.html)
for details on how to install and run Isaac Sim in a (virtual) Python environment.
"""
pyproject.requires-python = "==3.12.*"
pyproject.urls = [
  {"Home page" = "https://developer.nvidia.com/isaac-sim"},
  {"Documentation" = "https://docs.isaacsim.omniverse.nvidia.com"},
  {"Forum" = "https://forums.developer.nvidia.com/c/omniverse/simulation/69"},
]
pyproject.version = "${build_string}"

# wheel specifications
wheel.platforms = {"linux-x86_64" = "manylinux_2_35_x86_64", "windows-x86_64" = "win_amd64", "linux-aarch64" = "manylinux_2_35_aarch64"}

# wheel publishing (PyPI)
[[repo_python_package.publish.task]]
packages_wildcard_path = "${root}/_build/packages/dist/*.whl"
pypi.password = "${env:ISAACSIM_ARTIFACTORY_PASSWORD}"
pypi.repository_url = "https://urm.nvidia.com/artifactory/api/pypi/sw-isaacsim-pypi-local"
pypi.user = "${env:ISAACSIM_ARTIFACTORY_USERNAME}"

# check python package definitions
[repo_check_python_package_definitions]
# extensions
excluded_extensions = [
  # archives
  "omni.isaac.core_archive",
  "omni.isaac.ml_archive",
  "omni.pip.compute",
  "omni.pip.cloud",
  "isaacsim.pip.newton",
]
extension_folder = [
  "${root}/source/extensions",
  "${root}/source/deprecated",
]
kit_sdk_packman = "${root}/deps/kit-sdk.packman.xml"
omniverse_kit_version = "${major}.${minor}.${patch}.${build_number}"

# dependencies (Python)
dependencies_files = [
  "https://gitlab-master.nvidia.com/omniverse/kit/-/raw/${githash}/kit/deps/pip-3.12.toml",
  "${root}/deps/pip.toml",  # omni.isaac.core_archive
  "${root}/deps/pip_ml.toml",  # omni.isaac.ml_archive
  "${root}/deps/pip_compute.toml",  # omni.pip.compute
  "${root}/deps/pip_cloud.toml",  # omni.pip.cloud
  "${root}/deps/pip_newton.toml",  # isaacsim.pip.newton
  "${root}/deps/pip_urdf_usd.toml",  # isaacsim.asset.importer.urdf
]

# comment archive extension dependencies
[repo_comment_archive_deps]
archives = [
  "isaacsim.pip.newton",
  "omni.isaac.core_archive",
  "omni.isaac.ml_archive",
  "omni.pip.compute",
  "omni.pip.cloud",
  "omni.kit.pip_archive",
]
search_folder = "${root}/_build/packages/python"

[repo_dump_extensions]
root_folder = "${root}/_build/${platform}/${config}"


[repo_generate_doxygen_input]
scan_dirs = [
  "${root}/source/extensions",
  "${root}/source/deprecated"
]
ignore_folders = []
ignore_files = ["UsdPCH.h"]

########################################################################################################################
# Update changelogs
########################################################################################################################

[repo_update_changelogs]
# Default configuration for changelog updating
verbose = false
# Path to extensions directories (relative to repo root)
extensions_dir = [
  "source/extensions",
  "source/deprecated"
]

########################################################################################################################
# Check extension structure
########################################################################################################################

[repo_check_extension_structure]
# Extensions to ignore during validation
ignored_extensions = [
  "isaacsim.robot.schema",
]



########################################################################################################################
# Tool to promote extensions to the public registry pipeline
########################################################################################################################

[repo_deploy_exts.pipeline_repo.branch.prod-109]
enabled = true
skip_if_build_is_mr = true
fail_if_exts_are_missing = false
create_mr = true
auto_merge_mr = false

[repo_deploy_exts]
run_if_app_version_regex = '.*'
pipeline_repo.user_name = "Hammad Mazhar"
pipeline_repo.user_email = "hmazhar@nvidia.com"

########################################################################################################################
# Lua formatting
########################################################################################################################

[repo_format_lua]
# Path to stylua executable (default: "stylua" in PATH)
stylua_path = "stylua"
# Optional path to stylua config file
config_path = "${root}/.stylua.toml"
# Directories to exclude from formatting
exclude_dirs = [
  "_build",
  "_repo",
  ".git",
  ".vscode",
  ".nvidia-omniverse",
]



########################################################################################################################
# Extensions publisher
########################################################################################################################
# For publishing an ext locally, set the extension you want in exts.include (wild cards work) and run the following:
# ./repo.sh publish_exts -c release
[repo_publish_exts]
enabled = true

platforms = [
    "windows-x86_64",
    "linux-x86_64",
    "linux-aarch64"
]

publish_root = "${root}/_build/$platform/$config"

ext_folders = [
  "${publish_root}/exts",
  "${publish_root}/extsDeprecated",
  "${publish_root}/extsInternal",
]

# Extensions to publish, include and exclude among those discovered by kit. Wildcards are supported.
exts.exclude = []
exts.include = [
  "omni.isaac.core_archive",
  "omni.isaac.ml_archive",
  "isaacsim.*",
  "omni.kit.loop-isaac",
  "omni.pip.cloud",
  "omni.pip.compute",
  "omni.cuopt.*",
  "omni.usd.schema.*",
  "isaacsim.etm.list.isaacsim_app_template*",  # ETM lists
]

# This is hardcoded in template
# # Registries to publish to.
# registries = [
#     { name = "kit/default", url = "omniverse://kit-extensions.ov.nvidia.com/exts/kit/default" },
# ]

# Signing must be enabled for us to publish to external registry as part of app template release process
signing.enabled = true

# verify before publishing
publish_verification = true

# upload archives using packman (switch to using packman by default to reduce load on nucleus registry)
use_packman_to_upload_archive = true

# When running from package, look for package using that path/pattern:
archive_pattern = "${root}/_build/packages/isaac-sim-standalone@*${publish_platform_target_abi}.${config}.*"



# ETM (extension test matrix) settings
enroll_in_etm = false
etm_emails = ["hmazhar@nvidia.com"]




########################################################################################################################
# Tool to strip down parts of repo and git push to github
########################################################################################################################

[repo_stage_for_github]
enabled = true

github_repo_url = "${env:GITHUB_REPO_URL}"

exclude = [
    ".clang-tidy",
    ".cursor",
    ".dependabot.toml",
    ".eula_accepted",
    ".git",
    ".coderabbit.yaml",
    ".gitlab-ci.yml",
    ".nspect-vuln-allowlist.toml",
    ".omni-pulse.toml",
    ".stylua.toml",
    "CHANGELOG.md",
    "CODEOWNERS",
    "CODING.md",
    "docs/api",
    "docs/conf",
    "docs/content",
    "docs/images",
    "docs/isaacsim",
    "docs/source",
    "docs/tools",
    "docs/check_unused_assets.sh",
    "docs/index.rst",
    "docs/landing.html",
    "docs/terms.py",
    "docs/validate_filenames.sh",
    "docs/VERSION",
    "index.rst",
    "PACKAGE-INFO.yaml",
    "python_packages.toml",
    "README_INTERNAL.md",
    "repo_internal.toml",
    "TESTING.md",
    "deps/repo-deps-nv.packman.xml",
    "tools/autopull",
    "tools/build_docs.*",
    "tools/ci",
    "tools/container",
    "tools/docs",
    "tools/docker/tag_and_push_container.sh",
    "tools/internal-licenses",
    "tools/internal",
    "tools/isaac",
    "tools/lib",
    "tools/package.*",
    "tools/publish*",
    "tools/python_packages",
    "tools/repoman/__pycache__",
    "tools/test_*",
    "tools/test*",
    "tools/thumbnail_generator",
    "tools/update.sh",
    "source/internal_extensions",
]

[[repo_stage_for_github.trim]]
files = [
    "repo.toml",
    "repo_tools.toml",
    "tools/docker/prep_docker_build.sh",
    "package.toml",
]
begin_marker = "# AUTOREMOVE: BEGIN"
end_marker = "# AUTOREMOVE: END"

# [[repo_stage_for_github.trim]]
# files = [
#     "source/apps/isaacsim.exp.base.kit",
# ]
# begin_marker = "# FOR DEVELOPMENT - START #"
# end_marker = "# FOR DEVELOPMENT - END #"

[[repo_stage_for_github.trim]]
files = [
    "deps/kit-sdk-deps.packman.xml",
    "tools/docker/README.md",
]
begin_marker = "<!-- AUTOREMOVE: BEGIN -->"
end_marker = "<!-- AUTOREMOVE: END -->"

[[repo_stage_for_github.trim]]
files = [
    "premake5-isaacsim.lua",
    "premake5-tests.lua",
    "premake5.lua",
]
begin_marker = "-- AUTOREMOVE: BEGIN"
end_marker = "-- AUTOREMOVE: END"

[[repo_stage_for_github.file_move]]
source_file = "tools/ci/config.packman.xml"
destination_file = "tools/packman/config.packman.xml"

[[repo_stage_for_github.toml_merge]]
source_file = "repo.toml"
patch_file = "./tools/ci/repo_toml_patch.toml"
destination_file = "repo.toml"



########################################################################################################################
# Symstore
########################################################################################################################

[repo_symstore]
enabled = true
strip = true
strip_nowarn = true
extra_files = []
paths = ["$root/_build/$platform/release"]
