[pytest]
addopts = --strict-markers -ra
testpaths = static unit remote standalone
python_files = test_*.py
python_functions = test_*
markers =
    static: static validation (script + snippet syntax, frontmatter, cross-references, coverage map)
    unit: pure / headless unit tests (no Isaac Sim, no GPU, no network)
    remote: integration via the python_server socket (needs a running Isaac Sim)
    standalone: standalone SimulationApp runs + shell scripts + OmniGraph (needs an Isaac build / GPU)
    integration: requires a reachable Isaac Sim python_server (port 8226)
    gpu: requires a GPU and the RTX renderer
    ros2: requires a sourced ROS 2 environment with the bridge loaded
    imagemagick: requires ImageMagick (composite, convert) on PATH
    needs_build: requires a built Isaac Sim (kit / isaac-sim.sh)
    needs_docs: requires built docs output under _build/docs
