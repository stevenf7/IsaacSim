# Mypy configuration for Isaac Sim
# Used by: ./repo.sh run_mypy (runs mypy per-extension to avoid duplicate module conflicts)

[mypy]
# Target Python version
python_version = 3.12

# Ignore missing imports for third-party libraries without stubs
ignore_missing_imports = True

# Don't require type annotations for all functions
disallow_untyped_defs = False

# Require explicit Optional for None returns (catches return None vs -> float mismatches)
strict_optional = True

# Show error codes in output
show_error_codes = True

# Check function bodies even without annotations (finds real bugs)
check_untyped_defs = True

# Suppress errors about unresolved imports
follow_imports = silent

# Exclude test files and vendor directories
exclude = (?x)(
    /tests/
    | /_vendor/
  )

