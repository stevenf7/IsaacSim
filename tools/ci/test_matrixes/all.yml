.test-linux-matrix:
  parallel:
    matrix:
      - SUITE: startuptests
      - SUITE: pythontests
        BUCKET:
          - deprecated
          - asset
          - core
          - examples_tests
          - replicator
          - ros
          - sensors
          - utils_gui
          - robot
          - other
      - SUITE: doc_snippets
      - SUITE: doc_snippets_async
      - SUITE: warmuptests
      - SUITE: postinstalltests
      - SUITE: nativepythontests
        BUCKET:
          - api
          - replicator
          - testing


.test-windows-matrix:
    parallel:
      matrix:
        - SUITE: startuptests
        - SUITE: pythontests
          BUCKET:
            - deprecated
            - asset
            - core
            - examples_tests
            - replicator
            - ros
            - sensors
            - utils_gui
            - robot
            - other
        - SUITE: doc_snippets
        - SUITE: doc_snippets_async
        - SUITE: warmuptests
        - SUITE: postinstalltests