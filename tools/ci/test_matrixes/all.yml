.test-linux-matrix:
  parallel:
    matrix:
      - SUITE: pythontests
        BUCKET:
          - core
          - examples_tests
          - replicator
          - ros
          - sensors
          - robot
          - other
      - SUITE: doc_snippets
      - SUITE: doc_snippets_async
      - SUITE: nativepythontests
        BUCKET:
          - api
          - deprecated
          - testing

.test-linux-matrix-blocking:
  parallel:
    matrix:
      - SUITE: startuptests
      - SUITE: warmuptests
      - SUITE: postinstalltests
      - SUITE: pythontests
        BUCKET:
          - asset
          - deprecated
          - utils_gui
      - SUITE: nativepythontests
        BUCKET:
          - replicator



.test-windows-matrix:
    parallel:
      matrix:
        - SUITE: pythontests
          BUCKET:
            - core
            - examples_tests
            - replicator
            - ros
            - sensors
            - robot
            - other
        - SUITE: doc_snippets
        - SUITE: doc_snippets_async
        - SUITE: warmuptests

.test-windows-matrix-blocking:
    parallel:
      matrix:
        - SUITE: startuptests
        - SUITE: postinstalltests
        - SUITE: pythontests
          BUCKET:
            - asset
            - deprecated
            - utils_gui