.test-linux-matrix:
  parallel:
    matrix:
      - SUITE: pythontests
        BUCKET:
          - sensors

.test-linux-matrix-blocking:
  parallel:
    matrix:
      - SUITE: startuptests
      - SUITE: warmuptests
      - SUITE: postinstalltests
      - SUITE: pythontests
        BUCKET:
          - asset
          - deprecated
          - utils_gui
      - SUITE: nativepythontests
        BUCKET:
          - replicator



.test-windows-matrix:
    parallel:
      matrix:
        - SUITE: pythontests
          BUCKET:
            - sensors


.test-windows-matrix-blocking:
    parallel:
      matrix:
        - SUITE: startuptests
        - SUITE: postinstalltests
        - SUITE: pythontests
          BUCKET:
            - asset
            - deprecated
            - utils_gui