# Launch Isaac Sim (headless streaming) and a WebRTC web-viewer side by side.
#
# Usage:
#   # Build the Isaac Sim image first (see README.md)
#   ISAACSIM_HOST=<host-ip> docker compose -f tools/docker/docker-compose.yml up --build -d
#
# Multiple instances (use -p to namespace, override ports and GPU):
#   GPU_DEVICE=0 ISAACSIM_SIGNAL_PORT=49100 WEB_VIEWER_PORT=8210 docker compose -p isim1 -f tools/docker/docker-compose.yml up --build -d
#   GPU_DEVICE=1 ISAACSIM_SIGNAL_PORT=49200 WEB_VIEWER_PORT=8211 docker compose -p isim2 -f tools/docker/docker-compose.yml up --build -d
#
# Override any variable below via the shell environment or a .env file next to
# this compose file.  Set ISAAC_SIM_DATA to change the host directory used for
# persistent cache/config/logs (default: ~/docker/isaac-sim).  The directory
# tree must be owned by uid 1234 (the container user):
#
#   mkdir -p ~/docker/isaac-sim/{cache/main,cache/computecache,config,data,logs,pkg}
#   sudo chown -R 1234:1234 ~/docker/isaac-sim

services:

  isaac-sim:
    image: ${ISAAC_SIM_IMAGE:-isaac-sim-docker:latest}
    network_mode: "host"
    runtime: nvidia
    user: "1234:1234"
    healthcheck:
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
      test: ["CMD-SHELL", "logdir=/isaac-sim/.nvidia-omniverse/logs/Kit; [ -d \"$$logdir\" ] && latest=$$(ls -t \"$$logdir\"/*/*/kit_*.log 2>/dev/null | head -1) && [ -n \"$$latest\" ] && grep -q AppReady \"$$latest\" && exit 0; exit 1"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-all}
      - ACCEPT_EULA=Y
      - ISAACSIM_HOST=${ISAACSIM_HOST:-127.0.0.1}
      - ISAACSIM_SIGNAL_PORT=${ISAACSIM_SIGNAL_PORT:-49100}
      - ISAACSIM_STREAM_PORT=${ISAACSIM_STREAM_PORT:-47998}
    volumes:
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/cache/main:/isaac-sim/.cache:rw
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/data:/isaac-sim/.local/share/ov/data:rw
      - ${ISAAC_SIM_DATA:-~/docker/isaac-sim}/pkg:/isaac-sim/.local/share/ov/pkg:rw
    restart: unless-stopped

  web-viewer:
    build:
      context: ./web-viewer
      network: host
      args:
        ISAACSIM_HOST: ${ISAACSIM_HOST:-127.0.0.1}
        ISAACSIM_SIGNAL_PORT: ${ISAACSIM_SIGNAL_PORT:-49100}
        ISAACSIM_STREAM_PORT: ${ISAACSIM_STREAM_PORT:-47998}
    network_mode: "host"
    command: ["npx", "vite", "preview", "--host", "--port", "${WEB_VIEWER_PORT:-8210}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_VIEWER_PORT:-8210}/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      isaac-sim:
        condition: service_healthy
    restart: unless-stopped
