name = "Isaac Sim"
#displayed application name in smaller card and library view
shortName = "Isaac Sim"
version = "${version}"
#boolean for if this version is the latest version
latest = true
#unique identifier for component, all lower case, persists between versions
slug = "isaac_sim"

#displayed before application name in launcher
productArea = "Omniverse"
#category of content
category = "Apps"
#values for filtering content, not implemented yet
tags = [
  "Autonomous Machines",
  "Robotics",
  "Manufacturing",
  "Product Design", 
  "Scene Composition", 
  "Visualization", 
  "Rendering"
]

#enum of "app", "connector" and "experience" for now
kind = "app"
#string array, each line is a new line, keep lines under 256 char and keep lines under 4
description = [
 "NVIDIA Omniverse™ Isaac Sim is built on NVIDIA Omniverse simulation platform, it leverages Omniverse Kit and has been enhanced with robotics specific extensions. Isaac Sim provides the essential features for building virtual robotic worlds and experiments. Isaac Sim supports navigation and manipulation applications through Isaac SDK and ROS, with RGB-D, Lidar and IMU sensors, Domain Randomization, ground truth labeling, segmentation, and bounding boxes.",
 "Note: The System Requirements section below may not be correct. The updated Isaac Sim requirements link is located in the Learn more section at the bottom."
]

