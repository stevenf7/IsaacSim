[bookmarks]
localhost = "omniverse://localhost"

[cache]
data_dir = "/root/.cache/ov/Cache"
proxy_cache_enabled = false
proxy_cache_server = ""

[connection_library]
proxy_dict = "*#localhost:8891,f"

[paths]
cache_root = "/root/.cache/ov"
confirmed = true
content_root = "/root/Downloads"
data_root = "/root/.local/share/ov/data"
extension_root = "/root/Documents/kit/shared/exts"
library_root = "/root/.local/share/ov/pkg"
logs_root = "/root/.nvidia-omniverse/logs"
