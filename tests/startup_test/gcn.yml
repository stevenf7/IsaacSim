entrypoints:

# Startup test script on local disk
- component: test
  debug_info:
    entrypoint_path: create_startup_test.py
    environment:
      config:
        python_version: 3.7
      environment_type: python
  entrypoint_script:
    origin: src
  entrypoint_type: execution
  inputs:
    Kit Timeout: 300

# Create Runner Service on local disk
- component: create_runner
  debug_info:
    environment:
      environment_type: python
      config:
        python_version: 3.7
    entrypoint_path: createrunnerservice.py
  entrypoint_script:
    origin: ..\createrunner
  entrypoint_type: setup


