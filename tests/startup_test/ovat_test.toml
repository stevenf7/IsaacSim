[execution]
# BLOCK and fetch the results from OVAT to display in your CI/CD directly?
fetch_results = true
# How long to wait (in seconds) for results before erroring out?
fetch_timeout = 900

# Publish results
publish_results = true

# Inputs can be overridden (compared to their defaults in gcn.yml or task_architect.yml)
# by declaring an [inputs.COMPONENT_NAME] block where COMPONENT_NAME is the name of a
# component in your Task Architect YAML or GCN YAML
# These are in the format Name = Value, where Name is the descriptive name
# of your @input() declared in your OVAT script
# We can specify inputs for development/debugging running from local artifacts
# An auto-generated gcn_local.yml file will be created with these values
[inputs.create_runner.local.release]
