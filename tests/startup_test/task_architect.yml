# Don't change this
version: 3

# Configure task architect
no reuse tasks: yes
update builds: yes
preview: no

# This will end up as the Job Name in GTL
batch name: PYScript Create Startup Test

# Each component type (ie. application below) only has meaning
# in this YAML file, they can be chosen by you
components:
  # There can be only *ONE* test component for OVAT input injection
  # to work, so try to use other names for different scripts
  test: mandatory
  # Each component that you would like to overwrite the inputs for
  # from automation must have its own unique name, and set to mandatory
  kit_runner: mandatory
  # A driver is required to run Kit
  driver: optional

# Each add: block defines a component from one of the types above
add:
  component: test
  # app: is the name of the GTL application
  app: PYScript Create Render Test
  # version: is the GTL build version, and branch gets added to that
  branch: master

# The Create Runner Service provides a nice interface to dealing with Kit
add:
  component: create_runner
  app: PYScript Create Runner Service
  branch: master
  version: 1.0.36
#inputs:
#  Teamcity Build ID: 4932998


# The NVIDIA driver
add:
  component: driver
  app: NVIDIA GraphicDriver
  version: 451.48-sandbag-wddm2-x64
inputs:
  AA: Application Controlled
  AF: Application Controlled
  SLI: Off
  VSYNC: Off
  PhysX: Enable

target: any
config id: 269144  # Aardvark-class machines
access groups: [477]  # OVAT FATE Test Requests
os id: 985  # Windows 10 1903 64 bit
