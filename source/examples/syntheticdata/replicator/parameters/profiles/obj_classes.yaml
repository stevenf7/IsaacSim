flying_objs:
  obj_model: Choice(['models/warehouse.txt', 'models/hospital.txt', 'models/office.txt'])

  obj_rot: Uniform((0, 0, 0), (360, 360, 360))

  obj_size: Uniform(50, 120)
  obj_distance: Uniform(300, 1500)

  obj_horiz_fov_loc: Uniform(-0.9, 0.9)
  obj_vert_fov_loc: Uniform(-0.6, 0.9)

  obj_metallicness: Uniform(0.1, 0.8)
  obj_reflectance: Uniform(0.1, 0.8)

  obj_vel: Normal((0, 0, 0), (30, 30, 30))
  obj_rot_vel: Normal((0, 0, 0), (30, 30, 30))


flying_shapes:
  obj_model: Choice(['models/shapes.txt'])
  obj_texture: Choice(['textures/patterns.txt', 'textures/synthetic.txt'])
  obj_texture_tile_scale: Choice([0.01, 1])

  obj_rot: Uniform((0, 0, 0), (360, 360, 360))

  obj_size: Uniform(100, 300)
  obj_distance: Uniform(300, 1500)

  obj_horiz_fov_loc: Uniform(-0.9, 0.9)
  obj_vert_fov_loc: Uniform(-0.6, 0.9)

  obj_metallicness: Uniform(0.1, 0.8)
  obj_reflectance: Uniform(0.1, 0.8)

  obj_vel: Normal((0, 0, 0), (30, 30, 30))
  obj_rot_vel: Normal((0, 0, 0), (30, 30, 30))


falling_objs:
  obj_model: Choice(['models/shapes.txt'])

  obj_rot: Uniform((0, 0, 0), (360, 360, 360))

  obj_size: Uniform(10, 30)
  obj_distance: 100

  obj_physics: True