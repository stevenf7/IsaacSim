# flying objects
objs:
  obj_count: Range(5, 15)

  inherit: flying_objs

# flying objects (color randomized)
objs_color_dr:
  obj_color: Uniform((0, 0, 0), (255, 255, 255))
  obj_count: Range(0, 5)

  inherit: flying_objs

# flying objects (texture randomized)
objs_texture_dr:
  obj_texture: Choice(["assets/textures/patterns.txt", "assets/textures/synthetic.txt"])
  obj_texture_tile_scale: Choice([0.01, 1])
  obj_count: Range(0, 5)

  inherit: flying_objs

# flying objects (material randomized)
objs_material_dr:
  obj_material: Choice("assets/materials/materials.txt")
  obj_count: Range(0, 5)

  inherit: flying_objs

# flying midground shapes
midground_shapes:
  obj_count: Range(3, 6)
  obj_size: Uniform(100, 300)
  obj_distance: Uniform(800, 2000)

  inherit: flying_shapes

# flying background shapes
background_shapes:
  obj_count: Range(3, 6)
  obj_size: Uniform(300, 600)
  obj_distance: Uniform(2000, 4000)

  inherit: flying_shapes

# background plane
background_plane:
  obj_model: /Users/mtrepte/shapes/plane.usd

  obj_texture: Choice(["assets/textures/patterns.txt", "assets/textures/backgrounds.txt"])
  obj_texture_tile_scale: Choice([0.001, 0.05, 1])
  obj_texture_rot: Uniform(0, 360)

  obj_count: 1
  obj_size: 12000
  obj_distance: Uniform(5000, 8000)

  obj_horiz_fov_loc: 0
  obj_vert_fov_loc: 0
  obj_rot: Normal((0, 90, 0), (10, 10, 10))

  obj_vel: (0, 0, 0)
  obj_rot_vel: (0, 0, 0)


# flying lights
lights:
  light_count: Range(1, 2)
  light_color: (200, 200, 200)
  light_intensity: Uniform(0, 100000)
  light_radius: Uniform(100, 200)

  light_horiz_fov_loc: Uniform(-0.5, 0.5)
  light_vert_fov_loc: Uniform(-0.5, 0.5)

  light_distance: Uniform(300, 1000)

# flying lights (colorful)
lights_color:
  light_count: Range(0, 2)
  light_color: Uniform((0, 0, 0), (255, 255, 255))
  light_intensity: Uniform(0, 100000)
  light_radius: Uniform(20, 100)

  light_distance: Uniform(300, 1000)

# distant light
distant_light:
  light_distant: True

  light_count: 1
  light_color: Normal((200, 200, 200), (50, 50, 50), min=(0, 0, 0), max=(255, 255, 255))
  light_intensity: Uniform(0, 3000)
  light_rot: Uniform((-90, -90, 0), (90, 0, 0))



# randomized floor
scenario_room: True

floor: True
wall: False
ceiling: False

floor_size: 10000

floor_texture: Choice(["assets/textures/patterns.txt", "assets/textures/backgrounds.txt"])
floor_texture_tile_scale: Choice([0.01, 0.1, 1])
floor_reflectance: Uniform(0, 0.5)


# camera
focal_length: 50

stereo: True
stereo_baseline: 20

camera_coord: Uniform((-200, -200, 100), (200, 200, 100))
camera_rot: Normal((0, 2, 0), (0, 2, 20))

camera_vel: Normal((0, 0, 0), (10, 10, 10))
camera_rot_vel: Normal((0, 0, 0), (0.5, 0.5, 0.5))



# output
output_dir: dataset
num_scenes: 10
img_width: 2160
img_height: 1440

sequential: True
sequence_step_count: Range(10, 20)
sequence_step_time: 1

rgb: True
depth: False
depth_boundary: False
disparity: False
instance_seg: True
semantic_seg: False
bbox_2d_tight: False
bbox_2d_loose: False
bbox_3d: False
wireframe: False

groundtruth_visuals: True
groundtruth_stereo: False


# debug
pause: 0


profiles:
  - parameters/profiles/obj_classes.yaml
