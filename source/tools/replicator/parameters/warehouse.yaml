# dropped warehouse objects
objects:
  obj_model: Choice(['models/warehouse.txt'])

  obj_count: Range(2, 5)
  obj_size: Uniform(50, 125)

  obj_vert_fov_loc: Uniform(0, 1)  
  obj_distance: Uniform(300, 800)
  obj_rot: (Normal(0, 45), Normal(0, 45), Uniform(0, 360))

  obj_physics: True

# flying apriltags
april_tags:
  obj_model: /Users/mtrepte/shapes/plane.usd

  obj_texture: Choice('textures/apriltags.txt')

  obj_reflectance: 0

  obj_count: Range(0, 3)
  obj_size: Uniform(5, 20)

  obj_vert_fov_loc: Uniform(0, 1)  
  obj_distance: Uniform(300, 800)
  obj_rot: (Normal(0, 10), Normal(90, 10), Uniform(0, 10))



# colorful ceiling lights
lights:
  light_count: Range(0, 2)

  light_coord_camera_relative: False
  light_coord: (Uniform(-200, 200), Uniform(-200, 200), 500)

  light_color: Uniform((0, 0, 0), (200, 200, 200))
  light_intensity: Uniform(0, 1000000)
  light_radius: 100


# warehouse scenario
scenario_model: /Isaac/Environments/Simple_Warehouse/warehouse.usd


# camera
focal_length: 30

camera_coord: (0, 0, Uniform(20, 50))
camera_rot: (Normal(0, 1), 0, Uniform(0, 360))



# output
output_dir: dataset
num_scenes: 10
img_width: 1280
img_height: 720

stereo: False
rgb: True
semantic_seg: True
groundtruth_visual: True



# debug
nap: False
pause: 0
headless: False
verbose: True