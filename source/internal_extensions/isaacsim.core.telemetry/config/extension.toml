[package]
version = "2.0.1"
category = "Internal"
title = "Isaac Sim Telemetry Framework"
description = "Provides a centralized telemetry framework for Isaac Sim extensions, built on Carbonite structured logging."
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/internal_extensions/isaacsim.core.telemetry"
keywords = ["isaac", "telemetry"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
writeTarget.platform = true

[dependencies]
"omni.kit.telemetry" = {}

[[python.module]]
name = "isaacsim.core.telemetry"

[[python.module]]
name = "isaacsim.core.telemetry.tests"

[[test]]
dependencies = ["omni.kit.test"]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
