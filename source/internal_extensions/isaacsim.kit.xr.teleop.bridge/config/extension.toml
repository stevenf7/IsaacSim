[core]
# Disable hot-reloading due to native plugin
reloadable = false

# This extension should be loaded after omni.kit.xr.system.openxr so we can register our component
[package]
version = "1.0.0"
category = "other"
title = "Isaac Kit XR Teleop Bridge"
description = "Provides OpenXR handle functions for constructing OpenXRSessionHandles with Kit XR"
authors = ["NVIDIA"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.kit.xr.teleop.bridge"
keywords = ["isaac", "teleop", "xr", "openxr"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"filter:platform"."windows-x86_64"."omni.kit.xr.system.openxr" = {}
"filter:platform"."linux-x86_64"."omni.kit.xr.system.openxr" = {}

# Native C++ plugin that registers as an OpenXR component
[[python.module]]
name = "isaacsim.kit.xr.teleop.bridge"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

# Python module with bindings