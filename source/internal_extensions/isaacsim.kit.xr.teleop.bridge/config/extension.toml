[core]
# Disable hot-reloading due to native plugin
reloadable = false

# This extension should be loaded after omni.kit.xr.system.openxr so we can register our component
[package]
version = "1.1.0"
category = "other"
title = "Isaac Kit XR Teleop Bridge"
description = "Provides OpenXR handle functions for constructing OpenXRSessionHandles with Kit XR"
authors = ["NVIDIA"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.kit.xr.teleop.bridge"
keywords = ["isaac", "teleop", "xr", "openxr"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"filter:platform"."windows-x86_64"."omni.kit.xr.system.openxr" = {}
"filter:platform"."linux-x86_64"."omni.kit.xr.system.openxr" = {}

# Native C++ plugin that registers as an OpenXR component
[[python.module]]
name = "isaacsim.kit.xr.teleop.bridge"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

# Python module with bindings

[settings]
# Base required OpenXR extension list for this bridge component.
# If non-empty, this list becomes the starting value before add/remove are applied.
exts."isaacsim.kit.xr.teleop.bridge".openxr.requiredExtensions.set = ["XR_KHR_convert_timespec_time", "XR_NVX1_tensor_data"]
# Additional OpenXR extensions to append to the resolved required extension list.
# Duplicate values are ignored.
exts."isaacsim.kit.xr.teleop.bridge".openxr.requiredExtensions.add = []
# OpenXR extensions to remove from the resolved required extension list.
exts."isaacsim.kit.xr.teleop.bridge".openxr.requiredExtensions.remove = []
