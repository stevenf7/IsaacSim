[package]
version = "3.1.1"
category = "Simulation"
title = "Isaac Sim Surface Gripper UI Components"
description = "UI components for the Surface Gripper extension"
authors = ["hmazhar@nvidia.com", "rgasoto@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.surface_gripper.ui"
keywords = ["isaac", "physics", "end-effector","ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.gui.menu" = {}
"isaacsim.robot.surface_gripper" = {}

[[python.module]]
name = "isaacsim.robot.surface_gripper.ui"

[[test]]
name = "startup"
stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[[test]]
stdoutFailPatterns.exclude = [    
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
