[core]
reloadable = false
order = 0

[package]
version = "0.1.13"
category = "Robotics"
title = "Omni Isaac Cortex"
description = "Decision framework and organizational structures for using Omni Isaac Sim as the mind of a physical robot."
authors = ["Nathan Ratliff"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.cortex"
keywords = ["isaac", "robotics", "collaborative robotics", "digital twins"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.physx" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.utils" = {}
"omni.isaac.ui" = {}
"omni.isaac.core" = {}
"omni.isaac.franka" = {}
"omni.isaac.motion_generation" = {}
"omni.isaac.ros_bridge" = {}

[[python.module]]
name = "omni.isaac.cortex.cortex_ros"

[[python.module]]
name = "omni.isaac.cortex.cortex_sim"

[[test]]
stdoutFailPatterns.exclude = [
    "*WARNING: cannot load logging configuration file*", # exclude warning as failure
]
