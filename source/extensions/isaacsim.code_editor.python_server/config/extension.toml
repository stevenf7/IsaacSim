[package]
version = "1.3.0"
category = "Utility"
title = "Python Server"
description = "TCP socket server for remote Python code execution in Isaac Sim"
authors = ["hmazhar@nvidia.com", "aserranomuno@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.code_editor.python_server"
keywords = ["isaac", "python", "server", "remote", "execution", "llm"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}

[[python.module]]
name = "isaacsim.code_editor.python_server"

[settings]
# IP address where the extension server will listen for connections.
exts."isaacsim.code_editor.python_server".host = "127.0.0.1"
# Port number where the extension server will listen for connections.
exts."isaacsim.code_editor.python_server".port = 8226
# Whether clients must provide an authentication token when executing code.
exts."isaacsim.code_editor.python_server".require_auth = false
# Authentication token for clients. If empty and require_auth is true, a random token is generated on startup.
exts."isaacsim.code_editor.python_server".auth_token = ""
# Whether to publish incoming carb logging messages.
# Warning: enabling this feature may cause the application to freeze in certain circumstances.
exts."isaacsim.code_editor.python_server".carb_logs = false
# Global default execution timeout in seconds. 0 = no timeout.
# Individual requests can override this via the JSON envelope "timeout" field.
exts."isaacsim.code_editor.python_server".execution_timeout = 0
# Keepalive interval in seconds. When non-zero, responses for executions that exceed
# this duration include an "elapsed_seconds" field. 0 = disabled.
exts."isaacsim.code_editor.python_server".keepalive_interval = 0

[[test]]
timeout = 300
dependencies = [
    "isaacsim.core.experimental.objects",
    "isaacsim.core.experimental.prims",
    "isaacsim.core.experimental.utils",
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/hydra/supportMultiTickRate=true",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/rendering/perSensorTickTlas=true",
    "--/rtx/reservedDescriptors=900000",
    ### Extension specific args
    "--/exts/isaacsim.code_editor.python_server/port=8227",
    "--/exts/isaacsim.code_editor.python_server/require_auth=true",
    "--/exts/isaacsim.code_editor.python_server/auth_token=isaacsim-python-server-test-token",
]
stdoutFailPatterns.exclude = [
    # Pre-existing asyncio context re-entry errors when update_app() pumps the
    # event loop while a TCP transport's _read_ready callback is pending.
    "*_SelectorSocketTransport._read_ready*",
    "*cannot enter context*is already entered*",
]

[documentation]
pages = ["docs/Overview.md", "docs/SETTINGS.md", "docs/CHANGELOG.md"]
