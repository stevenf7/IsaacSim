syntax = "proto3";

package isaacsim.zmq;

// Computed joint command sent from the external server to Isaac Sim.
// Carries per-joint names, position targets (rad), and velocity targets (rad/s).
message JointCommand {
    double timestamp = 1;               // Server-side timestamp (seconds)
    repeated string joint_names = 2;    // Ordered joint names (must match robot DOF order)
    repeated double positions = 3;      // Target joint positions (rad)
    repeated double velocities = 4;     // Target joint velocities (rad/s)
}
