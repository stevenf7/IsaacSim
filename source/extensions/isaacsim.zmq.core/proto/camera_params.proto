syntax = "proto3";

package isaacsim.zmq;

// CameraParams carries camera extrinsic and intrinsic parameters
message CameraParams {
    double            timestamp        = 1;  // Frame timestamp (seconds)
    repeated double   view_matrix_ros  = 2;  // Flattened 4x4 row-major view matrix (ROS convention, 16 elements)
    repeated double   camera_scale     = 3;  // World scale vector (3 elements: sx, sy, sz)
    repeated double   intrinsics_matrix = 4; // Flattened 3x3 camera intrinsics (9 elements: fx,0,cx,0,fy,cy,0,0,1)
}
