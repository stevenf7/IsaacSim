syntax = "proto3";

package isaacsim.zmq;

// UpdatePrimAttribute is a generic command from an external server to set a single
// USD attribute on a prim in the Isaac Sim stage (e.g. a camera's focalLength). The
// value is scalar — sufficient for numeric attributes; extend with a typed oneof if
// non-scalar attributes (strings, vectors) are ever needed.
message UpdatePrimAttribute {
    double timestamp = 1;  // Command timestamp (seconds)
    string prim_path = 2;  // USD prim path, e.g. "/World/camera/y_link/Camera"
    string attribute = 3;  // Attribute name, e.g. "focalLength"
    double value     = 4;  // Scalar value to write
}
