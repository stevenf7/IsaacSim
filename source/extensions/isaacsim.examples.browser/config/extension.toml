[package]
version = "0.3.4"
category = "GUI"
title = "Isaac Sim Example Browser"
description = "A browser for Isaac Sim assets"
authors = ["hmazhar@nvidia.com", "qwan@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.examples.browser"
keywords = ["isaac", "browser", "examples"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
feature = true
# writeTarget.kit = true

[dependencies]
"omni.kit.browser.folder.core" = {}
"omni.kit.clipboard" = { optional=true }
"omni.kit.commands" = {}
"omni.kit.menu.stage" = { optional=true }
"omni.kit.menu.utils" = {}
"omni.kit.pip_archive" = {}
"omni.kit.tool.collect" = { optional=true }
"omni.kit.viewport.utility" = { }
"omni.usd" = {}

[[python.module]]
name = "isaacsim.examples.browser"

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
