"omni.kit.numpy.common" = {}
"omni.kit.window.viewport" = {} #needed by sample
"omni.kit.pip_archive" = {} # pulls in numpy
"omni.isaac.ui" = {}

[[python.module]]
name = "omni.isaac.imu_sensor"

[[python.module]]
name = "omni.isaac.imu_sensor.tests"
public = false

[[python.module]]
name = "omni.isaac.imu_sensor.scripts.samples.imu_sensor"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false
