[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "Isaac Sim IMU Sensor Simulation"
description = "IMU Sensor"
authors = ["Isaac Sim Team"]
repository = ""
keywords = ["isaac", "physics", "robotics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
