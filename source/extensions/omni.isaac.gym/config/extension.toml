[gym]
reloadable = true
order = 0

[package]
version = "0.3.0"
category = "Simulation"
title = "Isaac Sim Gym"
description = "Gym for RL"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.gym"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.isaac.core" = {}
"omni.isaac.cloner" = {}
"omni.isaac.ml_archive" = {} # torch


[[python.module]]
name = "omni.isaac.gym"

[[test]]
timeout = 250000
args = ["--/physics/cudaDevice=0"]
