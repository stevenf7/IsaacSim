[core]
reloadable = true
order = 0

[package]
version = "0.1.2"
category = "Simulation"
title = "Isaac Sim Contact Sensor Simulation"
description = "Contact Sensor"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.contact_sensor"
keywords = ["isaac", "physics", "robotics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.physx" = {}
"omni.timeline" = {} # Needed for simulation to occur
# "omni.graph.core" = {}
"omni.kit.numpy.common" = {}
"omni.kit.window.viewport" = {} #needed by sample
"omni.kit.pip_archive" = {} # pulls in numpy
"omni.isaac.ui" = {}
"omni.isaac.core" = {}

[[python.module]]
name = "omni.isaac.contact_sensor"

[[python.module]]
name = "omni.isaac.contact_sensor.tests"
public = false

[[python.module]]
name = "omni.isaac.contact_sensor.scripts.samples.contact_sensor"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false
