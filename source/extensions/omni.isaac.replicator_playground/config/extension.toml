[core]
reloadable = true
order = 0

[package]
version = "0.1.1"
title = "Replicator Playground"
description = "End to end synthetic data workflow"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.replicator_playground"
keywords = ["isaac", "synthetic", "playground", "replicator"]
changelog = "docs/CHANGELOG.md"
category = "Simulation"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.syntheticdata" = {}
"omni.isaac.dr" = {}
"omni.isaac.core_archive" = {}
"omni.isaac.ml_archive" = {}
"omni.isaac.synthetic_utils" = {}
"omni.isaac.ui" = {}

[python.pipapi]
requirements = ["torch", "torchvision"]
use_online_index = true

[[python.module]]
name = "omni.isaac.replicator_playground"
