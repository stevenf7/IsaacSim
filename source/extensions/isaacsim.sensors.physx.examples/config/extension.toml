[core]
reloadable = true
order = 0

[package]
version = "2.2.1"
category = "Simulation"
title = "Isaac Sim PhysX Sensor Examples"
description = "Provides example usage and snippets for Isaac Sim PhysX-raycast-based sensors."
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.sensors.physx.examples"
keywords = ["isaac", "physics", "sensor", "lidar", "examples"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.sensors.physx" = {}
"isaacsim.examples.browser" = {}

[[python.module]]
name = "isaacsim.sensors.physx.examples"

