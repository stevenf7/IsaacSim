[package]
version = "0.1.0"
category = "Setup"
title = "Isaac Sim Setup"
description = "This Extension does the setup of the Isaac Sim App"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.app.setup"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
toggleable = false

[dependencies]
"omni.usd" = {}
"omni.ui" = { order = -100 }

# Isaac Sim Core Extensions 
"omni.kit.search.service" = {}
"omni.kit.context_menu" = {}
"omni.kit.selection" = {}
"omni.kit.stage_templates" = {}
"omni.kit.window.title" = {}
"omni.isaac.core" = {}

[[python.module]]
name = "omni.isaac.app.setup"

[[python.module]]
name = "omni.isaac.app.setup.tests"

[settings]
exts."omni.isaac.app.setup".nucleusCheck = true
exts."omni.isaac.app.setup".copy_assetsURL = "https://ov-isaac.s3.us-west-1.amazonaws.com"
exts."omni.isaac.app.setup".copy_concurrency = 3
exts."omni.isaac.app.setup".copy_behaviour = "CopyBehavior.OVERWRITE"
exts."omni.isaac.app.setup".copy_timeout = 600

