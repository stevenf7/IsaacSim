%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
#############
# Pose Tree #
#############
name: atlas.pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 36
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: atlas.pose_frames
components:
  - name: world
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: sim
      pose_tree: atlas.pose_tree/pose_tree
  - name: robot
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: /car/Vehicle
      pose_tree: atlas.pose_tree/pose_tree
  - name: odometry
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: /car
      pose_tree: atlas.pose_tree/pose_tree
  - name: lidar_flatten
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
##############
# Sim Output #
##############
name: interface.output
components:
  - name: uss_envelopes
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - type: nvidia::gxf::test::PingTx
    parameters:
      signal: signal
  - name: signal
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 0
---
#########
# Sight #
#########
name: sight
components:
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 30 Hz
  - name: sight_router
    type: nvidia::isaac::SightRouter
  - type: nvidia::isaac::SightWebserver
    parameters:
      sight_router: sight_router
      latency: 0.2
      port: 3000
      webroot: /home/qianl/isaac/sdk/packages/sight/webroot
      asset_root: ../isaac_assets
      asset_prefix: /apps/assets/
      app_name: visualize_egm
---
########################
# Rangescan Flattening #
########################
name: range_scan_flattening
components:
  - name: range_scan
    type: nvidia::gxf::DoubleBufferReceiver
  - name: flatscan
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: flatscan
      min_size: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: range_scan
      min_size: 1
  - name: flattener
    type: nvidia::isaac::RangeScanFlattening
    parameters:
      atlas: atlas/frontend
      allocator: allocator/default
      range_scan: range_scan
      flatscan: flatscan
      height_minimum: -0.9
      height_maximum: 0.5
      flat_sensor_frame: atlas.pose_frames/lidar_flatten
      robot_frame: atlas.pose_frames/robot
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/rangescan
      target: range_scan_flattening/range_scan
---
################
# EGM Lattices #
################
name: egm.observation_lattice_generator
components:
  - name: egm_lattice
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
  - type: nvidia::isaac::LatticeGenerator
    parameters:
      clock: clock/default
      cell_size: 0.04
      relative_offset: [-0.5, -0.5]
      grid_dimensions: [512, 512]
      reference_frame: atlas.pose_frames/robot
      lattice_frame: egm_lattice
      lattice: lattice
      atlas: atlas/frontend
  - name: lattice
    type: nvidia::gxf::DoubleBufferTransmitter
    parameter:
      policy: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: lattice
      min_size: 1
---
name: egm.lattice_broadcast
components:
  - name: rx_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 1
  - type: nvidia::gxf::Broadcast
    parameters:
      source: rx_lattice
  - name: tx_lattice_flatscan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - name: tx_lattice_fusion
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - name: tx_lattice_vis
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_lattice
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: tx_lattice_flatscan
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.observation_lattice_generator/lattice
      target: egm.lattice_broadcast/rx_lattice
---
name: egm.fused_map_lattice_generator
components:
  - name: egm_fused_lattice
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
  - type: nvidia::isaac::LatticeGenerator
    parameters:
      clock: clock/default
      cell_size: 0.04
      relative_offset: [-0.5, -0.5]
      grid_dimensions: [800, 800]
      reference_frame: atlas.pose_frames/robot
      lattice_frame: egm_fused_lattice
      lattice: lattice
      atlas: atlas/frontend
  - name: lattice
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: lattice
      min_size: 1
---
###################
# Flatscan To EGM #
###################
name: egm.flatscan_to_egm
components:
  - name: rx_flatscan
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 2
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_flatscan
      min_size: 1
  - name: lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - type: nvidia::isaac::FlatscanToEvidenceMap
    parameters:
      allocator: allocator/default
      flatscan: rx_flatscan
      lattice: lattice
      evidence_map: evidence_map
      atlas: atlas/frontend
      wall_thickness: 0.20
      rows: 512
      columns: 512
  - name: evidence_map
    type: nvidia::gxf::DoubleBufferTransmitter
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.lattice_broadcast/tx_lattice_flatscan
      target: egm.flatscan_to_egm/lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: range_scan_flattening/flatscan
      target: egm.flatscan_to_egm/rx_flatscan
---
name: egm.classical_fusion
components:
  - name: sensor_evidence_grid
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 2
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: sensor_evidence_grid
      min_size: 1
  - name: fused_map_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - name: local_map_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - type: nvidia::isaac::ClassicalMapFusion
    parameters:
      allocator: allocator/default
      fused_evidence_grid: fused_evidence_grid
      sensor_evidence_grid: sensor_evidence_grid
      fused_map_lattice: fused_map_lattice
      local_map_lattice: local_map_lattice
      atlas: atlas/frontend
      fused_map_dimensions: [800, 800]
      local_map_dimensions: [512, 512]
      base_frame: atlas.pose_frames/robot
      odometry_frame: atlas.pose_frames/odometry
  - name: fused_evidence_grid
    type: nvidia::gxf::DoubleBufferTransmitter
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.lattice_broadcast/tx_lattice_fusion
      target: egm.classical_fusion/local_map_lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.fused_map_lattice_generator/lattice
      target: egm.classical_fusion/fused_map_lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.flatscan_to_egm/evidence_map
      target: egm.classical_fusion/sensor_evidence_grid
---
#################
# EGM To Binary #
#################
name: egm.inpaint
components:
  - name: painted_evidence_map
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: map_to_paint
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: map_to_paint
      min_size: 1
  - type: nvidia::isaac::EvidenceMapInpaint
    parameters:
      rectangles_frame: atlas.pose_frames/robot
      map_to_paint: map_to_paint
      painted_evidence_map: painted_evidence_map
      paint_mass: [1.0, 0.0, 0.0]
      atlas: atlas/frontend
      rectangles: [[[-0.25, 0.25],[-0.25, 0.25]]]
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.classical_fusion/fused_evidence_grid
      target: egm.inpaint/map_to_paint
---
name: egm
components:
  - name: rx_egm
    type: nvidia::gxf::DoubleBufferReceiver
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_egm
      min_size: 1
  - type: nvidia::gxf::Broadcast
    parameters:
      source: rx_egm
  - name: tx_egm_record
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: tx_egm_trigger
    type: nvidia::gxf::DoubleBufferTransmitter
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.inpaint/painted_evidence_map
      target: egm/rx_egm
---
####################
## USS Accumulator #
####################
name: uss_post_processing
components:
  - name: in
    type: nvidia::gxf::DoubleBufferReceiver
  - name: out
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: amplify
    type: nvidia::isaac::UssPostProcessorAmplify
    parameters:
      exponent: 2
      multiplier: 0.01
  - name: clip
    type: nvidia::isaac::UssPostProcessorClip
    parameters:
      clip_range: [0.0, 0.88]
  - type: nvidia::isaac::UssPostProcessing
    parameters:
      allocator: allocator/default
      envelopes_in: in
      envelopes_out: out
      processors: [amplify, clip]
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: in
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: out
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/uss_envelopes
      target: uss_post_processing/in
---
name: uss_accumulator
components:
  - name: envelopes
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 8
  - name: trigger
    type: nvidia::gxf::DoubleBufferReceiver
  - name: tx_envelopes
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: tx_poses
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: tx_intrinsics
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: tx_robot_T_odom
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::isaac::UssBatchEncoder
    parameters:
      trigger: trigger
      uss_envelopes: envelopes
      tx_envelopes: tx_envelopes
      tx_poses: tx_poses
      tx_intrinsics: tx_intrinsics
      tx_robot_T_odom: tx_robot_T_odom
      atlas: atlas/frontend
      allocator: allocator/default
      static_frame: atlas.pose_frames/odometry
      robot_frame: atlas.pose_frames/robot
      adjacency: [[0, 1], [1, 2], [2, 3], [3, 4], [4, 5], [6, 7], [7, 8], [8, 9], [9, 10], [10, 11]]
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: trigger
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm/tx_egm_trigger
      target: uss_accumulator/trigger
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_post_processing/out
      target: uss_accumulator/envelopes
---
##############
## Recorders #
##############
name: serializers
components:
  - name: std
    type: nvidia::gxf::StdComponentSerializer
  - name: trivial
    type: nvidia::isaac::TrivialComponentSerializer
  - name: pose_frame
    type: nvidia::isaac::PoseFrameUidSerializer
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
name: ogm_record
components:
  - name: rx
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: rx
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: ogm
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm/tx_egm_record
      target: ogm_record/rx
---
name: uss_envelopes_recorder
components:
  - name: rx
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: rx
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: uss_envelopes_000
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx
      min_size: 1
---
name: uss_poses_recorder
components:
  - name: rx
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: rx
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: uss_poses_000
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx
      min_size: 1
---
name: uss_intrinsics_recorder
components:
  - name: rx
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: rx
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: uss_intrinsics_000
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx
      min_size: 1
---
name: robot_T_odom_recorder
components:
  - name: rx
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: rx
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: robot_T_odom_000
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_accumulator/tx_envelopes
      target: uss_envelopes_recorder/rx
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_accumulator/tx_poses
      target: uss_poses_recorder/rx
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_accumulator/tx_intrinsics
      target: uss_intrinsics_recorder/rx
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_accumulator/tx_robot_T_odom
      target: robot_T_odom_recorder/rx
---
name: allocator
components:
  - name: default
    type: nvidia::gxf::UnboundedAllocator
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default
