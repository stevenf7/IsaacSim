%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
    parameters:
      use_time_since_epoch: true
---
#############
# Pose Tree #
#############
name: atlas.pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 36
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
##############
# TCP Server #
##############
name: serializers
components:
  - name: allocator
    type: nvidia::gxf::UnboundedAllocator
  - name: std
    type: nvidia::gxf::StdComponentSerializer
    parameters:
      allocator: allocator
  - name: trivial
    type: nvidia::isaac::TrivialComponentSerializer
  - name: pose_frame
    type: nvidia::isaac::PoseFrameUidSerializer
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
name: interface.input
components:
  - name: vehicle_command
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 3
      policy: 0
---
name: interface.output
components:
  - name: pose_tree
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: uss_envelopes
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: rangescan
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: color
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: depth
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: segmentation_class
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: segmentation_instance
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - name: vehicle_state
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 3
      policy: 0
  - type: nvidia::gxf::TcpServer
    parameters:
      receivers: [ pose_tree, color, depth, segmentation_class, segmentation_instance,
                   uss_envelopes, rangescan, vehicle_state ]
      transmitters: [ interface.input/vehicle_command ]
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      address: 127.0.0.1
      port: 7000
      timeout_ms: 100
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 200Hz
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default
---
name: statistics
components:
  - name: statistics
    type: nvidia::gxf::JobStatistics
    parameters:
      clock: clock/default
