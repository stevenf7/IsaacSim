%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
name: interface.input
components:
- name: scenario_command
  type: nvidia::gxf::DoubleBufferReceiver
---
name: generator
components:
  - name: output
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 30 Hz
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: output
      min_size: 1
  - name: generator
    type: nvidia::isaac::SimulationCommandGenerator
    parameters:
      radius: 2.0
      simulation_command: output
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: generator/output
      target: interface.input/scenario_command
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default
