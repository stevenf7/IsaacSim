%YAML 1.2
---
name: interface.input
components:
  - name: vehicle_command
    type: nvidia::gxf::DoubleBufferReceiver
---
name: allocator
components:
  - name: allocator
    type: nvidia::gxf::UnboundedAllocator
---
name: generator
components:
  - name: output
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 50
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: output
      min_size: 1
  - name: generator
    type: nvidia::isaac::AckermannDriveControlGenerator
    parameters:
      acceleration: 1.0
      curvature: -0.1
  - type: nvidia::isaac::CompositePublisher
    parameters:
      generator: generator
      allocator: allocator/allocator
      composite: output
---
name: interface.output
components:
  - name: vehicle_state
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: ping_signal
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::test::PingTx
    parameters:
      signal: ping_signal
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 5
---
name: ping_rx
components:
  - name: signal
    type: nvidia::gxf::DoubleBufferReceiver
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: signal
      min_size: 1
  - type: nvidia::gxf::test::PingRx
    parameters:
      signal: signal
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/ping_signal
      target: ping_rx/signal
---
name: vehicle_state_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
  - type: nvidia::gxf::test::PrintTensor
    parameters:
      tensors: input
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: generator/output
      target: interface.input/vehicle_command
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/vehicle_state
      target: vehicle_state_serializer/input
---
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      realtime: true
      max_duration_ms: 100000000
      stop_on_deadlock: false
      timeout_ms: 200000
