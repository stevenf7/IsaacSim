%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
#############
# Pose Tree #
#############
name: atlas.pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 36
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: atlas.pose_frames
components:
  - name: world
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: sim
      pose_tree: atlas.pose_tree/pose_tree
  - name: robot
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: /car/Vehicle
      pose_tree: atlas.pose_tree/pose_tree
  - name: odometry
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: /car
      pose_tree: atlas.pose_tree/pose_tree
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
---
##############
# Sim Output #
##############
name: interface.output
components:
  - name: uss_envelopes
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - type: nvidia::isaac::TickCounter
---
#########
# Sight #
#########
name: sight
components:
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 30 Hz
  - name: sight_router
    type: nvidia::isaac::SightRouter
  - type: nvidia::isaac::SightWebserver
    parameters:
      sight_router: sight_router
      latency: 0.2
      port: 3000
      webroot: /home/qianl/isaac/sdk/packages/sight/webroot
      asset_root: ../isaac_assets
      asset_prefix: /apps/assets/
      app_name: visualize_egm/sight
---
########################
# Rangescan Flattening #
########################
name: range_scan_flattening
components:
  - name: range_scan
    type: nvidia::gxf::DoubleBufferReceiver
  - name: flatscan
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: flatscan
      min_size: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: range_scan
      min_size: 1
  - name: flattener
    type: nvidia::isaac::RangeScanFlattening
    parameters:
      allocator: allocator/default
      range_scan: range_scan
      flatscan: flatscan
      height_minimum: -0.9
      height_maximum: 0.5
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/rangescan
      target: range_scan_flattening/range_scan
---
################
# EGM Lattices #
################
name: egm.observation_lattice_generator
components:
  - name: egm_lattice
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
  - type: nvidia::isaac::LatticeGenerator
    parameters:
      clock: clock/default
      cell_size: 0.04
      relative_offset: [-0.5, -0.5]
      grid_dimensions: [512, 512]
      reference_frame: atlas.pose_frames/robot
      lattice_frame: egm_lattice
      lattice: lattice
      atlas: atlas/frontend
  - name: lattice
    type: nvidia::gxf::DoubleBufferTransmitter
    parameter:
      policy: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: lattice
      min_size: 1
---
name: egm.lattice_broadcast
components:
  - name: rx_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 1
  - type: nvidia::gxf::Broadcast
    parameters:
      source: rx_lattice
  - name: tx_lattice_flatscan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - name: tx_lattice_fusion
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - name: tx_lattice_vis
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_lattice
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: tx_lattice_flatscan
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.observation_lattice_generator/lattice
      target: egm.lattice_broadcast/rx_lattice
---
name: egm.fused_map_lattice_generator
components:
  - name: egm_fused_lattice
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
  - type: nvidia::isaac::LatticeGenerator
    parameters:
      clock: clock/default
      cell_size: 0.04
      relative_offset: [-0.5, -0.5]
      grid_dimensions: [800, 800]
      reference_frame: atlas.pose_frames/robot
      lattice_frame: egm_fused_lattice
      lattice: lattice
      atlas: atlas/frontend
  - name: lattice
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: lattice
      min_size: 1
---
###################
# Flatscan To EGM #
###################
name: egm.flatscan_to_egm
components:
  - name: rx_flatscan
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_flatscan
      min_size: 1
  - name: lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - type: nvidia::isaac::FlatscanToEvidenceMap
    parameters:
      allocator: allocator/default
      flatscan: rx_flatscan
      lattice: lattice
      evidence_map: evidence_map
      atlas: atlas/frontend
      wall_thickness: 0.20
      rows: 512
      columns: 512
  - name: evidence_map
    type: nvidia::gxf::DoubleBufferTransmitter
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.lattice_broadcast/tx_lattice_flatscan
      target: egm.flatscan_to_egm/lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: range_scan_flattening/flatscan
      target: egm.flatscan_to_egm/rx_flatscan
---
name: egm.classical_fusion
components:
  - name: sensor_evidence_grid
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: sensor_evidence_grid
      min_size: 1
  - name: fused_map_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - name: local_map_lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 1
  - type: nvidia::isaac::ClassicalMapFusion
    parameters:
      allocator: allocator/default
      fused_evidence_grid: fused_evidence_grid
      sensor_evidence_grid: sensor_evidence_grid
      fused_map_lattice: fused_map_lattice
      local_map_lattice: local_map_lattice
      atlas: atlas/frontend
      fused_map_dimensions: [800, 800]
      base_frame: atlas.pose_frames/robot
      odometry_frame: atlas.pose_frames/odometry
  - name: fused_evidence_grid
    type: nvidia::gxf::DoubleBufferTransmitter
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.lattice_broadcast/tx_lattice_fusion
      target: egm.classical_fusion/local_map_lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.fused_map_lattice_generator/lattice
      target: egm.classical_fusion/fused_map_lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.flatscan_to_egm/evidence_map
      target: egm.classical_fusion/sensor_evidence_grid
---
##################
# EGM Visualizer #
##################
name: egm.visualizer
components:
  - name: rx_egm
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 1
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: rx_egm
      min_size: 1
  - type: nvidia::isaac::EvidenceMapVisualizer
    parameters:
      allocator: allocator/default
      transmitter: sx_egm
      evidence_map: rx_egm
      atlas: atlas/frontend
      uncertainity_color: [0, 133, 100]
  - name: sx_egm
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: egm.classical_fusion/fused_evidence_grid
      target: egm.visualizer/rx_egm
---
name: allocator
components:
  - name: default
    type: nvidia::gxf::UnboundedAllocator
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default
