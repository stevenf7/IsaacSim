%YAML 1.2
---
name: interface.output
components:
  - name: tensor
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: tensor
      min_size: 1
  - type: nvidia::gxf::test::PrintTensor
    parameters:
      tensors: tensor
      silent: false
---
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      realtime: true
      max_duration_ms: 100000000
      stop_on_deadlock: false
      timeout_ms: 200000
