%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
name: interface.output
#############
# Receivers #
#############
components:
  - name: color
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: depth
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: segmentation_class
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: segmentation_instance
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: uss_envelopes
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: rangescan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::isaac::TickCounter
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 15 Hz
---
#########
# Atlas #
#########
name: pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 32
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: pose_frames
components:
  - name: sim
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      pose_tree: pose_tree/pose_tree
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: pose_tree/pose_tree
---
#########
# Sight #
#########
name: sight
components:
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 30 Hz
  - name: sight_router
    type: nvidia::isaac::SightRouter
  - type: nvidia::isaac::SightWebserver
    parameters:
      sight_router: sight_router
      latency: 0.2
      port: 3000
      webroot: /home/qianl/isaac/sdk/packages/sight/webroot
      asset_root: ../isaac_assets
      asset_prefix: /apps/assets/
      app_name: visualize_sensors/sight
      app_config: '{
          "windows": {
            "flatscan - 3d": {
             "renderer":"3d",
             "channels":[
                 {"name":"visualize_sensors/sight/flatscan_beam_line/beam_lines"}
             ]
            },
            "uss unprojection - 2d": {
              "renderer":"2d",
              "channels":[
                  {"name":"visualize_sensors/sight/uss_unprojection/tensor_view"},
                  {"name":"visualize_sensors/sight/uss_sensor_fov/sensor_fov"},
                  {"name":"visualize_sensors/sight/uss_sensor_mode/sensor_mode"}
              ]
            },
            "camera_color - 2d": {
             "renderer":"2d",
             "channels":[
                 {"name":"visualize_sensors/sight/camera_color/tensor_view"}
             ]
            },
            "camera_segmentation_class - 2d": {
             "renderer":"2d",
             "channels":[
                 {"name":"visualize_sensors/sight/camera_segmentation_class/tensor_view"}
             ]
            },
            "camera_segmentation_instance - 2d": {
             "renderer":"2d",
             "channels":[
                 {"name":"visualize_sensors/sight/camera_segmentation_instance/tensor_view"}
             ]
            },
            "camera_depth - 2d": {
             "renderer":"2d",
             "channels":[
                 {"name":"visualize_sensors/sight/camera_depth/tensor_view"}
             ]
            }
          }
      }'
---
name: pose_json_bridge
components:
  - name: pose_tree_tx
    type: nvidia::isaac::SightTransmitter
    parameters:
      capacity: 10
  - type: nvidia::isaac::PoseTreeSightBridge
    parameters:
      pose_tree: pose_tree/pose_tree
      sight_transmitter: pose_tree_tx
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 20 Hz
---
######################
# Camera Visualizers #
######################
name: camera_color_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_color
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/default
      tensor: input
      transmitter: camera_color
      range: [0.0, 40.0]
      color_mode: 0
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/color
      target: camera_color_visualizer/input
---
name: camera_depth_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_depth
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/default
      tensor: input
      transmitter: camera_depth
      range: [0.0, 5.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/depth
      target: camera_depth_visualizer/input
---
name: camera_segmentation_class_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_segmentation_class
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/default
      tensor: input
      transmitter: camera_segmentation_class
      range: [0.0, 40.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/segmentation_class
      target: camera_segmentation_class_visualizer/input
---
name: camera_segmentation_instance_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_segmentation_instance
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/default
      tensor: input
      transmitter: camera_segmentation_instance
      range: [0.0, 40.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/segmentation_instance
      target: camera_segmentation_instance_visualizer/input
---
###################
# USS Visualizers #
###################
name: uss_broadcast
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 0
  - type: nvidia::gxf::Broadcast
    parameters:
      source: input
  - name: unproject
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: firing
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: unproject
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: firing
      min_size: 1
---
name: uss_firing_visualizer
components:
  - name: envelopes
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 0
  - name: uss_sensor_fov
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - name: uss_sensor_mode
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::UssFiringVisualizer
    parameters:
      envelopes: envelopes
      atlas: atlas/frontend
      sensor_fov: uss_sensor_fov
      sensor_mode: uss_sensor_mode
      mode_colors: [[214, 39, 40], [118, 185, 0]]
      robot_frame: pose_frames/sim
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: envelopes
      min_size: 1
---
name: unprojection_lattice_generator
components:
  - name: lattice
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::isaac::LatticeGenerator
    parameters:
      cell_size: 0.05
      relative_offset: [-0.5, -0.5]
      grid_dimensions: [256, 256]
      reference_frame: /World/Mercedes_REB/Vehicle
      lattice_frame: unprojection_lattice
      lattice: lattice
      atlas: atlas/frontend
      clock: clock/default
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 1 Hz
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: lattice
      min_size: 1
---
name: unprojection_lattice_broadcast
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::gxf::Broadcast
    parameters:
      source: input
  - name: unprojection
    type: nvidia::gxf::DoubleBufferTransmitter
  - name: tensor
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: unprojection
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: tensor
      min_size: 1
---
name: uss_unprojection
components:
  - name: envelopes
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: map
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::isaac::UssUnprojection
    parameters:
      allocator: allocator/default
      uss_envelopes: envelopes
      grid_map_lattice: lattice
      grid_map: map
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: envelopes
      min_size: 1
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: map
      min_size: 1
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 10 Hz
---
name: unprojection_tensor_visualizer
components:
  - name: tensor
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: lattice
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: uss_unprojection
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/default
      tensor: tensor
      transmitter: uss_unprojection
      range: [0.0, 1.0]
      color_mode: 0
      lattice: lattice
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: tensor
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/uss_envelopes
      target: uss_broadcast/input
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_broadcast/firing
      target: uss_firing_visualizer/envelopes
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_broadcast/unproject
      target: uss_unprojection/envelopes
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: unprojection_lattice_generator/lattice
      target: unprojection_lattice_broadcast/input
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: unprojection_lattice_broadcast/unprojection
      target: uss_unprojection/lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: unprojection_lattice_broadcast/tensor
      target: unprojection_tensor_visualizer/lattice
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: uss_unprojection/map
      target: unprojection_tensor_visualizer/tensor
---
#####################
# Lidar Visualizers #
#####################
name: range_scan_flattening
components:
  - name: flatscan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 0
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: flatscan
      min_size: 1
  - name: range_scan
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: range_scan
      min_size: 1
  - name: flattener
    type: nvidia::isaac::RangeScanFlattening
    parameters:
      allocator: allocator/default
      range_scan: range_scan
      flatscan: flatscan
      height_minimum: -0.9
      height_maximum: 0.5
---
name: flatscan_visualizer
components:
  - name: flatscan
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      policy: 0
  - name: flatscan_beam_line
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - name: flatscan_end_point
    type: nvidia::isaac::SightTransmitter
    parameters:
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: flatscan
      min_size: 1
  - type: nvidia::isaac::FlatscanVisualizer
    parameters:
      flatscan: flatscan
      atlas: atlas/frontend
      beam_line: flatscan_beam_line
      end_point: flatscan_end_point
      beam_skip: 4
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/rangescan
      target: range_scan_flattening/range_scan
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: range_scan_flattening/flatscan
      target: flatscan_visualizer/flatscan
---
name: allocator
components:
  - name: default
    type: nvidia::gxf::UnboundedAllocator
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default
