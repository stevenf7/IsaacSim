%YAML 1.2
---
name: interface.output
#############
# Receivers #
#############
components:
  - name: color
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: depth
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: segmentation_class
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: segmentation_instance
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: ping_signal
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::test::PingTx
    parameters:
      signal: ping_signal
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 5
---
name: ping_rx
components:
  - name: signal
    type: nvidia::gxf::DoubleBufferReceiver
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: signal
      min_size: 1
  - type: nvidia::gxf::test::PingRx
    parameters:
      signal: signal
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/ping_signal
      target: ping_rx/signal
---
#########
# Atlas #
#########
name: atlas_pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 32
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: atlas_pose_tree/pose_tree
---
#########
# Sight #
#########
name: sight
components:
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 1
  - name: sight_router
    type: nvidia::isaac::SightRouter
  - type: nvidia::isaac::SightWebserver
    parameters:
      sight_router: sight_router
      latency: 1.0
      port: 3000
      webroot: /isaac/sdk/packages/sight/webroot
      asset_root: ../isaac_assets
      asset_prefix: /apps/assets/
      app_name: visualize_sensors/sight
---
name: pose_json_bridge
components:
  - name: pose_tree_tx
    type: nvidia::isaac::SightTransmitter
    parameters:
      capacity: 10
  - type: nvidia::isaac::PoseTreeSightBridge
    parameters:
      pose_tree: atlas_pose_tree/pose_tree
      sight_transmitter: pose_tree_tx
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 50
---
######################
# Camera Visualizers #
######################
name: allocator
components:
  - name: host
    type: nvidia::gxf::UnboundedAllocator
---
name: caemra_color_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_color
    type: nvidia::isaac::SightTransmitter
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/host
      tensor: input
      transmitter: camera_color
      range: [0.0, 40.0]
      color_mode: 0
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/color
      target: caemra_color_visualizer/input
---
name: camera_depth_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_depth
    type: nvidia::isaac::SightTransmitter
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/host
      tensor: input
      transmitter: camera_depth
      range: [0.0, 5.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/depth
      target: camera_depth_visualizer/input
---
name: camera_segmentation_class_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_segmentation_class
    type: nvidia::isaac::SightTransmitter
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/host
      tensor: input
      transmitter: camera_segmentation_class
      range: [0.0, 40.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/segmentation_class
      target: camera_segmentation_class_visualizer/input
---
name: camera_segmentation_instance_visualizer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: camera_segmentation_instance
    type: nvidia::isaac::SightTransmitter
  - type: nvidia::isaac::TensorVisualizer
    parameters:
      allocator: allocator/host
      tensor: input
      transmitter: camera_segmentation_instance
      range: [0.0, 40.0]
      color_mode: 1
      atlas: atlas/frontend
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/segmentation_instance
      target: camera_segmentation_instance_visualizer/input