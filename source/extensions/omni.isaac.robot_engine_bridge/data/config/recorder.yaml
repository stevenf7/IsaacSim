      directory: /tmp
      basename: camera_front_segmentation_instance
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/segmentation_instance
      target: camera_segmentation_instance_serializer/input
---
name: uss_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: input
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: uss
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
