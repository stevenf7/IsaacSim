    parameters:
      capacity: 10
      policy: 0
  - name: rangescan_4
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - name: ping_signal
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::test::PingTx
    parameters:
      signal: ping_signal
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 5
---
name: ping_rx
components:
  - name: signal
    type: nvidia::gxf::DoubleBufferReceiver
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: signal
      min_size: 1
  - type: nvidia::gxf::test::PingRx
    parameters:
      signal: signal
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/ping_signal
      target: ping_rx/signal
---
name: camera_color_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - name: tensor_serializer
    type: nvidia::gxf::StdSerializer
  - name: meta_serializer
    type: nvidia::isaac::TrivialComponentSerializer
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: input
      serializers: [ tensor_serializer, meta_serializer ]
      directory: /tmp
      basename: camera_front_color
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/color
      target: camera_color_serializer/input
