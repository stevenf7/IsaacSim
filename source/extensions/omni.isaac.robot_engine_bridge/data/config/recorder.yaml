%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
#############
# Pose Tree #
#############
name: pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 32
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: pose_tree_feed
components:
  - name: operation
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 500
      policy: 1
  - type: nvidia::isaac::PoseTreeFeed
    parameters:
      pose_tree: pose_tree/pose_tree
      buffer_size: 500
      pose_tree_operation: operation
      clock: clock/default
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 100 Hz
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: pose_tree/pose_tree
---
name: pose_tree_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 500
      policy: 1
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: input
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: pose_tree
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: pose_tree_feed/operation
      target: pose_tree_serializer/input
---
##############
# Sim Output #
##############
name: interface.output
components:
  - name: color
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: depth
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: segmentation_instance
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: segmentation_class
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: uss_envelopes
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan_2
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan_3
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - name: rangescan_4
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
  - type: nvidia::isaac::TickCounter
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 100 Hz
---
#############
# Recorders #
#############
name: serializers
components:
  - name: std
    type: nvidia::gxf::StdSerializer
  - name: trivial
    type: nvidia::isaac::TrivialComponentSerializer
  - name: pose_frame
    type: nvidia::isaac::PoseFrameUidSerializer
    parameters:
      pose_tree: pose_tree/pose_tree
---
name: camera_color_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: input
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: camera_front_color
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/color
      target: camera_color_serializer/input
---
name: camera_depth_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
      receiver: input
      serializers: [ serializers/std, serializers/trivial, serializers/pose_frame ]
      directory: /tmp
      basename: camera_front_depth
      flush_on_tick: true
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/depth
      target: camera_depth_serializer/input
---
name: camera_segmentation_class_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
  - type: nvidia::gxf::EntityRecorder
    parameters:
