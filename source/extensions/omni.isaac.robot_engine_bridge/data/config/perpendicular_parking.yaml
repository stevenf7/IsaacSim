      [[4.305, 0.975], [4.125, 0.99], [3.9299999999999997, 1.14], [3.855, 1.38], [3.8249999999999997, 1.605]]
    ]
---
name: ego_actor_visualizer
components:
- name: ego_actor_transmitter
  type: nvidia::isaac::SightTransmitter
  parameters:
    capacity: 100
- type: nvidia::isaac::ActorVisualizer
  parameters:
    atlas: atlas/frontend
    actor_pose_frames: [ego_actor]
    reference_frame: world
    actor_circle_radius: 0.0
    actor_color: [255, 0, 0]
    actor_heading_length: 0.0
    actor_axis_color: [0, 0, 0]
    shape: actor_shapes/sports_car_shape
    sight_tx: ego_actor_transmitter
- name: ego_actor_gt_transmitter
  type: nvidia::isaac::SightTransmitter
  parameters:
    capacity: 100
- type: nvidia::isaac::ActorVisualizer
  parameters:
    atlas: atlas/frontend
    actor_pose_frames: [ego_actor_gt]
    reference_frame: world
    actor_circle_radius: 0.0
    actor_color: [0, 255, 0]
    actor_heading_length: 0.0
    actor_axis_color: [0, 0, 0]
    shape: actor_shapes/sports_car_shape
    sight_tx: ego_actor_gt_transmitter
- type: nvidia::gxf::PeriodicSchedulingTerm
  parameters:
    recess_period: 20 Hz
---
###############
# Connections #
###############
components:
- type: nvidia::gxf::Connection
  parameters:
    source: path2_generator_1/path_out
    target: path2_gatherer/source_1
- type: nvidia::gxf::Connection
  parameters:
    source: path2_generator_2/path_out
    target: path2_gatherer/source_2
- type: nvidia::gxf::Connection
  parameters:
    source: path2_generator_3/path_out
    target: path2_gatherer/source_3
- type: nvidia::gxf::Connection
  parameters:
    source: path2_gatherer/out
    target: dac/waypoints
- type: nvidia::gxf::Connection
  parameters:
    source: dac/path
    target: dac_sampler/arcs
- type: nvidia::gxf::Connection
  parameters:
    source: dac_sampler/dense_path
    target: path2_broadcaster/source
- type: nvidia::gxf::Connection
  parameters:
    source: path2_broadcaster/out_1
    target: path2_visualizer/path_in
- type: nvidia::gxf::Connection
  parameters:
    source: path2_broadcaster/out_2
    target: lqr_planner/path
- type: nvidia::gxf::Connection
  parameters:
    source: lqr_planner/trajectory
    target: trajectory_broadcaster/source
- type: nvidia::gxf::Connection
  parameters:
    source: trajectory_broadcaster/out_1
    target: controller/trajectory
- type: nvidia::gxf::Connection
  parameters:
    source: trajectory_broadcaster/out_2
    target: trajectory_visualizer/trajectory_in
- type: nvidia::gxf::Connection
  parameters:
    source: odometry/out
    target: lqr_planner/starting_state
- type: nvidia::gxf::Connection
  parameters:
    source: interface.output/vehicle_state
    target: odometry/in
- type: nvidia::gxf::Connection
  parameters:
    source: controller/out
    target: interface.input/vehicle_command
---
######################
# Storage Allocators #
######################
name: storage
components:
- name: physics_allocator
  type: nvidia::gxf::BlockMemoryPool
  parameters:
    storage_type: 0
    block_size: 233820
    num_blocks: 500
- name: map_allocator
  type: nvidia::gxf::UnboundedAllocator
