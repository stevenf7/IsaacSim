      # Left side window
      [[0.8999999999999999, -1.56], [0.48, -1.44], [-0.09, -1.3199999999999998], [-0.78, -1.2149999999999999], [-1.425, -1.23], [-2.1, -1.275], [-1.95, -1.4549999999999998], [-1.6199999999999999, -1.575], [-0.99, -1.5899999999999999], [-0.44999999999999996, -1.545], [0.8999999999999999, -1.56]],
