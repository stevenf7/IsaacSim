display_name = "Robot Engine Bridge"

[package]
version = "0.1.0"
title = "Robot Engine Bridge"
description = "Communication bridge for Isaac SDK and GXF"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
category = "Simulation"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.uiapp" = {}
"omni.graph.core" = {} # needed for fastcache
"omni.isaac.dynamic_control" = {}
"omni.isaac.range_sensor" = {}
"omni.isaac.utils" = {}
"omni.syntheticdata" = {}

[[python.module]]
name = "omni.isaac.robot_engine_bridge"

[[python.module]]
name = "omni.isaac.RobotEngineBridgeSchema"
public = false

[[python.module]]
name = "omni.isaac.pyalice"
public = false

[[python.module]]
name = "omni.isaac.robot_engine_bridge.tests"
public = false

[[python.module]]
name = "omni.isaac.robot_engine_bridge.scripts.samples.vehicle_control"
public = false

[[native.plugins]]
path = "bin/*.plugin"
recursive = false

[[libraries]]
path = "bin/${lib_prefix}robotEngineBridgeSchema${lib_ext}"

[python.pipapi]
requirements = ["numpy==1.19.0", "numpy-quaternion==2020.9.5.14.42.2", "pycapnp==1.0.0", "numba==0.51.2", "scipy==1.5.4"]
archiveDirs = ["pip-packages"]

# We need to enable fastcache for this extension for plan visualizer
[settings]
persistent.physics.useFastCache = true

[fswatcher.paths]
exclude = ["*/__pycache__*", "*/.git*", "*/packages", "*/gxf"]