[package]
version = "0.1.7"
category = "Simulation"
title = "Isaac Sim Camera Simulation UI Components"
description = "Provides UI components for Isaac Sim camera simulation, eg. menu options."
authors = ["hmazhar@nvidia.com", "stevfeng@nvidia.com", "adevalla@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.sensors.camera.ui"
keywords = ["isaac", "physics", "robotics", "ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.gui.components" = {}
"isaacsim.sensors.camera" = {}

[[python.module]]
name = "isaacsim.sensors.camera.ui"

[[test]]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
'--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
"--/omni/kit/plugin/syncUsdLoads=1",
"--/rtx/hydra/materialSyncLoads=1",
"--/rtx/materialDb/syncLoads=1",
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]