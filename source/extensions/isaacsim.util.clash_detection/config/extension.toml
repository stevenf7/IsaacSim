[package]
version = "0.1.7"
category = "Simulation"
title = "Isaac Sim Clash Detection"
description = "Mesh Collision Detection Utility"
authors = ["hmazhar@nvidia.com", "rgasoto@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.util.clash_detection"
keywords = ["isaac", "clashdetection", "utils",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.core.prims" = {}
"isaacsim.core.utils" = {}
"isaacsim.storage.native" = {}
"omni.physx" = {}
"omni.physx.clashdetection.core" = {}

[[python.module]]
name = "isaacsim.util.clash_detection"

[[python.module]]
name = "isaacsim.util.clash_detection.tests"

[[test]]
dependencies=[
"omni.kit.test",
"omni.kit.property.bundle",
]

args = [
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
    '--/persistent/simulation/defaultMetersPerUnit = 1.0',
    '--/persistent/app/stage/upAxis = "Z"'
]