[package]
version = "3.5.2"
category = "Simulation"
title = "Gain Tuner"
description = "Gain Tuner for Articulation PD Gains"
authors = ["hmazhar@nvidia.com", "qwan@nvidia.com", "rgasoto@nvidia.com", "akissel@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot_setup.gain_tuner"
keywords = ["isaac", "physics", "analyze", "tune"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.experimental.prims" = {}
"isaacsim.gui.components" = {}
"isaacsim.robot.schema" = {}
"omni.kit.uiapp" = {}
"omni.kit.window.file" = {}
"omni.physics" = {}

[[python.module]]
name = "isaacsim.robot_setup.gain_tuner"

[[test]]

stdoutFailPatterns.exclude = [    
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
