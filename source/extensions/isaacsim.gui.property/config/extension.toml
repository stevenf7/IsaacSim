[package]
version = "1.5.1"
category = "Simulation"
title = "Isaac Sim Property Extensions"
description = "Adds Isaac Sim Specific Property Utils"
authors = ["hmazhar@nvidia.com", "ayushg@nvidia.com", "stevfeng@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.gui.property"
keywords = ["isaac", "property"]
