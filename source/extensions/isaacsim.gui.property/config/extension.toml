"omni.kit.uiapp" = {}
"omni.kit.window.property" = {}
"omni.usd" = {}

[[python.module]]
name = "isaacsim.gui.property"

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
