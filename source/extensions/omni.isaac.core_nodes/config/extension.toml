[core]
reloadable = true
order = 0

[package]
version = "0.12.0"
category = "Simulation"
title = "Isaac Sim Core OmniGraph Nodes"
description = "Core"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.core_nodes"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.isaac.core" = {}
"omni.replicator.core" = {}
"omni.graph" = {}

[[python.module]]
name = "omni.isaac.core_nodes"

[[python.module]]
name = "omni.isaac.core_nodes.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

[[test]]
stdoutFailPatterns.exclude = [
    "*Invalid Bundle object in Py_Bundle in getPrimPath*", # Per node tests won't have valid bundles
]
