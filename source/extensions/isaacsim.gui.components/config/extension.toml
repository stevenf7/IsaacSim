[package]
version = "1.0.13"
category = "Simulation"
title = "Isaac Sim UI Utilities"
description = "Core UI Elements for Isaac Sim"
authors = ["hmazhar@nvidia.com", "qwan@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.gui.components"
keywords = ["isaac", "ui",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.graph" = {}
"omni.graph.action" = {}
"omni.graph.visualization.nodes" = {}
"omni.kit.menu.utils" = {}
"omni.kit.pip_archive" = {} # pulls in pyperclip
"omni.kit.property.usd" = {}
"omni.kit.ui_test" = {}
"omni.kit.uiapp" = {}
"omni.kit.window.extensions" = {}
"omni.kit.window.filepicker" = {}
"omni.kit.window.property" = {}
"omni.physx" = {}

[[python.module]]
name = "isaacsim.gui.components"

[[python.module]]
name = "isaacsim.gui.components.tests"

[[test]]

dependencies = [
    "isaacsim.core.api",
    "isaacsim.core.utils",
    "isaacsim.storage.native",
    "omni.hydra.rtx",                       # "omni.hydra.pxr", Can we run and pass with Storm ?,
    "omni.kit.viewport.window",
]
args = [
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]