[package]
version = "3.4.0"
category = "Simulation"
title = "Robot Description Editor"
description = "Generates and edit Lula robot_description YAML files"
authors = ["hmazhar@nvidia.com", "arudich@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot_setup.xrdf_editor"
keywords = ["isaac", "collision spheres", "lula", "robot description"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.robot_motion.lula" = {}
"omni.kit.uiapp" = {}
"omni.physics" = {}
"omni.physics.physx" = {}

[[python.module]]
name = "isaacsim.robot_setup.xrdf_editor"

[[test]]
name = "startup"
dependencies = [
    "omni.isaac.ml_archive",
]

[[test]]
dependencies = [
    "omni.isaac.ml_archive",
]
stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
