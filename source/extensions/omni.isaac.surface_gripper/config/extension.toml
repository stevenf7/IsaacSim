[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "Isaac Sim Surface Gripper"
description = "Helper to model Suction and Distance based grippers"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.surface_gripper"
keywords = ["isaac", "physics", "inspect",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.isaac.dynamic_control" = {}
"omni.isaac.ui" = {}
"omni.isaac.utils" = {}

[[python.module]]
name = "omni.isaac.surface_gripper"

[[python.module]]
name = "omni.isaac.surface_gripper.tests"

[[python.module]]
name = "omni.isaac.surface_gripper.scripts.samples.surface_gripper"

[[test]]
args = ["--/exts/omni.kit.renderer.core/compatibilityMode=true"]