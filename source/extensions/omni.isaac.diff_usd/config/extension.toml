[core]
reloadable = true
order = 0

[package]
version = "1.0.0"
category = "Tool"
title = "Isaac Sim Diff USD"
description = "Compare the attributes of primitives."
authors = ["Robert Sitton <rsitton@nvidia.com>"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.diff_usd"
keywords = ["isaac", "diff", "tool"]
