[core]
reloadable = true
order = 0

[package]
version = "0.3.5"
category = "Simulation"
title = "Isaac Sim Core API (Prims)"
description = "The Core Prims extension provides a set of APIs to read and write state information to the different types of prims."
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.core.prims"
keywords = ["isaacsim", "core", "prims"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx.tensors" = {}
"omni.usd.schema.semantics" = {}
"omni.warp.core" = {}
"omni.isaac.core_archive" = {}
"omni.isaac.ml_archive" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.utils" = {}
"isaacsim.core.simulation_manager" = {}

# define the Python module that the extension provides
[[python.module]]
name = "isaacsim.core.prims"

# define the Python module for tests
[[python.module]]
name = "isaacsim.core.prims.tests"

[[test]]
timeout = 900
dependencies = [
    "omni.kit.test",
    "isaacsim.core.api",
]
