[package]
version = "2.2.0"
category = "Simulation"
title = "Generate Extension"
description = "UI tool for generating extension templates for different common workflows"
authors = ["hmazhar@nvidia.com", "qwan@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.examples.extension"
keywords = []
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.storage.native" = {}
"omni.kit.uiapp" = {}

[[python.module]]
name = "isaacsim.examples.extension"

[[test]]
name = "startup"
dependencies = [
    "omni.isaac.ml_archive",
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
