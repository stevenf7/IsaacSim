[package]
version = "1.0.2"
category = "Simulation"
title = "Isaac Sim RTX Sensor Simulation UI Components"
description = "Provides UI components for Isaac Sim RTX-based sensor simulation, eg. menu options."
authors = ["hmazhar@nvidia.com", "adevalla@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.sensors.rtx.ui"
keywords = ["isaac", "physics", "robotics", "ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.gui.components" = {}
"isaacsim.sensors.rtx" = {}

[[python.module]]
name = "isaacsim.sensors.rtx.ui"

[[test]]
timeout = 900
dependencies = [
    "omni.kit.test_helpers_gfx",
    "omni.kit.window.stage",
]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
'--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]