[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
title = "Isaac Sim Synthetic Data Workflow"
description = "End to end synthetic data workflow"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.synthetic_workflow"
keywords = ["isaac", "synthetic", "workflow"]
changelog = "docs/CHANGELOG.md"
category = "Simulation"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.syntheticdata" = {}
"omni.isaac.dr" = {}
"omni.isaac.pip_archive" = {}
"omni.isaac.synthetic_utils" = {}
"omni.isaac.utils" = {}
"omni.isaac.ui" = {}

[python.pipapi]
requirements = ["torch==1.9.1", "torchvision==0.10.1"]

[[python.module]]
name = "omni.isaac.synthetic_workflow"
