display_name = "Isaac Policy Based Robot Control Examples"

[package]
version = "5.2.9"
category = "Simulation"
title = "Reinforcement Learning Inference Example for Robots in Isaac Sim"
description = "The Policy Based Robot Control Examples extension provides utilities for deploying reinforcement learning policies in Isaac Sim, as well as locomotion examples for humanoid and quadruped robots."
authors = ["hmazhar@nvidia.com", "stevfeng@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.policy.examples"
keywords = ["isaac", "robot", "quadruped", "humanoid", "policy", "inference"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.experimental.prims" = {}
"isaacsim.core.experimental.utils" = {}
"isaacsim.examples.base" = {}
"isaacsim.examples.browser" = {}
"isaacsim.storage.native" = {}

[[python.module]]
name = "isaacsim.robot.policy.examples"

[[python.module]]
name = "isaacsim.robot.policy.examples.interactive.franka"

[[python.module]]
name = "isaacsim.robot.policy.examples.interactive.go2"

[[python.module]]
name = "isaacsim.robot.policy.examples.interactive.humanoid"

[[python.module]]
name = "isaacsim.robot.policy.examples.interactive.quadruped"

[[python.module]]
name = "isaacsim.robot.policy.examples.tests"
public = false

[[test]]
name = "startup"
args = [
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
]

[[test]]
name = "physx"
enabled = true
timeout = 900
dependencies = [
    "omni.isaac.ml_archive",
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/hydra/supportMultiTickRate=true",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/rendering/perSensorTickTlas=true",
    "--/rtx/reservedDescriptors=900000",
]
pythonTests.include = [
    "isaacsim.robot.policy.examples.tests.test_anymal*",
    "isaacsim.robot.policy.examples.tests.test_franka*",
    "isaacsim.robot.policy.examples.tests.test_go2*",
    "isaacsim.robot.policy.examples.tests.test_h1*",
    "isaacsim.robot.policy.examples.tests.test_spot*",
]
stdoutFailPatterns.exclude = [
    '*[Error] [carb] [Plugin: omni.sensors.nv.lidar.ext.plugin] Dependency: [omni::sensors::lidar::IGenericModelOutputIOFactory v0.1] failed to be resolved.*', # feature not included in Windows    
    '*[Error] [isaacsim.core.nodes.impl.extension] Could not register node templates failed to register node template. Connection template name rpFabricTime is not in the registry*',
    '*The NumPy module was reloaded*',
]

[[test]]
name = "newton"
timeout = 1800
dependencies = [
    "isaacsim.physics.newton",
    "isaacsim.physics.newton.tensors",
    "isaacsim.test.utils", # Used to suppress NumPy coverage errors
    "omni.isaac.ml_archive"
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/hydra/supportMultiTickRate=true",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/rendering/perSensorTickTlas=true",
    "--/rtx/reservedDescriptors=900000",
    ### Extension specific args
    "--/exts/isaacsim.core.simulation_manager/default_engine=newton",
]
pythonTests.include = [
    # "isaacsim.robot.policy.examples.tests.test_anymal*",
    # "isaacsim.robot.policy.examples.tests.test_franka*", # TODO: bring Franka policy for Newton
    "isaacsim.robot.policy.examples.tests.test_go2*",
    "isaacsim.robot.policy.examples.tests.test_h1*",
    # "isaacsim.robot.policy.examples.tests.test_spot*",
]
stdoutFailPatterns.exclude = [
    '*[Error] [carb] [Plugin: omni.sensors.nv.lidar.ext.plugin] Dependency: [omni::sensors::lidar::IGenericModelOutputIOFactory v0.1] failed to be resolved.*',
    '*[Error] [isaacsim.core.nodes.impl.extension] Could not register node templates failed to register node template. Connection template name rpFabricTime is not in the registry*',
    '*The NumPy module was reloaded*',
    '*Error while parsing function*',
    '*UserWarning: NarrowPhase running on CPU: mesh-mesh contacts will be skipped*'
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
