display_name = "Isaac Policy Based Robot Control Examples"

[package]
version = "3.0.0"
category = "Simulation"
title = "Isaac Quadruped Robot"
description = "Simulation for legged robots"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.policy.examples"
keywords = ["isaac", "robot", "quadruped"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.sensors.physics" = {}
"isaacsim.core.nodes" = {}
"omni.isaac.nucleus" = {}

[[python.module]]
name = "isaacsim.robot.policy.examples"

[[python.module]]
name = "isaacsim.robot.policy.examples.tests"
public = false

[[test]]
timeout = 1200
stdoutFailPatterns.exclude = [
    '*[Error] [carb] [Plugin: omni.sensors.nv.lidar.ext.plugin] Dependency: [omni::sensors::lidar::IGenericModelOutputIOFactory v0.1] failed to be resolved.*', # feature not included in Windows
]
