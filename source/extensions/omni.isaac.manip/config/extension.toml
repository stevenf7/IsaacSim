[core]
reloadable = true
order = 0

[package]
version = "0.1.3"
category = "Simulation"
title = "Isaac Sim Manip"
description = "Utilities for joystick control"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.manip"
keywords = ["isaac", "joystick"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.test" = {}
"omni.usd.libs" = {}
"omni.ui" = {}

[[python.module]]
name = "omni.isaac.manip"

[[python.module]]
name = "omni.isaac.manip.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

