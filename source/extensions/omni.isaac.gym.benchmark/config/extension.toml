[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "GymBenchmark"
description = "This extension provides benchmarking for gym environments"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.gym.benchmark"
keywords = ["isaac", "gym", "benchmark", "analyze"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.graph" = {}
"omni.graph.tools" = {}
"omni.graph.ui" = {}
"omni.isaac.core_archive" = {} # pulls in nvsmi
"omni.isaac.range_sensor" = {}
"omni.isaac.sensor" = {}
"omni.isaac.wheeled_robots" = {}
"omni.hydra.rtx"= {}
"omni.kit.viewport.utility"= {}
"omni.kit.viewport.window"= {}
"omni.kit.primitive.mesh"= {}
"omni.kit.material.library"= {}

"omni.isaac.cloner" = {}
"omni.isaac.kit" = {}
"omni.isaac.gym" = {}
"omni.isaac.ui" = {}
"omni.isaac.benchmark.services" = {}

[[python.module]]
name = "omni.isaac.gym.benchmark"

[[python.module]]
name = "omni.isaac.gym.benchmark.tests"

[settings]
exts."omni.isaac.benchmark.services".metrics.nvdataflow_default_test_suite_name = "Isaac Sim Gym Benchmarks"
# uncomment and set this to output metrics to a specific folder
# exts."omni.isaac.benchmark.services".metrics.metrics_output_folder=""
[[test]]

# these are not cached
dependencies = [
    "OmniIsaacGymEnvs"
]

timeout=36000
args = ["--no-window", "--allow-root", "--/app/fastShutdown=1", "--vulkan", "--/physics/cudaDevice=0"] # we can use fast shutdown because metrics are not uploaded

stdoutFailPatterns.exclude = [
    "*NGX EvaluateFeature failed*", # Ada multi gpu doesn't support this yet
    "*Failed to evaluate DLSS feature*", # Ada multi gpu doesn't support this yet
]