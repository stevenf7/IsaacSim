[core]
reloadable = true
order = 0

[package]
version = "0.2.0"
category = "Simulation"
title = "Isaac Sim Core"
description = "Core"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.core"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.isaac.dynamic_control" = {}
"omni.isaac.pip_archive" = {} # scipy
"omni.isaac.lula" = {}
"omni.kit.window.viewport" = {}
"omni.kit.uiapp" = {}


[[python.module]]
name = "omni.isaac.core"

[[python.module]]
name = "omni.isaac.core.tests"

[[test]]
dependencies = ["omni.kit.primitive.mesh"]

[settings]
isaac.nucleus.default = "omniverse://localhost"
