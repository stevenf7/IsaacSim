[core]
reloadable = true
order = 0

[package]
version = "1.6.1"
category = "Simulation"
title = "Isaac Sim Isaac Sensor Simulation"
description = "Support physics based sensors, such as contact sensors and imu sensors"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.isaac_sensor"
keywords = ["isaac", "physics", "robotics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.physx" = {}
"omni.timeline" = {} # Needed for simulation to occur
"omni.kit.numpy.common" = {}
"omni.kit.pip_archive" = {} # pulls in numpy
"omni.isaac.ui" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.usd.schema.isaac" = {}
"omni.isaac.debug_draw" = {}
"omni.graph" = {}
"omni.graph.action" = {}
"omni.syntheticdata" = {}
"omni.usd" = {} # needed for call to add aov

[[python.module]]
name = "omni.isaac.isaac_sensor"

[[python.module]]
name = "omni.isaac.isaac_sensor.tests"
public = false

[[python.module]]
name = "omni.isaac.isaac_sensor.scripts.samples.contact_sensor"

[[python.module]]
name = "omni.isaac.isaac_sensor.scripts.samples.imu_sensor"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[test]]
dependencies = [
    "omni.hydra.rtx",                       # "omni.hydra.pxr", Can we run and pass with Storm ?
    "omni.kit.viewport.utility",
    "omni.kit.viewport.window",
]