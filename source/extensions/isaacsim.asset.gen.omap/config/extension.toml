[core]
reloadable = true
order = 0

[package]
version = "2.0.7"
category = "Simulation"
title = "Isaac Sim Occupancy Map"
description = "The Isaac Sim Occupancy Map extension provides tools to generate occupancy maps for a Scene"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.asset.gen.omap"
keywords = ["isaac", "occupancy map"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.util.debug_draw" = {}
"omni.kit.pip_archive" = {}
"omni.physx" = {}

[[python.module]]
name = "isaacsim.asset.gen.omap"

[[python.module]]
name = "isaacsim.asset.gen.omap.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[test]]
dependencies = [
    "isaacsim.storage.native",
    "isaacsim.core.utils"
]

args = [
    '--/persistent/isaac/asset_root/default = "https://omniverse-content-staging.s3-us-west-2.amazonaws.com/Assets/Isaac/4.5"',
]

timeout = 900
