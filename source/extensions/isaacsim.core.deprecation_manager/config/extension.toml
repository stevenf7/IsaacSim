    { deprecated = "omni.isaac.core_nodes.IsaacSimulationGate", new = "isaacsim.core.nodes.IsaacSimulationGate" },
    { deprecated = "omni.isaac.core_nodes.IsaacTimeSplitter", new = "isaacsim.core.nodes.IsaacTimeSplitter" },
    { deprecated = "omni.isaac.core_nodes.OnPhysicsStep", new = "isaacsim.core.nodes.OnPhysicsStep" },
