    { deprecated = "omni.isaac.sensor.IsaacReadRTXLidarData", new = "isaacsim.sensors.rtx.IsaacReadRTXLidarData" },
    { deprecated = "omni.replicator.isaac", new = "isaacsim.replicator" },
