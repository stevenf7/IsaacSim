[package]
version = "0.1.0"
category = "Simulation"
title = "PINK Examples"
description = "Examples for using the PINK inverse kinematics library under motion generation."
authors = ["ssulkunte@nvidia.com", "hmazhar@nvidia.com"]
keywords = ["pink", "motion", "generation", "inverse", "kinematics", "ik", "pinocchio"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"isaacsim.core.experimental.objects" = {}
"isaacsim.core.experimental.prims" = {}
"isaacsim.core.experimental.utils" = {}
"isaacsim.core.rendering_manager" = {}
"isaacsim.core.simulation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.robot_motion.experimental.motion_generation" = {}
"isaacsim.robot_motion.pink" = {}
"isaacsim.storage.native" = {}
"omni.kit.context_menu" = {}
"omni.timeline" = {}
"omni.ui" = {}
"omni.usd" = {}

[[python.module]]
name = "isaacsim.robot_motion.pink.examples.ik_controller"

[[python.module]]
name = "isaacsim.robot_motion.pink.examples.multi_task"

[[python.module]]
name = "isaacsim.robot_motion.pink.examples.tests"

[[test]]
name = "startup"
enabled = true
dependencies = []

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

"filter:platform"."windows-x86_64".pythonTests.exclude = [
    "*",
]

[[test]]
timeout = 900
dependencies = ["isaacsim.test.utils"]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--enable",
    "isaacsim.robot_motion.pink.examples",
]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
    '*SyntheticData extension needs at least a stageFrameHistoryCount*',
]

"filter:platform"."windows-x86_64".pythonTests.exclude = [
    "*",
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
