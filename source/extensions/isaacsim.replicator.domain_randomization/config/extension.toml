[core]
reloadable = true
order = 0

[package]
version = "1.0.0"
category = "SyntheticData"
title = "Isaac Sim Replicator Domain Randomization"
description="Domain Randomization for Isaac Sim Replicator"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.replicator.domain_randomization"
keywords = ["Synthetic", "Data", "Randomization", "Generator", "Domain Randomization", "DR"]
changelog = "docs/CHANGELOG.md"
readme  = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"

# Build separate extensions for Windows and Linux so appropriate libraries are bundled
writeTarget.platform = true


[dependencies]
"omni.graph" = {}
"omni.graph.core" = {}
"omni.replicator.core" = {}
"isaacsim.core.api" = {}
"isaacsim.core.prims" = {}

[[python.module]]
name = "isaacsim.replicator.domain_randomization"

# Watch the .ogn files for hot reloading (only works for Python files)
[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

[[test]]
dependencies = [
    "isaacsim.storage.native",
    "omni.kit.test",
    "omni.physics.tensors",
]