[package]
version = "1.0.6"
category = "SyntheticData"
title = "Isaac Sim Replicator Domain Randomization"
description="The extension provides various Domain Randomization scripts and OmniGraph nodes for randomizing simulation environments."
authors = ["hmazhar@nvidia.com", "ahaidu@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.replicator.domain_randomization"
keywords = ["Synthetic", "Data", "Randomization", "Generator", "Domain Randomization", "DR"]
changelog = "docs/CHANGELOG.md"
readme  = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.platform = true # Build separate extensions for Windows and Linux so appropriate libraries are bundled

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.core.prims" = {}
"omni.graph" = {}
"omni.graph.core" = {}
"omni.replicator.core" = {}

[[python.module]]
name = "isaacsim.replicator.domain_randomization"

# Watch the .ogn files for hot reloading (only works for Python files)
[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

[[test]]
dependencies = [
]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
'--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]