[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "Isaac Sim Occupancy Map"
description = "2D Occupancy Map Generation"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.occupancy_map"
keywords = ["isaac", "occupancy map"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.physx" = {} 
"omni.isaac.debug_draw" = {}
"omni.isaac.utils" = {}
"omni.kit.window.viewport" = {}
"omni.kit.pip_archive" = {} # pulls in pillow
"omni.isaac.ui" = {}

[[python.module]]
name = "omni.isaac.occupancy_map"

[[python.module]]
name = "omni.isaac.occupancy_map.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false
