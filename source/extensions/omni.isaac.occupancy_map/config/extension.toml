[core]
reloadable = true
order = 0

[package]
version = "1.0.3"
category = "Simulation"
title = "Block Worlds"
description = "Generate 3D block worlds from 2D occupancy maps"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.block_world"
keywords = ["isaac", "block world"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"isaacsim.util.debug_draw" = {}
"omni.isaac.block_world" = {}
"omni.isaac.core" = {}
"omni.isaac.ui" = {}
"omni.kit.pip_archive" = {} # pulls in pillow
"omni.kit.uiapp" = {}
"omni.kit.viewport.window" = {}
"omni.physx" = {}

[[python.module]]
name = "omni.isaac.occupancy_map"

[[python.module]]
name = "omni.isaac.occupancy_map.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[test]]
dependencies = [
    "omni.isaac.nucleus" # test only
]
timeout = 960
