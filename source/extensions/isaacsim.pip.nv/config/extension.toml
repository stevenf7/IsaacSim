[core]
# Load as early as possible
order = -1000
reloadable = false

[package]
version = "1.0.0"
category = "Internal"
title = "NVIDIA CUDA Pip Archive"
description = "Pip packages for the NVIDIA CUDA runtime libraries required by PyTorch"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.pip.nv"
keywords = ["isaac", "pip", "nvidia", "cuda"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
writeTarget.platform = true # pip prebundle makes this extension os specific
writeTarget.python = true

[dependencies]
"omni.kit.pip_archive" = {} # import the base kit python archive

[[python.module]]
path = "pip_prebundle"

# That is empty module, added here only to make tests discoverable in test run
[[python.module]]
name = "isaacsim.pip.nv"

[[test]]
stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]
