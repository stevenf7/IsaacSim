[core]
reloadable = true
order = 0

[package]
version = "0.6.0"
category = "Simulation"
title = "Benchmark"
description = "This extension provides benchmarking utilities"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.benchmarks"
keywords = ["isaac", "benchmark", "analyze"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.graph" = {}
"omni.graph.tools" = {}
"omni.graph.ui" = {}
"omni.isaac.core_archive" = {} # pulls in nvsmi
"omni.isaac.range_sensor" = {}
"omni.isaac.sensor" = {}
"omni.isaac.wheeled_robots" = {}
# "omni.isaac.ros_bridge" = {} #disabled until we enable ROS benchmarks again, not supported on windows
"omni.kit.testing.services" = {}
"omni.kit.nvdf.telemetry" = {}
# "omni.kit.usdstats" = {}
"omni.hydra.rtx"= {}
"omni.kit.viewport.utility"= {}
"omni.kit.viewport.window"= {}
"omni.kit.primitive.mesh"= {}
"omni.kit.material.library"= {}


[[python.module]]
name = "omni.isaac.benchmarks"

[[python.module]]
name = "omni.isaac.benchmarks.tests"

[python.pipapi]
requirements = []
use_online_index = true

[settings]
exts."omni.isaac.benchmarks".metrics.nvdataflow_default_test_suite_name = "Isaac Sim Benchmarks"
# uncomment and set this to output metrics to a specific folder
# exts."omni.isaac.benchmarks".metrics.metrics_output_folder=""
[[test]]

# these are not cached
dependencies = [
    # "omni.kit.testing.metrics_uploader",
    "omni.kit.testing.services",
    "omni.kit.nvdf.telemetry",
#    "omni.kit.usdstats"
]
timeout=4000
args = ["--/app/fastShutdown=1"] # we can use fast shutdown because metrics are not uploaded