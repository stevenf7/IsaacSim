[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "Isaac Sim Layout Manager"
description = "Layout Manager for Isaac Sim"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.ui"
keywords = ["isaac", "ui",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.ui" = {}
"omni.kit.context_menu" = {}
"omni.kit.stage_templates" = {}
"omni.kit.window.title" = {}
"omni.kit.quicklayout" = {}

# Isaac Sim Utilities
"omni.isaac.robot_engine_bridge" = {}
"omni.isaac.samples" = {}
"omni.isaac.synthetic_utils" = {}
"omni.isaac.urdf" = {}
"omni.isaac.utils" = {}
"omni.isaac.physics_inspector" = {}
"omni.isaac.merge_mesh" = {}
"omni.isaac.physics_utilities" = {}

[[python.module]]
name = "omni.isaac.layout_manager"

[[python.module]]
name = "omni.isaac.layout_manager.tests"

[[test]]
stdoutFailPatterns.exclude = [
    "*extension object is still alive, something holds a reference on it*", # exclude warning as failure
]
