[package]
version = "3.0.0"
category = "Simulation"
title = "Isaac Sim Debug Drawing"
description = "Persistent Debug Drawing Helpers"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.util.debug_draw"
keywords = ["isaac", "physics", "inspect",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

# Other extensions that must be loaded before this one
[dependencies]
"isaacsim.core.deprecation_manager" = {}
"omni.graph" = {}
"omni.graph.tools" = {}
"omni.hydra.rtx" = {}
"omni.kit.async_engine" = {}
"omni.kit.renderer.core" = {}
"omni.usd" = {}

[[python.module]]
name = "isaacsim.util.debug_draw"

[[python.module]]
name = "isaacsim.util.debug_draw.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

# Watch the .ogn files for hot reloading (only for Python files)
[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

[[test]]
stdoutFailPatterns.exclude = [
 "*[Error] [omni.graph.core.plugin] /TestGraph/Template_isaacsim_util_debug_draw_IsaacXPrimAxisVisualizer: [/TestGraph] Omnigraph Error: no input prim found for visualization*",
 "*[Error] [omni.graph.core.plugin] /TestGraph/Template_isaacsim_util_debug_draw_IsaacXPrimRadiusVisualizer: [/TestGraph] Omnigraph Error: no input prim found for visualization*"

]
