[core]
reloadable = true
order = 0

[package]
version = "1.0.0"
category = "Simulation"
title = "Isaac Sim URDF Importer"
description = "URDF Importer for Isaac Sim"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.urdf"
keywords = ["isaac", "urdf", "import"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]


[[python.module]]
name = "omni.isaac.urdf"


[[test]]
dependencies = ["omni.kit.test"]

stdoutFailPatterns.exclude = [
    "*extension object is still alive, something holds a reference on it*", # exclude warning as failure
]
