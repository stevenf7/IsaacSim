[package]
version = "2.8.0"
category = "Internal"
title = "Isaac Sim Common Includes"
description = "Extension containing common isaac sim headers"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.core.includes"
keywords = ["isaac", "core", "includes"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

# define the C++ plugins that the extension provides
[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[test]]
enabled = true
dependencies = [
    "omni.kit.test",
]
cppTests.libraries = [
    "bin/${lib_prefix}isaacsim.core.includes.tests${lib_ext}",
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
