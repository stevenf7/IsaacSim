[core]
reloadable = true
order = 0

[package]
version = "1.3.0"
category = "Simulation"
title = "Isaac Sim Dynamic Control"
description = "Dynamic Control"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.dynamic_control"
keywords = ["isaac", "physics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.timeline" = {} # Needed for simulation to occur
"omni.kit.numpy.common" = {}
"omni.usd.core" = {}
"omni.usd.libs" = {}
"omni.kit.commands" = {}
"omni.kit.pip_archive" = {} # pulls in numpy
"omni.kit.test" = {}
"omni.usd" = {}

[[python.module]]
name = "omni.isaac.dynamic_control"

[[python.module]]
name = "omni.isaac.dynamic_control.tests"


[[native.plugin]]
path = "bin/*.plugin"
recursive = false

