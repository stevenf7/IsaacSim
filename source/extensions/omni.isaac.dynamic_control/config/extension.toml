[core]
reloadable = true
order = 0

[package]
version = "0.1.4"
category = "Simulation"
title = "Isaac Sim Dynamic Control"
description = "Dynamic Control"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.dynamic_control"
keywords = ["isaac", "physics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.physx" = {}
"omni.usdphysics" = {}
"omni.kit.window.toolbar" = {} # Needed for simulation to occur
"omni.kit.numpy.common" = {}
"omni.kit.menu.utils" = {}
"omni.kit.window.viewport" = {}
# "omni.graph.core" = {}
"omni.usd" = {}
"omni.kit.pip_archive" = {} # pulls in numpy
"omni.isaac.ui" = {}

[[python.module]]
name = "omni.isaac.dynamic_control"

[[python.module]]
name = "omni.isaac.dynamic_control.tests"

[[python.module]]
name = "omni.isaac.dynamic_control.scripts.samples.read_articulations"

[[python.module]]
name = "omni.isaac.dynamic_control.scripts.samples.joint_controller"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false
