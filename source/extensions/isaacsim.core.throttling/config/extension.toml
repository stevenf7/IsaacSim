[package]
version = "2.0.4"
category = "Other"
title = "Isaac Sim Throlling"
description = "Control throttling behaviors for isaac sim"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.core.throttling"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.window.preferences" = {}

[[python.module]]
name = "isaacsim.core.throttling"

[[python.module]]
name = "isaacsim.core.throttling.tests"

[[test]]
dependencies = ["omni.kit.test", "omni.timeline"]
args = ["--/rtx/ecoMode/enabled=True"]