[cloner]
reloadable = true
order = 0

[package]
version = "1.3.2"
category = "Simulation"
title = "Isaac Sim Cloner"
description = "The Cloner extension provides a set of APIs to clone prims and environments in an efficient way as well as filtering the collisions across the clones if needed."
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.core.cloner"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"omni.usd" = {}
"omni.usd.libs" = {}
"omni.physx" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.simulation_manager" = {}
"omni.isaac.ml_archive" = {}  # needed for torch

[[python.module]]
name = "isaacsim.core.cloner"

[[test]]
dependencies = [
    "isaacsim.core.api",
    "isaacsim.storage.native",
]
