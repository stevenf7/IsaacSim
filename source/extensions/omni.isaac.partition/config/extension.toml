[core]
reloadable = true
order = 0

[package]
version = "1.0.0"
category = "Simulation"
title = "Isaac Sim Partition Generator"
description = "Generates Partitioned Sub-Levels"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/partition_extension"
keywords = ["isaac", "partition","export"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.graph.core" = {}
"omni.isaac.core" = {}
"omni.isaac.ui" = {}
"omni.kit.test" = {}
"omni.kit.uiapp" = {}
"omni.kit.window.file_exporter" = {}
"omni.kit.window.filepicker" = {}
"omni.kit.window.content_browser" = {}
"omni.kit.window.preferences" = {}
"omni.kit.widget.settings" = {}
"omni.ui" = {}

[[python.module]]
name = "omni.isaac.partition"

[[python.module]]
name = "omni.isaac.partition.tests"

[[native.plugin]]
path = "bin/omni.isaac.partition.plugin"
recursive = false
