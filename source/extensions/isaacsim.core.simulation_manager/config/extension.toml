[package]
version = "1.14.8"
category = "Simulation"
title = "Isaac Sim Core Simulation Manager"
description = "The Core Simulation Manager extension provides a set of APIs to control and query the simulation's state and the different callbacks available."
authors = ["aserranomuno@nvidia.com"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.experimental.utils" = {}
"omni.physics" = {}
"omni.physics.physx" = {}
"omni.physics.stageupdate" = {}
"omni.physx.tensors" = {}
"omni.usd.schema.mujoco" = {}
"omni.usd.schema.newton" = {}
"omni.usdex.libs" = {}

[[python.module]]
name = "isaacsim.core.simulation_manager"

# define the Python module for tests
[[python.module]]
name = "isaacsim.core.simulation_manager.tests"

# define the C++ plugins that the extension provides
[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[settings]
# Default physics engine to use (`physx` or `newton`).
exts."isaacsim.core.simulation_manager".default_engine = "physx"

[[test]]
name = "multitick_rendering"
timeout = 900
dependencies = [
    "isaacsim.core.utils",
    "isaacsim.test.docstring",
    "isaacsim.test.utils",
    "omni.hydra.scene_delegate", # required for fabric time to update,
    "omni.isaac.ml_archive",
    "omni.kit.test",
    "omni.physx.ui",
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/reservedDescriptors=900000",
    # Multi-tick rendering must be enabled at startup: the rtx.hydra plugin
    # routes render calls through multiTickRate_* interfaces only when this
    # setting is true at initialization time.
    "--/rtx/hydra/supportMultiTickRate=true",
]
pythonTests.include = [
    "isaacsim.core.simulation_manager.tests.test_simulation_manager.TestSimulationManagerMultiTickRendering*",
]

[[test]]
name = "physx"
timeout = 900
dependencies = [
    "isaacsim.core.utils",
    "isaacsim.test.docstring",
    "omni.hydra.scene_delegate", # required for fabric time to update,
    "omni.isaac.ml_archive",
    "omni.kit.test",
    "omni.physx.ui"
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/reservedDescriptors=900000",
]

stdoutFailPatterns.exclude = [
    "*[Error] [isaacsim.core.simulation_manager.impl.simulation_manager] Engine 'invalid_engine' not found. Available: PhysX*",
]

pythonTests.exclude = [
    # Multi-tick rendering requires /rtx/hydra/supportMultiTickRate to be set at
    # startup; see the "multitick_rendering" test block.
    "isaacsim.core.simulation_manager.tests.test_simulation_manager.TestSimulationManagerMultiTickRendering*",
]

[[test]]
name = "newton"
timeout = 900
enabled = true
dependencies = [
    "isaacsim.core.utils",
    "isaacsim.physics.newton",
    "isaacsim.physics.newton.tensors",
    "isaacsim.test.docstring",
    "isaacsim.test.utils", # Used to suppress NumPy coverage errors
    "omni.hydra.scene_delegate", # required for fabric time to update,
    "omni.isaac.ml_archive",
    "omni.kit.test",
    "omni.physx.ui"
]
args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/reservedDescriptors=900000",
    ### Extension specific args
    "--/exts/isaacsim.core.simulation_manager/default_engine=newton",
]
pythonTests.include = [
    "isaacsim.core.simulation_manager.tests.test_docstrings*",
    "isaacsim.core.simulation_manager.tests.test_extension*",
    "isaacsim.core.simulation_manager.tests.test_simulation_manager*",
    "isaacsim.core.simulation_manager.tests.test_time_sample_storage*",
    "isaacsim.core.simulation_manager.tests.test_physics_scene.TestPhysicsScene*",
    "isaacsim.core.simulation_manager.tests.test_physics_scene.TestNewtonMjcScene*",
]
pythonTests.exclude = [
    # Multi-tick rendering requires /rtx/hydra/supportMultiTickRate to be set at
    # startup; see the "multitick_rendering" test block.
    "isaacsim.core.simulation_manager.tests.test_simulation_manager.TestSimulationManagerMultiTickRendering*",
]
stdoutFailPatterns.exclude = [
    "*[Error] [isaacsim.core.simulation_manager.impl.simulation_manager] Engine 'invalid_engine' not found. Available: PhysX*",
