[core]
reloadable = true
order = 0

[package]
version = "1.1.1"
category = "Simulation"
title = "ROS Bridge"
description = "ROS Bridge"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.ros_bridge"
keywords = ["isaac", "ROS"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.uiapp" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.range_sensor" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.syntheticdata" = {}
"omni.replicator.core" = {}
"omni.usd.schema.isaac" = {}
"omni.kit.pip_archive" = {} # Pull in pip_archive to make sure psutil is found and not installed
"omni.graph" = {}
"omni.graph.tools" = {}
"omni.kit.usd_undo" = {}
"omni.usd" = {}
"omni.kit.async_engine" = {}

[[python.module]]
name = "omni.isaac.ros_bridge"

[[python.module]]
name = "omni.isaac.rospy"

[[python.module]]
name = "omni.isaac.ros_bridge.tests"
public = false

#[[python.module]]
#name = "omni.isaac.ros_bridge.ogn.tests"

[[python.module]]
name = "omni.isaac.ros_bridge.scripts.samples.ros_samples"

[[python.module]]
name = "omni.isaac.ros_bridge.scripts.samples.ros_moveit_sample"

[[native.plugin]]
path = "bin/omni.isaac.ros_bridge.plugin"
recursive = false

[fswatcher.paths]
exclude = ["*/noetic"]

[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

[settings]
exts."omni.isaac.ros_bridge".nodeName = "OmniIsaacRosBridge"
exts."omni.isaac.ros_bridge".useSimTime = true
exts."omni.isaac.ros_bridge".usePhysicsStepSimTime = false

[[test]]
stdoutFailPatterns.exclude = [
    "*WARNING: cannot load logging configuration file*", # exclude warning as failure
]