[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "ROS Bridge"
description = "ROS Bridge"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.ros_bridge"
keywords = ["isaac", "ROS"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.uiapp" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.range_sensor" = {}
"omni.syntheticdata" = {}
"omni.isaac.utils" = {}
"omni.usd.schema.isaac" = {}
"omni.isaac.ros_bridge_ui" = {}
"omni.kit.pip_archive" = {} # Pull in pip_archive to make sure psutil is found and not installed

[[python.module]]
name = "omni.isaac.ros_bridge"

[[python.module]]
name = "omni.isaac.rospy"

[[python.module]]
name = "omni.isaac.ros_bridge.tests"
public = false

[[python.module]]
name = "omni.isaac.ros_bridge.scripts.samples.rostopics"

[[python.module]]
name = "omni.isaac.ros_bridge.scripts.samples.rosservices"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[fswatcher.paths]
exclude = ["*/noetic"]

[settings]
exts."omni.isaac.ros_bridge".nodeName = "OmniIsaacRosBridge"
exts."omni.isaac.ros_bridge".useSimTime = true