[package]
version = "1.0.6"
category = "example"
title = "Manipulators Examples"
description = "examples of manipulators and grippers"
authors = ["hmazhar@nvidia.com", "qwan@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.manipulators.examples"
keywords = ["manipulators","grippers"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.robot.manipulators" = {}
"isaacsim.robot_motion.motion_generation" = {}
"isaacsim.storage.native" = {}

[[python.module]]
name = "isaacsim.robot.manipulators.examples"

[[test]]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
'--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]