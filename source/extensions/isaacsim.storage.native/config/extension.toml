[core]
reloadable = true
order = 0

[package]
version = "1.0.9"
category = "Simulation"
title = "Isaac Sim Native Storage"
description = "Isaac Sim Native Storage"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.storage.native"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.version" = {}
"omni.client" = {}

[[python.module]]
name = "isaacsim.storage.native"

[[python.module]]
name = "isaacsim.storage.native.tests"

[[python.module]]
name = "isaacsim.storage.native.tests"

[[python.module]]
name = "isaacsim.storage.native.tests"

[settings]
persistent.isaac.asset_root.default = "https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/4.5"
persistent.isaac.asset_root.timeout = 5.0

[[python.module]]
name = "isaacsim.storage.native.tests"

[[test]]
dependencies = [
    "omni.kit.test"
]
args = [
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
]
timeout = 900
