joint_states_topic: /robot/joint_states
joint_limit_buffers: [.01, .03, .01, .01, .01, .01]

external_commands_listener:
    topic_ns: /external/commands/cspace
    activation_rate: 2.  # Activate in .5 seconds
    staleness_timeout: .1
    monitor_rate_hz: 100.

robot_commander_service:
    publication_rate_hz: 100.
    partial_pose_targets:
        version: 3

backend_command_topic: /backend/command
rmp_params_ns: /rmp
param_status_pub_rate_hz: 30.
remote_rmps:
    activate: false # If true, ignores target_rmp entry and expected remote eval target rmps.
    timeout: .3
rmp_params:
    cspace_target_rmp:
        metric_scalar: 50.
        position_gain: 100.
        damping_gain: 50.
        robust_position_term_thresh: .5
        inertia: 1.
    cspace_trajectory_rmp:
        p_gain: 80.
        d_gain: 10.
        ff_gain: .25
        weight: 50.
    cspace_affine_rmp:
        final_handover_time_std_dev: .25
        weight: 2000.
    joint_limit_rmp:
        metric_scalar: 1000.
        metric_length_scale: .01
        metric_exploder_eps: 1e-3
        metric_velocity_gate_length_scale: .01
        accel_damper_gain: 200.
        accel_potential_gain: 1.
        accel_potential_exploder_length_scale: .1
        accel_potential_exploder_eps: 1e-2
    joint_velocity_cap_rmp:
        max_velocity: 2.15
        velocity_damping_region: 0.5
        damping_gain: 300.0
        metric_weight: 100.0
    target_rmp:
        accel_p_gain: 80.
        #accel_d_gain: 70.  # Was this
        #accel_d_gain: 100.
        accel_d_gain: 120.
        accel_norm_eps: .075
        metric_alpha_length_scale: .05
        #min_metric_alpha: .03
        min_metric_alpha: .01
        max_metric_scalar: 10000
        #min_metric_scalar: 5000
        min_metric_scalar: 2500
        proximity_metric_boost_scalar: 20.
        proximity_metric_boost_length_scale: .02
        accept_user_weights: false
    axis_target_rmp:
        accel_p_gain: 200.
        accel_d_gain: 40.  # Was this
        #accel_d_gain: 100.
        #accel_d_gain: 80. # nov 21
        #accel_d_gain: 70.
        #metric_scalar: 100 # A little stiffer
        metric_scalar: 10
        proximity_metric_boost_scalar: 3000.
        #proximity_metric_boost_length_scale: .02
        #proximity_metric_boost_length_scale: .05 # Earlier videos were with this
        proximity_metric_boost_length_scale: .05
        accept_user_weights: false
    collision_rmp:
        damping_gain: 50.
        damping_std_dev: .04
        damping_robustness_eps: 1e-2
        damping_velocity_gate_length_scale: .01
        repulsion_gain: 1200.
        repulsion_std_dev: .01
        metric_modulation_radius: .5
        metric_scalar: 10000.  # Real value should be this.
        #metric_scalar: 0.  # Turns off collision avoidance.
        metric_exploder_std_dev: .02
        metric_exploder_eps: .001
    damping_rmp:
        accel_d_gain: 30.
        metric_scalar: 50.
        inertia: 100.
        #inertia: 3000.
        #inertia: 6000.
        #inertia: 36000.

canonical_resolve:
    #max_acceleration_norm: 5.
    #max_acceleration_norm: 10.
    #max_acceleration_norm: 20.
    max_acceleration_norm: 50.
    #max_acceleration_norm: 3.
    projection_tolerance: .01
    verbose: false

control_rate: 60
integrations_per_cycle: 2

use_qdd_smoothing: true
qdd_smoothing_epsilon_target: .01
seconds_to_qdd_smoothing_epsilon_target: .1
suppress_out_of_synch_error: true
initial_time_scalar: 1.0  # When running on physical robot, start with 2.0

max_abs_acceleration: 10. # For the steady commander
# max_abs_acceleration: 10. # For the steady commander

collision_suppression_activation_rate: .1
collision_suppression_heartbeat_timeout: .3

body_cylinders:
    - name: base_stem
      pt1: [0,0,.333]
      pt2: [0,0,0.]
      radius: .05
    - name: base_tee
      pt1: [0,0,.333]
      pt2: [0,0,.333]
      radius: .15


# Each arm is approx. 1m from (arm) base to gripper center.
# .1661 between links (approx .15)
body_collision_controllers:
    - name: base_link
      #radius: .01
      radius: .08
    - name: shoulder_link
      #radius: .01
      radius: .08
    - name: upper_arm_link
      #radius: .01
      radius: .05
    - name: forearm_link
      #radius: .01
      radius: .05
    - name: wrist_1_link
      #radius: .01
      radius: .03
    - name: wrist_2_link
      #radius: .01
      radius: .03
    - name: wrist_3_link
      #radius: .01
      radius: .02
    # - name: ee_link
    #   #radius: .01
    #   radius: .05

primitive_decomposition:
    topic: /rmp/primitive_decompositon
    arm_collision_obstacles:
        - name: upper_arm
          segment: [shoulder_link, forearm_link]
          radius: .15
        - name: lower_arm
          segment: [upper_arm_link, wrist_1_link]
          radius: .15
        - name: hand
          segment: [wrist_1_link, wrist_3_link]
          radius: .05
