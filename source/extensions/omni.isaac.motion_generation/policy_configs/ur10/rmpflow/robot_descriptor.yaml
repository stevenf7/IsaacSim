# The robot descriptor defines the generalized coordinates and how to map those
# to the underlying URDF dofs.

api_version: 1.0

# Defines the generalized coordinates. Each generalized coordinate is assume
# to have an entry in the URDF, except when otherwise specified below under
# cspace_urdf_bridge
cspace: 
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint
    # - panda_joint7

root_link: world
# root_link: base_link
# subtree_root_link: panda_link0
subtree_root_link: base_link

default_q: [
    # Original version
    # 0.00, 0.00, 0.00, -1.57, 0.00, 1.50, 0.75

    # New config
    #0.00, -1., 0.00, -2.57, 0.00, 2.50, 0.75
    #0.00, -1.3, 0.00, -2.87, 0.00, 2.50, 0.75
    #1.421117, -0.857428, 0.820088, -1.531935, -1.570564, 1.421053
    -1.57, -1.57, -1.57, -1.57, 1.57, 0
    ]

# Most dimensions of the cspace have a direct corresponding element
# in the URDF. This list of rules defines how unspecified coordinates
# should be extracted.
cspace_to_urdf_rules:
    # - {name: panda_finger_joint1, rule: fixed, value: 0.025}
    # - {name: panda_finger_joint2, rule: fixed, value: 0.025}

# The active task spaces listed beyond the right_gripper are used to model the
# forearm and hand geometry more precisely. Each of these are added to the
# baseic panda URDF in lula_franka/urdf/lula_franka.urdf.xacro. For instance,
# the panda_forearm_mid_pt_shifted is a version of the panda_forearm_mid_pt
# which has a lateral shift to account for offset segments in the geometry of
# the forearm.
active_task_spaces:
    - base_link
    - shoulder_link
    - upper_arm_link
    - forearm_link
    - wrist_1_link
    - wrist_2_link
    - wrist_3_link
    - ee_link
    - ee_suction_link
   

composite_task_spaces: []

