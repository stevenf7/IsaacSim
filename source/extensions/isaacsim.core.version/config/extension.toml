[package]
version = "2.2.1"
category = "Other"
title = "Isaac Sim Version"
description = "Isaac Sim Version extension provides tools to query Isaac Sim version and build information."
authors = ["hmazhar@nvidia.com", "aserranomuno@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.core.version"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}

[[python.module]]
name = "isaacsim.core.version"

[[python.module]]
name = "isaacsim.core.version.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[test]]
dependencies = ["omni.kit.test"]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
