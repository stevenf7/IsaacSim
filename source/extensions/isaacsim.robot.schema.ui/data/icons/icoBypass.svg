  <line x1="1.5" y1="9" x2="3.5" y2="9" stroke="#D8D8D8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Semicircular arc over the top of the circle -->
  <path d="M3.5,9 A5.5,5.5 0 1,1 14.5,9" stroke="#D8D8D8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Horizontal end segment (right, centered vertically) -->
