asset_path: /Isaac/Robots/Unitree/H1/h1.usd
physics_dt: 0.005
z_offset: 1.05
articulation_path: pelvis
controller_z_offset: 1.05

chase_camera:
  base_path: pelvis
  x_offset: -1.5
  z_offset: 0.8
  tilt_angle: 60.0

occupancy_map:
  radius: 1.0
  collision_radius: 0.5
  z_min: 0.1
  z_max: 2.0
  cell_size: 0.05

control:
  keyboard_linear_velocity_gain: 1.0
  keyboard_angular_velocity_gain: 1.0
  gamepad_linear_velocity_gain: 1.0
  gamepad_angular_velocity_gain: 1.0

random_action:
  linear_velocity_range: [-0.3, 1.0]
  angular_velocity_range: [-0.75, 0.75]
  linear_acceleration_std: 5.0
  angular_acceleration_std: 5.0
  grid_pose_sampler_grid_size: 5.0

path_following:
  speed: 1.0
  angular_gain: 1.0
  stop_distance_threshold: 0.5
  forward_angle_threshold: 0.7853981633974483
  target_point_offset_m: 1.0

sensor_rig:
  sensors:
    - name: front_camera
      type: camera
      sensor_prim_path: d435_left_imager_link/front_camera/front
      width_px: 1920
      height_px: 1200
