[core]
reloadable = true
order = 0

[package]
version = "2.1.8"
category = "Simulation"
title = "Wheeled Robots UI"
description = "This extension provides the UI elements for the wheeled_robots extension"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.wheeled_robots"
keywords = ["isaac", "physics", "analyze", "tune", "ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.gui.components" = {}
"omni.graph" = {}
"omni.graph.tools" = {}
"isaacsim.robot.wheeled_robots" = {}
"isaacsim.core.deprecation_manager" = {}
"omni.kit.menu.utils" = {}


[[python.module]]
name = "isaacsim.robot.wheeled_robots.ui"


[[test]]
dependencies = []
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
    '--/persistent/app/stage/upAxis="Z"',
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
]


[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]
