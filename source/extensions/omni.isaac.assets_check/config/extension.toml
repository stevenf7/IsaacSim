[package]
version = "0.3.5"
category = "Setup"
title = "Isaac Sim Assets Check"
description = "This Extension checks if the assets are updated."
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.assets_check"
keywords = ["isaac"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
toggleable = false

[dependencies]
"omni.usd" = {}
"omni.ui" = { order = -100 }

# Isaac Sim Core Extensions
"omni.isaac.core" = {}
"omni.isaac.nucleus" = {}

[deprecation]
warning = "omni.isaac.asset_check is deprecated in Isaac Sim 4.2.0 and will be removed in the future"

[[python.module]]
name = "omni.isaac.assets_check"


