[core]
reloadable = false
# Load at the start, load all schemas with order -100 (with order -1000 the USD libs are loaded)
order = -100

[package]
version = "6.3.7"
category = "Simulation"
title = "Isaac USD schema"
description = "Extension used to host all USD schemas made for robots. Provides the generated schema USDA. and a few utility functions used for informal schemas."
authors = ["hmazhar@nvidia.com", "rgasoto@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.schema"
keywords = ["isaac", "usd", "schema"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.usd.libs" = {}

[[python.module]]
name = "omni.isaac.RangeSensorSchema"
path = "./compat"

[[python.module]]
name = "omni.isaac.IsaacSensorSchema"
path = "./compat"

[[python.module]]
name = "usd.schema.isaac"

[[python.module]]
name = "isaacsim.robot.schema.tests"

[[test]]
name = "startup"

[[test]]
timeout = 120
dependencies = [
    "omni.usd",
]

[documentation]
pages = ["docs/Overview.md","docs/USD_SCHEMAS.md", "docs/CHANGELOG.md"]
