[manipulators]
reloadable = true
order = 0

[package]
version = "2.1.7"
category = "Simulation"
title = "Isaac Sim Manipulators UI"
description = "Manipulators"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.robot.manipulators.ui"
keywords = ["isaac", "manipulators", "ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.robot.manipulators" = {}
"omni.kit.menu.utils" = {}

[[python.module]]
name = "isaacsim.robot.manipulators.ui"


[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]

[[test]]
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
    '--/persistent/app/stage/upAxis="Z"',
    '--/persistent/isaac/asset_root/default = "omniverse://isaac-dev.ov.nvidia.com"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
]
dependencies = []