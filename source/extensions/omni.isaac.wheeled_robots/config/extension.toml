[core]
reloadable = true
order = 0

[package]
version = "0.5.8"
category = "Simulation"
title = "Wheeled Drives"
description = "This extension provides wheeled robots utilities"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.wheeled_robots"
keywords = ["isaac", "physics", "analyze", "tune"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.isaac.ui" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.core_archive" = {} # scipy, osqp, qdldl
"omni.graph" = {}
"omni.graph.tools" = {}

[[python.module]]
name = "omni.isaac.wheeled_robots"

[[python.module]]
name = "omni.isaac.wheeled_robots.tests"

[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]


[python.pipapi]
requirements = []
use_online_index = true

[[test]]
stdoutFailPatterns.exclude = [
    "*Invalid Bundle object in Py_Bundle in getPrimPath*", # Per node tests won't have valid bundles
]
