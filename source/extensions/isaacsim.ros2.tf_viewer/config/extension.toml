[core]
reloadable = true
order = 0

[package]
version = "2.0.1"
category = "Utility"
title = "TF Viewer"
description = "Show the tf transform tree in the viewport"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.ros2.tf_viewer"
keywords = ["isaac", "ROS2", "tf"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.ui.scene" = {}
"omni.kit.uiapp" = {}
"omni.kit.viewport.utility" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.ros2.bridge" = {}

[[python.module]]
name = "isaacsim.ros2.tf_viewer"

[settings]
# Whether to use the C++ implementation to listen to the tf and process the incoming data.
# If false, the Python implementation will be used (may degrade performance considerably).
exts."isaacsim.ros2.tf_viewer".cpp = true
# Whether to include the pose of the root frame when drawing the TF in the viewport if not listed.
# Root frame's pose is defined with position ``(0,0,0)`` and orientation ``(0,0,0,1)``, as *xyzw* quaternion.
exts."isaacsim.ros2.tf_viewer".include_root_frame = true

[[test]]
stdoutFailPatterns.exclude = [
    '*[Error] [carb] [Plugin: omni.sensors.nv.lidar.ext.plugin] Dependency: [omni::sensors::lidar::IGenericModelOutputIOFactory v0.1] failed to be resolved.*', # feature not included in Windows
]
