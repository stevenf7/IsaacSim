%YAML 1.2
---
name: clock
components:
  - name: default
    type: nvidia::gxf::RealtimeClock
---
#############
# Pose Tree #
#############
name: atlas.pose_tree
components:
  - name: pose_tree
    type: nvidia::isaac::PoseTree
  - type: nvidia::isaac::PoseTreeSetup
    parameters:
      maximum_frame_count: 1024
      maximum_edge_count: 65536
      maximum_pose_count: 4194304
      default_number_edges: 64
      default_history_length: 36
      edge_chunk_size: 4
      history_chunk_size: 16
      pose_tree: pose_tree
---
name: atlas.pose_frames
components:
  - name: world
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: sim
      pose_tree: atlas.pose_tree/pose_tree
  - name: robot
    type: nvidia::isaac::PoseTreeFrame
    parameters:
      frame_name: /car/Vehicle
      pose_tree: atlas.pose_tree/pose_tree
---
name: atlas.composite_schema_server
components:
  - name: composite_schema_server
    type: nvidia::isaac::CompositeSchemaServer
---
name: atlas
components:
  - name: frontend
    type: nvidia::isaac::AtlasFrontend
    parameters:
      pose_tree: atlas.pose_tree/pose_tree
      composite_schema_server: atlas.composite_schema_server/composite_schema_server
---
name: interface.input
components:
  - name: vehicle_command
    type: nvidia::gxf::DoubleBufferReceiver
---
name: generator
components:
  - name: output
    type: nvidia::gxf::DoubleBufferTransmitter
  - type: nvidia::gxf::PeriodicSchedulingTerm
    parameters:
      recess_period: 100 Hz
  - type: nvidia::gxf::DownstreamReceptiveSchedulingTerm
    parameters:
      transmitter: output
      min_size: 1
  - name: generator
    type: nvidia::isaac::AckermannDriveControlGenerator
    parameters:
      acceleration: 0.1
      curvature: 0.0
      control_frame: atlas.pose_frames/robot
      atlas: atlas/frontend
  - type: nvidia::isaac::CompositePublisher
    parameters:
      generator: generator
      allocator: allocator/allocator
      composite: output
---
name: interface.output
components:
  - name: vehicle_state
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::gxf::test::PingTx
    parameters:
      signal: signal
  - name: signal
    type: nvidia::gxf::DoubleBufferTransmitter
    parameters:
      policy: 0
---
name: vehicle_state_serializer
components:
  - name: input
    type: nvidia::gxf::DoubleBufferReceiver
    parameters:
      capacity: 10
      policy: 0
  - type: nvidia::gxf::MessageAvailableSchedulingTerm
    parameters:
      receiver: input
      min_size: 1
  - type: nvidia::gxf::test::PrintTensor
    parameters:
      tensors: input
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: generator/output
      target: interface.input/vehicle_command
---
components:
  - type: nvidia::gxf::Connection
    parameters:
      source: interface.output/vehicle_state
      target: vehicle_state_serializer/input
---
name: allocator
components:
  - name: allocator
    type: nvidia::gxf::UnboundedAllocator
---
name: scheduler
components:
  - type: nvidia::gxf::GreedyScheduler
    parameters:
      stop_on_deadlock: false
      clock: clock/default