[package]
version = "1.1.1"
category = "SyntheticData"
title = "Isaac Sim Replicator Behavior Scripts UI"
description = "UI components for the Replicator Behavior Scripts exntension. It provides the UI Widget for the Property Panel for configuring the exposed variables of the scripts."
authors = ["hmazhar@nvidia.com", "ahaidu@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.replicator.behavior.ui"
keywords = ["isaac", "behavior scripts", "replicator", "ui"]
changelog = "docs/CHANGELOG.md"
readme  = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.replicator.behavior" = {}
"omni.kit.property.usd" = {}
"omni.kit.window.property" = {}
"omni.ui" = {}

[[python.module]]
name = "isaacsim.replicator.behavior.ui"

[[test]]
dependencies = [
    "omni.kit.test"
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
