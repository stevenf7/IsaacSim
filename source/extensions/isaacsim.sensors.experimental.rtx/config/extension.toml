[package]
version = "1.4.7"
category = "Simulation"
title = "Isaac Sim RTX Sensor Simulation"
description = "Provides APIs for RTX-based sensors, including RTX Lidar, RTX Radar & RTX Acoustic."
authors = ["hmazhar@nvidia.com", "adevalla@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.sensors.experimental.rtx"
keywords = ["isaac", "physics", "robotics"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
writeTarget.platform = true  # ships platform-specific binaries copied from generic-model-output and sensor-checker target-deps

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.experimental.materials" = {}
"isaacsim.core.experimental.objects" = {}
"isaacsim.core.experimental.prims" = {}
"isaacsim.storage.native" = {}
"omni.replicator.core" = {}
"omni.sensors.nv.acoustic" = {}
"omni.sensors.nv.camera" = {}
"omni.sensors.nv.common" = {}
"omni.sensors.nv.ids" = {}
"omni.sensors.nv.lidar" = {}
"omni.sensors.nv.radar" = {}
"omni.usd.schema.omni_lens_distortion" = {}
"omni.usd.schema.omni_sensors" = {}

[[python.module]]
name = "isaacsim.sensors.experimental.rtx"

[[python.module]]
name = "isaacsim.sensors.experimental.rtx.generic_model_output"

[[python.module]]
name = "isaacsim.sensors.experimental.rtx.sensor_checker"

[[python.module]]
name = "isaacsim.sensors.experimental.rtx.tests"
public = false

[settings]
# Renderer keeps Lidar return buffer on GPU for post-processing.
app.sensors.nv.lidar.outputBufferOnGPU = false
# Renderer keeps Radar return buffer on GPU for post-processing.
app.sensors.nv.radar.outputBufferOnGPU = false
# Enable non-visual materials using USD attributes.
rtx.materialDb.nonVisualMaterialCSV.enabled = false
# Specify the non-visual material USD attribute prefix.
rtx.materialDb.nonVisualMaterialSemantics.prefix = "omni:simready:nonvisual"
# Use Hydra time (`omni.timeline`) in RTX sensor models. Applies only if multi-tick rendering is disabled.
rtx.rtxsensor.useHydraTimeAlways = true

[[test]]
name = "startup"
args = [
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[[test]]
timeout = 900
dependencies = [
    "isaacsim.core.rendering_manager",
    "isaacsim.test.utils",
]

args = [
    "--enable",
    "omni.kit.loop-isaac",
    "--reset-user",
    "--vulkan",
    "--/app/asyncRendering=0",
    "--/app/asyncRenderingLowLatency=0",
    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedStage=1",
    "--/app/hydraEngine/waitIdle=0",
    "--/app/player/useFixedTimeStepping=false",
    "--/app/renderer/skipWhileMinimized=0",
    "--/app/renderer/sleepMsOnFocus=0",
    "--/app/renderer/sleepMsOutOfFocus=0",
    "--/app/runLoops/main/manualModeEnabled=true",
    "--/app/runLoops/main/rateLimitEnabled=false",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/settings/persistent=0",
    "--/app/useFabricSceneDelegate=true",
    "--/app/viewport/createCameraModelRep=0",
    "--/crashreporter/skipOldDumpUpload=1",
    "--/exts/omni.usd/locking/onClose=0",
    "--/omni/kit/plugin/syncUsdLoads=1",
    "--/omni/replicator/asyncRendering=0",
    "--/omnihydra/parallelHydraSprimSync=1",
    '--/persistent/app/stage/upAxis="Z"',
    "--/persistent/app/viewport/defaults/tickRate=120",
    "--/persistent/app/viewport/displayOptions=31951",
    "--/persistent/omni/replicator/captureOnPlay=1",
    "--/persistent/omnigraph/updateToUsd=0",
    "--/persistent/physics/visualizationDisplayJoints=0",
    "--/persistent/renderer/startupMessageDisplayed=1",
    "--/persistent/simulation/defaultMetersPerUnit=1.0",
    "--/persistent/simulation/minFrameRate=15",
    "--/renderer/multiGpu/autoEnable=0",
    "--/renderer/multiGpu/enabled=0",
    "--/rtx-transient/dlssg/enabled=0",
    "--/rtx-transient/resourcemanager/enableTextureStreaming=1",
    "--/rtx/descriptorSets=360000",
    "--/rtx/hydra/enableSemanticSchema=1",
    "--/rtx/hydra/materialSyncLoads=1",
    "--/rtx/hydra/supportMultiTickRate=true",
    "--/rtx/materialDb/syncLoads=1",
    "--/rtx/newDenoiser/enabled=1",
    "--/rtx/rendering/perSensorTickTlas=true",
    "--/rtx/reservedDescriptors=900000",
    ### Extension specific args
    "--/renderer/raytracingMotion/enabled=true",
    "--/renderer/raytracingMotion/enabledForHydraEngines=0,1,2,3",
    "--/renderer/raytracingMotion/enableHydraEngineMasking=true",
    "--/rtx-transient/stableIds/enabled=true",
    "--/rtx/spg/enabled=true",
]

stdoutFailPatterns.exclude = [
    '*Failed to read texture file*direction.exr*',
    '*Failed to read texture file*pattern_??.png*',
    '*Failed to request UJITSO build result for: *direction.exr*',
    '*Failed to request UJITSO build result for: *pattern_??.png*',
    '*Failed to request UJITSO build result for: *sl_direction.exr*',
    '*Failed to request UJITSO build result for: /nonexistent/*',
    '*Failed to request UJITSO build result for: omniverse://server.example/*',
    '*TextureProcessor : Failed to process texture *direction.exr*',
    '*TextureProcessor : Failed to process texture *pattern_??.png*',
    '*The NumPy module was reloaded*',
]
