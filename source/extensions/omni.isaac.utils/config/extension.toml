[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
category = "Simulation"
title = "Isaac Sim Utilities"
description = "Isaac Sim Utility Extensions"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.utils"
keywords = ["isaac", "utils"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.editor" = {}
"omni.ui" = {}
"omni.physx" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.synthetic_utils" = {}
"omni.syntheticdata" = {}

[[python.module]]
name = "omni.isaac.utils"

[[python.module]]
name = "omni.isaac.utils.scripts.syntheticdata_recorder"
public = false

[[python.module]]
name = "omni.isaac.utils.scripts.physics_inspector"

[[python.module]]
name = "omni.isaac.utils.scripts.samples.surface_gripper"

[[python.module]]
name = "omni.isaac.utils.scripts.merge_mesh_tool"
public = false

[[python.module]]
name = "omni.isaac.utils.scripts.array_editor"
public = false

[python.pipapi]
requirements = ["matplotlib", "pillow"]