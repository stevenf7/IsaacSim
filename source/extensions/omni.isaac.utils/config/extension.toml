[core]
reloadable = true
order = 0

[package]
version = "0.1.7"
category = "Simulation"
title = "Isaac Sim Utilities"
description = "Isaac Sim Utility Extensions"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.utils"
keywords = ["isaac", "utils"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.usdphysics" = {}
"omni.isaac.dynamic_control" = {}
"omni.isaac.ui" = {}

[[python.module]]
name = "omni.isaac.utils"

[[python.module]]
name = "omni.isaac.utils.tests"

[[python.module]]
name = "omni.isaac.utils.scripts.create_menu"
public = false

# [[native.plugin]]
# path = "bin/*.plugin"
# recursive = false

[settings]
isaac.nucleus.default = "omniverse://localhost"

[[test]]
args = ["--/exts/omni.kit.renderer.core/compatibilityMode=true"]