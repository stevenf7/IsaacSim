[core]
reloadable = true
order = 0

[package]
version = "0.2.1"
category = "Simulation"
title = "Isaac Sim MJCF Importer"
description = "MJCF Importer for Isaac Sim"
repository="https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.mjcf"
keywords = ["isaac", "mjcf", "mujoco", "import"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.uiapp" = {}
"omni.isaac.ui" = {}
"omni.kit.window.filepicker" = {}
"omni.kit.window.content_browser" = {}
"omni.kit.pip_archive" = {} # pulls in pillow
"omni.physx" = {} 


[[python.module]]
name = "omni.isaac.mjcf"

[[python.module]]
name = "omni.isaac.mjcf.tests"

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

