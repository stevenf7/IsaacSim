[core]
reloadable = true
order = 0

[package]
version = "1.0.0"
category = "Robotics"
title = "Omni Isaac Cortex"
description = "Decision framework and organizational structures for using Omni Isaac Sim as the mind of a physical robot."
authors = ["Nathan Ratliff"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.cortex.framework"
keywords = ["isaac", "robotics", "collaborative robotics", "digital twins"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.api" = {}
"omni.isaac.franka" = {}
"omni.isaac.motion_generation" = {}
"omni.isaac.nucleus" = {}

[[python.module]]
name = "isaacsim.cortex.framework"

[[test]]
stdoutFailPatterns.exclude = [
    "*WARNING: cannot load logging configuration file*", # exclude warning as failure
]
