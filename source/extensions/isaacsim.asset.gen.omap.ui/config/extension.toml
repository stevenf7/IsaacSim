[package]
version = "2.4.3"
category = "Simulation"
title = "UI components for the Isaac Sim Occupancy Map"
description = "UI components for the Isaac Sim Occupancy Map provides UI for 2D Occupancy Map Generation"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/isaacsim.asset.gen.omap.ui"
keywords = ["isaac", "occupancy map"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"isaacsim.asset.gen.omap" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.experimental.utils" = {}
"isaacsim.gui.components" = {}

[[python.module]]
name = "isaacsim.asset.gen.omap.ui"

[[python.module]]
name = "isaacsim.asset.gen.omap.ui.tests"

[[test]]
dependencies = [
    "omni.kit.ui_test",
]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]
