display_name = "Domain Randomization"

[package]
version = "0.1.1"
title = "Domain Randomization"
description = "This extension randomizes domain parameters in Omniverse Kit"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac/dr"
keywords = ["isaac", "domain", "randomizer", "dr"]
changelog = "docs/CHANGELOG.md"
category = "Simulation"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.kit.editor" = {}
"omni.client" = {}
"omni.ui" = {}
"omni.isaac.dynamic_control" = {}

[[python.module]]
name = "omni.isaac.dr"

[[python.module]]
name = "omni.isaac.dr.scripts.samples"

[[python.module]]
name = "omni.isaac.dr.scripts.random_room_sample"

[[python.module]]
name = "omni.isaac.DrSchema"
public = false

[[native.plugin]]
path = "bin/*.plugin"
recursive = false

[[native.library]]
path = "bin/${lib_prefix}drSchema${lib_ext}"
