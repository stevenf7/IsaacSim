[core]
reloadable = true
order = 0

[package]
version = "0.1.2"
category = "Simulation"
title = "Isaac Sim Example Nodes"
description = "This extension adds Omnigraph example nodes for Isaac Sim"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.examples_nodes"
keywords = ["isaac", "omnigraph", "examples"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[dependencies]
"omni.physx" = {}
"omni.isaac.core" = {}
"omni.isaac.core_nodes" = {}
"omni.isaac.ui" = {}
"omni.isaac.franka" = {}
"omni.isaac.dofbot" = {}
"omni.isaac.universal_robots" = {}
"omni.isaac.core_archive" = {} # scipy, osqp, qdldl
"omni.graph" = {}
"omni.graph.tools" = {}

[[python.module]]
name = "omni.isaac.examples_nodes"

[[python.module]]
name = "omni.isaac.examples_nodes.tests"

[fswatcher.patterns]
include = ["*.ogn", "*.py"]
exclude = ["Ogn*Database.py"]

