[core]
# Load as early as possible
order = -1000
reloadable = false

[package]
version = "1.1.0"
category = "Internal"
title = "Isaac Sim ML Pip Archive"
description = "Pip packages needed by isaac sim extensions"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.ml_archive"
keywords = ["isaac", "pip"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.kit.pipapi" = {} # We need it so that we can use [python.pipapi].
"omni.kit.pip_archive" = {} # import the base kit python archive
"omni.isaac.core_archive" = {} # pull in the main isaac sim pip archive
"omni.pip.torch" = {tag = "1_11_0"} # pull in torch


# We bundle not only "scipy" package, but many other. No need to mention all of them, just importing one will add whole
# folder (pip_prebundle) to sys.path.
[[python.module]]
name = "gym"
path = "pip_prebundle"

# That is empty module, added here only to make tests discoverable in test run
[[python.module]]
name = "omni.isaac.ml_archive"
