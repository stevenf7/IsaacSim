[core]
reloadable = true
order = 0

[package]
version = "0.1.4"
category = "Simulation"
title = "Isaac Sim Debug Drawing"
description = "Persistent Debug Drawing Helpers"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/Isaac/omni_isaac_sim/-/tree/develop/source/extensions/omni.isaac.debug_draw"
keywords = ["isaac", "physics", "inspect",]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.debugdraw" = {}
# needed to access drawing interfaces:
"omni.kit.renderer.core" = {}
"omni.kit.viewport.window" = {}
"omni.hydra.rtx" = {}

[[python.module]]
name = "omni.isaac.debug_draw"

[[python.module]]
name = "omni.isaac.debug_draw.tests"


[[native.plugin]]
path = "bin/*.plugin"
recursive = false