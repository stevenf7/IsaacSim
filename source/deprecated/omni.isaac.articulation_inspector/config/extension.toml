[core]
reloadable = true
order = 0

[package]
version = "0.1.11"
category = "Simulation"
title = "Articulation Inspector"
description = "This extension can inspect and modify the properties of an articulation."
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/omni.isaac.articulation_inspector"
keywords = ["isaac", "physics", "analyze", "inspect"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[deprecation]
warning = "Extension deprecated since Isaac Sim 4.0.0. Replaced by omni.physx.inspector"

[dependencies]
"omni.physx" = {}
"isaacsim.core.api" = {}
"omni.isaac.dynamic_control" = {}
"isaacsim.gui.components" = {}

[[python.module]]
name = "omni.isaac.articulation_inspector"
