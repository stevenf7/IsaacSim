[manipulators]
reloadable = true
order = 0

[package]
version = "2.0.2"
category = "Simulation"
title = "Isaac Sim Manipulators UI"
description = "Manipulators"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/omni.isaac.manipulators.ui"
keywords = ["isaac", "manipulators", "ui"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"
writeTarget.kit = true

[deprecation] 
warning = "Extension deprecated since Isaac Sim 4.5.0. Replaced by isaacsim.robot.manipulators.ui"

[dependencies]
"isaacsim.robot.manipulators.ui" = {}
"isaacsim.core.deprecation_manager" = {}

[[python.module]]
name = "omni.isaac.manipulators.ui"

[[test]]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]