[core]
reloadable = true
order = 0

[package]
version = "2.0.2"
category = "Simulation"
title = "ROS Bridge"
description = "ROS Bridge"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/omni.isaac.ros_bridge"
keywords = ["isaac", "ROS"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
icon = "data/icon.png"
preview_image = "data/preview.png"

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.ros1.bridge" = {}

[[python.module]]
name = "omni.isaac.ros_bridge"

[deprecation]
warning = "Extension deprecated since Isaac Sim 4.5.0. Replaced by isaacsim.ros1.bridge."

[[test]]
args = [
'--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]

[[test]]
name = "startup"
args = [
    '--/app/settings/fabricDefaultStageFrameHistoryCount = 3',
]