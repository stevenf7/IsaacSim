[package]
version = "1.0.5"
category = "Simulation"
title = "Isaac Sim Cloner"
description = "Cloner"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/omni.isaac.cloner"
