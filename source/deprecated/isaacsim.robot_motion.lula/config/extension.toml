[package]
version = "4.1.3"
category = "Simulation"
title = "Isaac Sim Lula"
description = "Extension that provides lula python interface"
authors = ["hmazhar@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/isaacsim.robot_motion.lula"
keywords = ["isaac", "lula", "rmp"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
writeTarget.platform = true # pip prebundle makes this extension os specific
writeTarget.python = true

[deprecation]
warning = "Extension deprecated since Isaac Sim 6.0.0. See isaacsim.robot_motion.experimental.motion_generation and isaacsim.robot_motion.cumotion for newer motion-generation APIs."

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"omni.kit.pip_archive" = {}

[[python.module]]
path = "pip_prebundle"

[[python.module]]
name = "isaacsim.robot_motion.lula"

[[python.module]]
name = "isaacsim.robot_motion.lula.tests"

[[test]]
dependencies = [
    "omni.kit.test"
]

[documentation]
pages = ["docs/Overview.md","docs/CHANGELOG.md"]
