# Extension configuration file.
# Visit the "Extension configuration file (extension.toml)" section for more details:
# https://docs.omniverse.nvidia.com/kit/docs/kit-manual/latest/guide/extensions_advanced.html
#

[package]
version = "0.3.1"
category = "Simulation"
title = "Motion Generation Examples"
description = "Examples for using the Lula planning library under motion generation."
authors = ["hmazhar@nvidia.com", "jhough@nvidia.com"]
keywords = ["examples","flow","generation","lula","motion","rmp","rmpflow","rrt","trajectory"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/isaacsim.robot_motion.motion_generation.examples"

[deprecation]
warning = "Extension deprecated since Isaac Sim 6.0.0. See isaacsim.robot_motion.experimental.motion_generation and isaacsim.robot_motion.cumotion for newer motion-generation APIs and examples."

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.core.experimental.objects" = {}
"isaacsim.core.prims" = {}
"isaacsim.core.utils" = {}
"isaacsim.gui.components" = {}
"isaacsim.robot_motion.lula" = {}
"isaacsim.robot_motion.motion_generation" = {}
"isaacsim.storage.native" = {}
"omni.physx" = {}
"omni.timeline" = {}
"omni.ui" = {}
"omni.usd" = {}

[[python.module]]
name = "isaacsim.robot_motion.motion_generation.examples.rmp_flow"

[[python.module]]
name = "isaacsim.robot_motion.motion_generation.examples.rrt"

[[python.module]]
name = "isaacsim.robot_motion.motion_generation.examples.kinematics"

[[python.module]]
name = "isaacsim.robot_motion.motion_generation.examples.trajectory_generator"

[[test]]
name = "startup"
dependencies = [
    "omni.isaac.ml_archive",
]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[[test]]
dependencies = [
    "omni.isaac.ml_archive",
]

stdoutFailPatterns.exclude = [
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
