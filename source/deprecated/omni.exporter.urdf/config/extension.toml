[core]
reloadable = true
order = 0

[package]
version = "1.0.1"
category = "Simulation"
title = "Isaac USD to URDF exporter"
description = "Extension that exports USD files to URDF"
authors = ["Isaac Sim Team"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/omni.exporter.urdf"
keywords = ["isaac", "URDF"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"isaacsim.core.deprecation_manager" = {}
"isaacsim.asset.exporter.urdf" = {}

[deprecation]
warning = "Extension deprecated since Isaac Sim 4.5.0. Replaced by isaacsim.asset.exporter.urdf."
