[package]
version = "1.2.1"
category = "Simulation"
title = "Lula Test Widget"
description = "Run Simple Tests Using Lula Algorithms"
authors = ["hmazhar@nvidia.com", "arudich@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/omniverse/isaac/omni_isaac_sim/-/tree/develop/source/deprecated/isaacsim.robot_motion.lula_test_widget"
keywords = ["isaac", "lula"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[deprecation]
warning = "Extension deprecated since Isaac Sim 6.0.0. See isaacsim.robot_motion.experimental.motion_generation and isaacsim.robot_motion.cumotion for newer motion-generation APIs and examples."

[dependencies]
"isaacsim.core.api" = {}
"isaacsim.core.deprecation_manager" = {}
"isaacsim.gui.components" = {}
"isaacsim.robot_motion.lula" = {}
"isaacsim.robot_motion.motion_generation" = {}
"omni.kit.uiapp" = {}
"omni.physics" = {}
"omni.physics.physx" = {}

[[python.module]]
name = "isaacsim.robot_motion.lula_test_widget"

[[test]]
name = "startup"
dependencies = [
    "omni.isaac.ml_archive",
]

stdoutFailPatterns.exclude = [    
    '*The NumPy module was reloaded*',
]

[[test]]
dependencies = [
    "omni.isaac.ml_archive",
]

stdoutFailPatterns.exclude = [    
    '*The NumPy module was reloaded*',
]

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
