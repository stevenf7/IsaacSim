[isaacsim]
# pyproject.toml
pyproject.description = "A metapackage to manage the Isaac Sim installation"
pyproject.keywords = ["nvidia", "omniverse", "isaacsim"]
pyproject.dependencies = [
    "isaacsim-kernel==${version}",
]
pyproject.optional-dependencies = [
    { "rl" = ["isaacsim-rl==${version}", "isaacsim-replicator==${version}", "isaacsim-app==${version}"] },
    { "ros" = ["isaacsim-ros==${version}"] },
    { "ros2" = ["isaacsim-ros2==${version}"] },
    { "extscache" = [
        "isaacsim-extscache-kit==${version}",
        "isaacsim-extscache-kit-sdk==${version}",
        "isaacsim-extscache-physics==${version}",
        ] },
    { "all" = [
        "isaacsim-app==${version}",
        "isaacsim-asset==${version}",
        "isaacsim-benchmark==${version}",
        "isaacsim-code-editor==${version}",
        "isaacsim-core==${version}",
        "isaacsim-cortex==${version}",
        "isaacsim-example==${version}",
        "isaacsim-gui==${version}",
        "isaacsim-replicator==${version}",
        "isaacsim-rl==${version}",
        "isaacsim-robot==${version}",
        "isaacsim-robot-motion==${version}",
        "isaacsim-robot-setup==${version}",
        "isaacsim-ros1==${version}",
        "isaacsim-ros2==${version}",
        "isaacsim-sensor==${version}",
        "isaacsim-storage==${version}",
        "isaacsim-template==${version}",
        "isaacsim-test==${version}",
        "isaacsim-utils==${version}",
        ] }
]
# inventory (relative to the build config)
inventory.include = [
    # license
    "LICENSE.txt",
    # apps
    "apps",
]

[isaacsim-kernel]
# pyproject.toml
pyproject.description = "Isaac Sim kernel"
pyproject.keywords = ["nvidia", "omniverse", "isaacsim", "kernel"]
pyproject.dependencies = [
    "omniverse-kit==106.1.0.140981",
]
# inventory (relative to the build config)
inventory.include = [
    # license
    "LICENSE.txt",
    # python package/module
    [ "python_packages/isaacsim/__init__.py", "." ],
    [ "python_packages/isaacsim/__main__.py", "." ],
]

[isaacsim-extscache-kit]
# pyproject.toml
pyproject.description = "Kit extensions cache for Isaac Sim"
pyproject.keywords = ["nvidia", "omniverse", "isaacsim", "kit", "cache"]
# inventory (relative to the build config)
inventory.include = [
    # license
    "LICENSE.txt",
    # cache
    "extscache/*",
]
inventory.exclude = [
    # large in size cache (to isaacsim-extscache-kit-sdk)
    "extscache/omni.sensors*",
    "extscache/omni.kit.converter*",
]

[isaacsim-extscache-kit-sdk]
# pyproject.toml
pyproject.description = "Kit-SDK extensions cache for Isaac Sim"
pyproject.keywords = ["nvidia", "omniverse", "isaacsim", "kit-sdk", "cache"]
# inventory (relative to the build config)
inventory.include = [
    # license
    "LICENSE.txt",
    # cache
    [ "kit/exts/*", "extscache" ],
    # large in size cache (from isaacsim-extscache-kit)
    "extscache/omni.sensors*",
    "extscache/omni.kit.converter*",
]

[isaacsim-extscache-physics]
# pyproject.toml
pyproject.description = "Physics extensions cache for Isaac Sim"
pyproject.keywords = ["nvidia", "omniverse", "isaacsim", "physics", "cache"]
# inventory (relative to the build config)
inventory.include = [
    # license
    "LICENSE.txt",
    # cache
    "extsPhysics",
]

