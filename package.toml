########################################################################################################################
# Memo:
########################################################################################################################

# This file is used to configure content of packages.

# Mappings ($ string substitutions). Name and examples:
# |==========================================================
# | $platform      | 'windows-x86_64'     | 'linux-x86_64'  |
# |----------------------------------------------------------
# | $lib_ext       | '.dll'               | '.so'           |
# | $lib_prefix    | ''                   | 'lib.'          |
# | $bindings_ext  | '.pyd'               | '.so'           |
# | $exe_ext       | '.exe'               | ''              |
# | $shell_ext     | '.bat'               | '.sh'           |
# |==========================================================
#
# |==========================================================
# | $config        | 'debug'              | 'release'       |
# |==========================================================

# Filters. For example, if packaging carb_sdk, debug, on linux-x86_64 all those toml keys will be used for this package:
# [carb_sdk.linux-x86_64]
# [carb_sdk.debug]
# [carb_sdk.linux.debug]
# So you can use those in any order as a keys: ["carb_sdk", "linux-x86_64", "debug", "linux", "x86_64"]


########################################################################################################################
# Common section:
########################################################################################################################

files = []

########################################################################################################################
# isaac-sim package
########################################################################################################################

[isaac-sim]
files = [
    ["**"],
]

files_exclude = [
    ["**/*.pyc"],
    ["**/*.pdb"],
    ["**/*.exp"],
    ["kit/data/**"], # This can contain portable files we don't want to package
    ["exts/omni.isaac.internal_tools"],
    ["tests/tests-python-omni.isaac.internal_tools.*"],
    ["standalone_examples/testing/**"],
    ["exts/omni.isaac.core_archive/pip_prebundle/bin**"], # OM-84922
"],
]

[isaac-sim-standalone.release]
files = [
    ["**"]
]
files_exclude = [
    ["**/*.pyc"],
    ["**/*.pdb"],
    ["**/*.exp"],
    ["apps/omni.isaac.sim.extscache.kit"],
    ["apps/omni.isaac.sim.splash.kit"],
    ["kit/data/**"], # This can contain portable files we don't want to package
    ["exts/omni.isaac.internal_tools"],
    ["tests/tests-python-omni.isaac.internal_tools.*"],
    ["tests/tests-internal*"],
    ["tests/tests-docker*"],
    ["dockertests/**"],
    ["standalone_examples/testing/**"],
]

[isaac-sim-standalone.linux-x86_64]
files = [
    ["../../docs/isaac_sim/latest/**", "docs/py/"] # linux ext api docs
]
files_strip = [
    ["**/*.so"],
]

files_strip_exclude = [
    ["kit/extscore/omni.kit.pip_archive/pip_prebundle/PIL/**"],
    ["exts/omni.isaac.core_archive/pip_prebundle/scipy/**"],
    ["exts/omni.isaac.core_archive/pip_prebundle/cv2/**"],
    ["exts/omni.isaac.ml_archive/pip_prebundle/torchvision/**"],
    ["exts/omni.isaac.ocs2/pip_prebundle/lib/**"],
    ["extscache/omni.pip.torch**"]
]

files_exclude = [
    ["isaac-sim.xr.steamvr.sh"], # Remove XR support for Linux
    ["apps/omni.isaac.sim.xr.steamvr.kit"] # Remove XR support for Linux
]

[isaac-sim-standalone.windows-x86_64]
files = [
    # WAR: repo_fileutils fails to package folder starting with dot on windows unless specified explicitly. The reason is that
    # python's std glob module doesn't support finding them. Fixing that turned out to be quite hard.
    # Isaac Sim: This doesn't exist in non launcher versions of kit sdk package
    ["kit/extscore/omni.kit.pip_archive/pip_prebundle/numpy/.libs"],
    ["exts/omni.isaac.core_archive/pip_prebundle/scipy/.libs"],
    ["../../docs/isaac_sim/latest/**", "docs/py/"] # windows ext api docs
]
files_exclude = [
    ["standalone_examples/cortex/**"], # Cortex not shipped on windows
    ["standalone_examples/api/omni.isaac.ros_bridge**"] # ROS1 not shipped on windows
]

[isaac-sim-internal]
files = [
    ["**"],
]

########################################################################################################################
# test_runner package
########################################################################################################################

[test_runner]
files = [
    ["deps"],
    ["tools"],
    ["repo.sh"],
    ["repo.bat"],
    ["repo.toml"],
    ["repo_tools.toml"],
    ["package.toml"],
    ["PACKAGE-INFO.yaml"],
    ["VERSION"],
]

########################################################################################################################
# launcher images package
########################################################################################################################

[isaac-sim-pipeline-images-beta]
files = [
    ["tools/repoman/launcher-images/beta/**",""],
]

[isaac-sim-pipeline-images-rc]
files = [
    ["tools/repoman/launcher-images/rc/**",""],
]

[isaac-sim-pipeline-images-assets]
files = [
    ["tools/repoman/launcher-images/assets/**",""],
]

########################################################################################################################
# docs package
########################################################################################################################

[docs]
files = [
    ["_build/docs/isaac_sim/latest/**",""],
]

########################################################################################################################
# assets package
########################################################################################################################

[isaac-sim-assets]
files = [
    ["_assets_temp/**",""],
]

