########################################################################################################################
# Memo:
########################################################################################################################

# This file is used to configure content of packages.

# Mappings ($ string substitutions). Name and examples:
# |==========================================================
# | $platform      | 'windows-x86_64'     | 'linux-x86_64'  | 
# |----------------------------------------------------------
# | $lib_ext       | '.dll'               | '.so'           |
# | $lib_prefix    | ''                   | 'lib.'          |
# | $bindings_ext  | '.pyd'               | '.so'           |
# | $exe_ext       | '.exe'               | ''              |
# | $shell_ext     | '.bat'               | '.sh'           |
# |==========================================================
#
# |==========================================================
# | $config        | 'debug'              | 'release'       |
# |==========================================================

# Filters. For example, if packaging carb_sdk, debug, on linux-x86_64 all those toml keys will be used for this package:
# [carb_sdk.linux-x86_64]
# [carb_sdk.debug]
# [carb_sdk.linux.debug]
# So you can use those in any order as a keys: ["carb_sdk", "linux-x86_64", "debug", "linux", "x86_64"]


########################################################################################################################
# Common section:
########################################################################################################################

files = []

########################################################################################################################
# isaac-sim package
########################################################################################################################

[isaac-sim]
files = [
    ["_build/$platform/$config"],
    ["_build/target-deps/usd_ext_isaac/$config/share/usd/plugins"],
    ["deps"],
    ["tools/packman"],
    ["tools/autopull"],
    ["source/python_samples", "python_samples"],
    ["source/ros_samples", "ros_samples"],
    ["_build/PACKAGE-LICENSES", "PACKAGE-LICENSES"],
]

[isaac-sim.windows-x86_64]
files = []

[isaac-sim.linux-x86_64]
files_exclude = []

[isaac-sim-standalone.release]
files = [
    ["_build/$platform/$config"],
    ["_build/kit_release"],
    ["_build/target-deps/usd_ext_isaac/$config/share/usd/plugins"],
    ["_build/$platform/$config/appshortcuts/*", "."],
    ["launcher.toml"],
    ["source/python_samples", "python_samples"],
    ["source/ros_samples", "ros_samples"],
    ["_build/PACKAGE-LICENSES", "PACKAGE-LICENSES"],
]
files_exclude = [
    ["**/*.pdb"],
    ["**/*.exp"],
    ["_build/$platform/$config/appshortcuts"],
    ["_build/kit_release/_exts/omni.kit.window.content"],
    ["_build/kit_release/_exts/omni.rtx.settings.dev"]
]

[isaac-sim-standalone.linux-x86_64]
files_exclude = [
]

files_strip = [
    ["**/*.so"],
]

files_strip_exclude = [
    ["_build/kit_release/_build/linux-x86_64/release/extscore/omni.kit.pip_archive/pip_prebundle/PIL/**"],
    ["_build/kit_release/_build/linux-x86_64/release/exts/omni.kit.pip_archive/pip_prebundle/PIL/**"],
    ["_build/linux-x86_64/release/exts/omni.isaac.robot_engine_bridge/lib/**"],
    ["_build/linux-x86_64/release/exts/omni.isaac.robot_engine_bridge/gxf/lib/**"]
]


[isaac-sim-standalone.windows-x86_64]
files = [
    # WAR: repo_fileutils fails to package folder starting with dot on windows unless specified explicitly. The reason is that 
    # python's std glob module doesn't support finding them. Fixing that turned out to be quite hard.
    # Isaac Sim: This doesn't exist in non launcher versions of kit sdk package
    # ["_build/kit_release/_exts/omni.kit.pip_archive/pip_prebundle/numpy/.libs"],
]

[isaac-sim-standalone.debug]
files = []


########################################################################################################################
# test_runner package
########################################################################################################################

[test_runner]
files = [
    ["deps"],
    ["tools"],
    ["repo.sh"],
    ["repo.bat"],
    ["repo.toml"],
    ["repo_tools.toml"],
    ["package.toml"],
    ["PACKAGE-INFO.yaml"],
    ["VERSION.md"],
]


########################################################################################################################
# launcher images package
########################################################################################################################

[isaac-sim-pipeline-images-dl]
files = [
    ["tools/repoman/launcher-images/dl/**",""],
]

[isaac-sim-pipeline-images-rc]
files = [
    ["tools/repoman/launcher-images/rc/**",""],
]

[isaac-sim-pipeline-images-prod]
files = [
    ["tools/repoman/launcher-images/prod/**",""],
]