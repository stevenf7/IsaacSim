########################################################################################################################
# Memo:
########################################################################################################################

# This file is used to configure content of packages.

# Mappings ($ string substitutions). Name and examples:
# |==========================================================
# | $platform      | 'windows-x86_64'     | 'linux-x86_64'  | 
# |----------------------------------------------------------
# | $lib_ext       | '.dll'               | '.so'           |
# | $lib_prefix    | ''                   | 'lib.'          |
# | $bindings_ext  | '.pyd'               | '.so'           |
# | $exe_ext       | '.exe'               | ''              |
# | $shell_ext     | '.bat'               | '.sh'           |
# |==========================================================
#
# |==========================================================
# | $config        | 'debug'              | 'release'       |
# |==========================================================

# Filters. For example, if packaging carb_sdk, debug, on linux-x86_64 all those toml keys will be used for this package:
# [carb_sdk.linux-x86_64]
# [carb_sdk.debug]
# [carb_sdk.linux.debug]
# So you can use those in any order as a keys: ["carb_sdk", "linux-x86_64", "debug", "linux", "x86_64"]


########################################################################################################################
# Common section:
########################################################################################################################

files = []



########################################################################################################################
# example_extensions package
########################################################################################################################

[omni_isaac_sim]
files = [
    ["_build/$platform/$config/exts", "exts"],
	["_build/docs", "docs"],
]

[omni_isaac_sim.windows-x86_64]
files = []

[omni_isaac_sim.linux-x86_64]
files = []

########################################################################################################################
# docs package
########################################################################################################################

[docs]
files = [
    ["_build/docs", "docs"],
]

########################################################################################################################
# test_runner package
########################################################################################################################

[test_runner]
files = [
    ["deps"],
    ["tools"],
]

########################################################################################################################
# omniverse-kit testing package
########################################################################################################################

[omniverse-kit]
