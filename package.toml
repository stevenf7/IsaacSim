########################################################################################################################
# Memo:
########################################################################################################################

# This file is used to configure content of packages.

# Mappings ($ string substitutions). Name and examples:
# |==========================================================
# | $platform      | 'windows-x86_64'     | 'linux-x86_64'  | 
# |----------------------------------------------------------
# | $lib_ext       | '.dll'               | '.so'           |
# | $lib_prefix    | ''                   | 'lib.'          |
# | $bindings_ext  | '.pyd'               | '.so'           |
# | $exe_ext       | '.exe'               | ''              |
# | $shell_ext     | '.bat'               | '.sh'           |
# |==========================================================
#
# |==========================================================
# | $config        | 'debug'              | 'release'       |
# |==========================================================

# Filters. For example, if packaging carb_sdk, debug, on linux-x86_64 all those toml keys will be used for this package:
# [carb_sdk.linux-x86_64]
# [carb_sdk.debug]
# [carb_sdk.linux.debug]
# So you can use those in any order as a keys: ["carb_sdk", "linux-x86_64", "debug", "linux", "x86_64"]


########################################################################################################################
# Common section:
########################################################################################################################

files = []

########################################################################################################################
# isaac-sim package
########################################################################################################################

[isaac-sim]
files = [
    ["_build/$platform/$config"],
    ["deps"],
    ["tools/packman"],
    ["tools/autopull"]
]

[isaac-sim.windows-x86_64]
files = []

[isaac-sim.linux-x86_64]
files = []

[isaac-sim-launcher.release]
files = [
    ["_build/$platform/$config"],
    ["_build/kit-exts"],
    ["_build/kit-extsPhysics"],
    ["_build/target-deps/kit_sdk_release"],
    ["launcher.toml"],
    ["_build/$platform/$config/appshortcuts/*", "."],
]
files_exclude = [
    ["**/*.pdb"],
    ["**/*.exp"],
    ["_build/$platform/$config/appshortcuts"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/omniverse-kit.portable"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/kit.portable"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/exts/**"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/extsPhysics/**"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/plugins/test.unit${exe_ext}"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/example.*${exe_ext}"],
    ["_build/target-deps/kit_sdk_release/_build/shaders/**"],
    ["_build/target-deps/kit_sdk_release/_build/library/mdl/Aperture/**"],
    ["_build/target-deps/kit_sdk_release/_build/assets/**"],
    ["_build/target-deps/kit_sdk_release/data/**"],
    ["_build/target-deps/kit_sdk_release/deps/**"],
    ["_build/target-deps/kit_sdk_release/tools/**"],
    ["_build/target-deps/kit_sdk_release/source/**"],
    ["_build/target-deps/kit_sdk_release/include/**"],
    ["_build/target-deps/kit_sdk_release/PACKAGE-LICENSES/*readme.txt*"],
    ["_build/kit-exts/omni.kit.widget.webview/**"],
    ["_build/kit-exts/omni.particle.system/**"],
]

[isaac-sim-launcher.linux-x86_64]
files_exclude = [
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/importlib_metadata/tests/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/test/test_warnings/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/test/test_import/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/test/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/test/test_email/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/lib2to3/tests/data/**"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/lib/python3.6/test/test_importlib/source/**"],
]

files_strip = [
    ["**/*.so"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/omniverse-kit"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/kit"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/plugins/test.benchmarks"],
    ["_build/target-deps/kit_sdk_release/_build/$platform/release/plugins/test.unit"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/bin/python3"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/bin/python3.6"],
    ["_build/target-deps/kit_sdk_release/_build/target-deps/python/bin/python3.6m"],
]

[isaac-sim-launcher.windows-x86_64]
files = [
    # WAR: repo_fileutils fails to package folder starting with dot on windows unless specified explicitly. The reason is that 
    # python's std glob module doesn't support finding them. Fixing that turned out to be quite hard.
    ["_build/kit-exts/omni.kit.pip_archive/pip_prebundle/numpy/.libs"],
]

[isaac-sim-launcher.debug]
files = []
